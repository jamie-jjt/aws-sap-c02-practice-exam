function buildReview() {
  const el = document.getElementById('page-review');
  const topics = [
    {name:"AWS Organizations & SCPs",domain:"Domain 1",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Multi-account management service with Service Control Policies (SCPs) providing organization-wide permission guardrails.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• SCPs are deny-only guardrails - they restrict, never grant permissions</li><li>• Organizational Units (OUs) for hierarchical policy inheritance</li><li>• Consolidated billing with volume discounts across all accounts</li><li>• Delegated administrator for services like GuardDuty, Macie, Security Hub</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Preventing any account from disabling CloudTrail or GuardDuty</li><li>→ Restricting regions to approved list (deny all actions outside us-east-1, eu-west-1)</li><li>→ Enforcing encryption on all new resources via SCP conditions</li><li>→ Delegating security service administration to a security account</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• SCPs do NOT affect management account (critical exam point)</li><li>• SCP + IAM: both must allow (intersection, not union)</li><li>• Max 5 SCPs per OU/account, max 5120 characters per SCP</li><li>• OU nesting: up to 5 levels deep</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• SCPs do NOT affect the management account - never put workloads there</li><li>• SCPs restrict but do NOT grant - you still need IAM policies to allow</li><li>• Deny list strategy (default Allow + explicit Deny) vs Allow list (deny all + explicit Allow)</li><li>• SCP inheritance: child OU inherits parent restrictions (cannot override parent deny)</li></ul></div></div>`},
    {name:"Multi-Account Strategy",domain:"Domain 1",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">AWS best practice of isolating workloads across multiple accounts for security boundaries, billing separation, and blast radius reduction.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Landing Zone: standardized multi-account setup with Control Tower</li><li>• Account types: Management, Security (Log Archive + Audit), Shared Services, Workload</li><li>• AWS Control Tower: automated guardrails, account factory, dashboard</li><li>• Cross-account access via IAM roles with trust policies (AssumeRole)</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Isolating production from development with separate accounts</li><li>→ Centralized logging account for CloudTrail and Config aggregation</li><li>→ Shared services account for Active Directory, CI/CD pipelines</li><li>→ Sandbox accounts for experimentation with budget guardrails</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• Control Tower: Account Factory provisions standardized accounts</li><li>• Guardrails: Preventive (SCP-based) vs Detective (Config rules)</li><li>• Cross-account IAM: trust policy + permissions policy (both required)</li><li>• AWS RAM: share resources (subnets, Transit Gateway) across accounts</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Control Tower manages the landing zone - do NOT manually modify managed resources</li><li>• Cross-account access: BOTH trust policy on target role AND IAM on source must allow</li><li>• Separate accounts for security (log archive) - never put logs in workload accounts</li><li>• Account-level limits are per-account - multi-account avoids hitting service quotas</li></ul></div></div>`},
    {name:"Transit Gateway",domain:"Domain 1",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Regional network hub that connects VPCs, VPNs, and Direct Connect gateways through a central routing architecture.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Hub-and-spoke model replacing complex VPC peering meshes</li><li>• Route tables for network segmentation (shared services vs isolated)</li><li>• Inter-region peering between Transit Gateways</li><li>• Multicast support for one-to-many network communication</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Connecting 100+ VPCs through single hub instead of n*(n-1)/2 peering</li><li>→ Network segmentation: production VPCs cannot route to dev VPCs</li><li>→ Hybrid connectivity: multiple VPN/DX connections through single TGW</li><li>→ Shared services VPC (DNS, AD) accessible from all spoke VPCs</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• Bandwidth: 50 Gbps per VPC attachment, burst to 50 Gbps per AZ</li><li>• Max 5,000 attachments per TGW</li><li>• Inter-region peering: encrypted, uses AWS backbone</li><li>• VPN attachment: up to 1.25 Gbps per tunnel (ECMP for aggregation)</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• TGW is regional - need inter-region peering for cross-region connectivity</li><li>• Route table associations control which attachments can communicate</li><li>• TGW vs VPC Peering: TGW for many-to-many, Peering for simple 1-to-1</li><li>• VPN over TGW supports ECMP for bandwidth aggregation (multiple tunnels)</li></ul></div></div>`},
    {name:"Direct Connect",domain:"Domain 1",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Dedicated private network connection from on-premises to AWS, bypassing the public internet for consistent latency and higher throughput.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Dedicated (1/10/100 Gbps) vs Hosted (50 Mbps to 10 Gbps) connections</li><li>• Virtual Interfaces: Private VIF (VPC), Public VIF (AWS public services), Transit VIF (TGW)</li><li>• LAG (Link Aggregation Group) for bundling multiple connections</li><li>• MACsec encryption for layer-2 security on dedicated connections</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Consistent low-latency connectivity for hybrid applications</li><li>→ Large data transfers (TB/PB) that would be slow over internet</li><li>→ Regulatory requirement for private connectivity (no public internet)</li><li>→ Disaster recovery with DX + VPN backup for failover</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• Lead time: weeks to months for physical cross-connect installation</li><li>• Dedicated: 1, 10, or 100 Gbps. Hosted: 50 Mbps to 10 Gbps</li><li>• Transit VIF: connect to up to 3 Transit Gateways (multi-region)</li><li>• Failover: DX + VPN (lower cost) or dual DX (higher resilience)</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• DX is NOT encrypted by default - use MACsec (layer 2) or VPN over DX (layer 3)</li><li>• Transit VIF connects to TGW (access many VPCs); Private VIF = single VPC/DXGW</li><li>• DX Gateway: connect DX to VPCs in multiple regions (but not transitive routing)</li><li>• Resiliency: Maximum = separate DX locations + separate devices at each location</li></ul></div></div>`},
    {name:"Disaster Recovery",domain:"Domain 2",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Strategies for maintaining business continuity ranging from backup/restore (cheapest) to multi-site active-active (fastest recovery).</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Four strategies: Backup/Restore, Pilot Light, Warm Standby, Multi-Site Active-Active</li><li>• RTO (Recovery Time Objective) vs RPO (Recovery Point Objective)</li><li>• Aurora Global Database: 1-second RPO, <1 min cross-region failover</li><li>• Route 53 health checks + failover routing for automated DNS switchover</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Backup/Restore: non-critical systems, hours RTO, lowest cost</li><li>→ Pilot Light: core DB replicated, compute scaled up on failover</li><li>→ Warm Standby: scaled-down full environment, minutes RTO</li><li>→ Multi-Site: full production in 2+ regions, near-zero RTO/RPO</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• Backup/Restore: RTO hours, RPO hours, cost \$</li><li>• Pilot Light: RTO 10s of minutes, RPO minutes, cost \$\$</li><li>• Warm Standby: RTO minutes, RPO seconds, cost \$\$\$</li><li>• Multi-Site: RTO near-zero, RPO near-zero, cost \$\$\$\$</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Pilot Light vs Warm Standby: Pilot Light = only DB running; Warm Standby = full stack at reduced capacity</li><li>• Multi-Site is NOT the same as Warm Standby - Multi-Site actively serves traffic from both regions</li><li>• Aurora Global Database failover promotes secondary to primary (manual or planned)</li><li>• S3 Cross-Region Replication is async - RPO is minutes, not zero</li></ul></div></div>`},
    {name:"Serverless Architecture",domain:"Domain 2",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Application design pattern using fully managed services (Lambda, API Gateway, DynamoDB, Step Functions) with zero server management.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Lambda + API Gateway for REST/WebSocket APIs</li><li>• Step Functions for orchestrating complex workflows</li><li>• DynamoDB/Aurora Serverless for auto-scaling data stores</li><li>• EventBridge + SQS for decoupled event-driven processing</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Microservices APIs with API Gateway + Lambda + DynamoDB</li><li>→ Event-driven data processing pipelines with zero idle cost</li><li>→ Scheduled batch jobs with EventBridge Scheduler + Lambda/Step Functions</li><li>→ Real-time file processing triggered by S3 events</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• Lambda: 15 min max, 10 GB memory, 1000 concurrent (default soft limit)</li><li>• API Gateway: 10,000 requests/sec (regional), 29 sec timeout</li><li>• DynamoDB On-Demand: instant scaling, no capacity planning</li><li>• Aurora Serverless v2: 0.5 to 128 ACUs, scales in seconds</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Lambda 15-min limit: long-running = use ECS Fargate or Step Functions</li><li>• API Gateway 29-sec timeout: long operations = async pattern (return 202 + poll)</li><li>• Cold starts: Provisioned Concurrency for latency-sensitive paths</li><li>• Serverless does NOT mean zero cost - high-volume can be more expensive than provisioned</li></ul></div></div>`},
    {name:"Database Selection",domain:"Domain 2",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Choosing the right purpose-built database based on data model, access patterns, scale requirements, and consistency needs.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Aurora: MySQL/PostgreSQL compatible, 5x throughput, up to 128 TB, 15 replicas</li><li>• DynamoDB: key-value/document, single-digit ms, infinite scale, serverless</li><li>• ElastiCache: in-memory (Redis/Memcached) for microsecond latency</li><li>• Neptune: graph database for highly connected datasets</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Aurora: transactional OLTP with high availability and read replicas</li><li>→ DynamoDB: high-velocity key-value lookups, session stores, gaming</li><li>→ ElastiCache Redis: session management, leaderboards, pub/sub</li><li>→ Neptune: social networks, fraud detection, knowledge graphs</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• Aurora: <30s failover, 6-way replication, Global Database (1s RPO)</li><li>• DynamoDB: single-digit ms, 99.999% SLA (Global Tables)</li><li>• ElastiCache Redis: sub-millisecond, cluster mode up to 500 nodes</li><li>• DocumentDB: MongoDB-compatible, up to 128 TB, 15 replicas</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Relational + high availability = Aurora (not RDS). RDS = simpler, fewer replicas</li><li>• DynamoDB for known access patterns; if ad-hoc queries needed = wrong choice</li><li>• ElastiCache vs DAX: DAX is DynamoDB-only cache; ElastiCache is general-purpose</li><li>• Neptune vs DynamoDB: highly connected data with traversals = Neptune, not DynamoDB GSIs</li></ul></div></div>`},
    {name:"High Availability",domain:"Domain 2",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Designing systems that remain operational during component failures using redundancy, health checks, and automatic failover.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Multi-AZ deployments for RDS, ElastiCache, EFS, and most managed services</li><li>• Auto Scaling Groups with health checks across multiple AZs</li><li>• Application Load Balancer with cross-zone load balancing</li><li>• Route 53 health checks with failover routing policies</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Multi-AZ RDS with automatic failover for database tier</li><li>→ ALB + ASG across 3 AZs for stateless application tier</li><li>→ ElastiCache Redis Multi-AZ with automatic failover for session store</li><li>→ S3 (11 nines durability) + CloudFront for static content</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• RDS Multi-AZ: synchronous replication, 60-120s failover</li><li>• Aurora: 6 copies across 3 AZs, <30s failover, self-healing storage</li><li>• ELB: cross-zone enabled by default (ALB), health check interval 5-300s</li><li>• ASG: min/max/desired, health check grace period, cooldown period</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Multi-AZ is NOT Multi-Region - AZ failure protection only, not regional disaster</li><li>• Aurora Multi-AZ is automatic; Aurora Global Database is for cross-REGION failover</li><li>• ASG health check grace period: too short = healthy instances terminated during startup</li><li>• Stateful applications need sticky sessions OR externalized state (ElastiCache/DynamoDB)</li></ul></div></div>`},
    {name:"Cost Optimization",domain:"Domain 2",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Strategies for reducing AWS spend while maintaining performance through right-sizing, pricing models, and architectural decisions.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Reserved Instances/Savings Plans for predictable workloads (up to 72% savings)</li><li>• Spot Instances for fault-tolerant workloads (up to 90% savings)</li><li>• S3 Intelligent-Tiering and lifecycle policies for storage optimization</li><li>• Compute Optimizer and Cost Explorer for right-sizing recommendations</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Reserved capacity for steady-state production databases and instances</li><li>→ Spot for batch processing, CI/CD, EMR task nodes, ECS tasks</li><li>→ S3 lifecycle transitions for aging data (Standard to IA to Glacier)</li><li>→ Right-sizing over-provisioned instances based on CloudWatch metrics</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• Savings Plans: Compute (any instance) vs EC2 Instance (specific family)</li><li>• Spot: 2-min interruption notice, Spot Fleet for diversified capacity</li><li>• Reserved: 1yr or 3yr, All/Partial/No Upfront payment options</li><li>• S3: Standard=\$0.023/GB, IA=\$0.0125/GB, Glacier=\$0.004/GB, Deep=\$0.00099/GB</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Savings Plans are more flexible than Reserved Instances (cover Fargate + Lambda too)</li><li>• Spot is NOT for stateful or time-critical workloads (can be interrupted anytime)</li><li>• S3 IA has minimum 30-day charge + per-retrieval fee - not for frequently accessed data</li><li>• Cost Optimizer recommendations require CloudWatch agent for memory metrics</li></ul></div></div>`},
    {name:"Event-Driven Architecture",domain:"Domain 3",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Loosely coupled design pattern where services communicate through events, enabling independent scaling and deployment.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• EventBridge for content-based routing with rich filtering rules</li><li>• SQS for decoupling with guaranteed delivery and dead-letter queues</li><li>• SNS for fan-out pub/sub to multiple subscribers</li><li>• Kinesis/MSK for ordered, high-throughput real-time streaming</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Order processing: order placed event triggers inventory, payment, notification</li><li>→ S3 event notifications triggering Lambda for file processing</li><li>→ Cross-service communication without direct dependencies</li><li>→ Saga pattern with Step Functions for distributed transactions</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• SQS: Standard (unlimited throughput) vs FIFO (3,000 msg/s with batching)</li><li>• SNS: 12.5M subscriptions/topic, 100K topics per account</li><li>• EventBridge: 300 rules/bus, 5 targets/rule, 256 KB max event</li><li>• SQS visibility timeout: 0s to 12 hours (default 30s)</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• SQS FIFO for ordering + exactly-once; Standard for throughput + at-least-once</li><li>• EventBridge for content-based filtering; SNS for simple fan-out (no filtering on content)</li><li>• DLQ is essential - without it, poison messages block the queue forever</li><li>• Idempotency is critical: at-least-once delivery means handlers must handle duplicates</li></ul></div></div>`},
    {name:"Security at Scale",domain:"Domain 3",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Implementing defense-in-depth security across a multi-account AWS organization using layered controls and automated detection.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• GuardDuty: ML-based threat detection across accounts (VPC Flow, DNS, CloudTrail)</li><li>• Security Hub: aggregated findings from GuardDuty, Inspector, Macie, Config</li><li>• AWS Config: resource compliance rules with auto-remediation via SSM</li><li>• WAF + Shield Advanced for application and DDoS protection</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Centralized security monitoring with Security Hub across all accounts</li><li>→ Automated remediation of non-compliant resources via Config + SSM</li><li>→ Threat detection with GuardDuty analyzing VPC Flow Logs and CloudTrail</li><li>→ Data classification and PII discovery with Macie across S3 buckets</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• GuardDuty: per-account pricing based on data analyzed</li><li>• Security Hub: \$0.0010 per finding ingested after first 10K</li><li>• Config Rules: \$0.001 per rule evaluation</li><li>• WAF: \$5/month per web ACL + \$1/rule + \$0.60 per million requests</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• GuardDuty detects threats but does NOT block them - use Lambda remediation</li><li>• Security Hub is aggregation only - it does not scan or detect on its own</li><li>• Config rules evaluate compliance but need SSM Automation for remediation</li><li>• WAF rate-based rules for DDoS; Shield Advanced for cost protection + DRT support</li></ul></div></div>`},
    {name:"Migration Strategies",domain:"Domain 3",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">The 7 Rs framework for migrating workloads to AWS: Retire, Retain, Relocate, Rehost, Replatform, Refactor, Repurchase.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Rehost (lift-and-shift): move as-is with Application Migration Service</li><li>• Replatform: minor optimizations (e.g., RDS instead of self-managed DB)</li><li>• Refactor: re-architect for cloud-native (microservices, serverless)</li><li>• Migration Hub: central tracking dashboard for all migration projects</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Large-scale datacenter exit with hundreds of servers (Rehost first, optimize later)</li><li>→ Database migration from Oracle to Aurora PostgreSQL (Replatform + DMS)</li><li>→ Monolith decomposition into microservices on ECS/Lambda (Refactor)</li><li>→ SaaS replacement for email/CRM systems (Repurchase)</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• Application Migration Service: continuous replication, non-disruptive testing</li><li>• DMS: database migration with CDC for minimal downtime</li><li>• Snow Family: Snowball Edge (80 TB), Snowmobile (100 PB) for offline transfer</li><li>• DataSync: online transfer up to 10 Gbps over Direct Connect</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Rehost is fastest but misses cloud optimization benefits - plan to optimize later</li><li>• Large data (PB+): Snow Family for offline; DataSync/DX for online</li><li>• DMS Full Load + CDC for minimal downtime database migration</li><li>• Migration Hub does NOT perform migration - it tracks progress from other tools</li></ul></div></div>`},
    {name:"AWS Migration Services",domain:"Domain 3",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Suite of tools for discovering, planning, and executing migrations including Application Migration Service, DMS, DataSync, and Snow Family.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Application Migration Service (MGN): continuous block-level replication for servers</li><li>• DMS: database migration with schema conversion (SCT) and CDC</li><li>• DataSync: high-speed online data transfer (NFS, SMB, S3, EFS, FSx)</li><li>• Transfer Family: managed SFTP/FTPS/FTP for S3 and EFS</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Server migration with MGN: replicate, test, cutover with minimal downtime</li><li>→ Heterogeneous DB migration: Oracle to Aurora with SCT + DMS</li><li>→ File server migration: on-prem NFS to EFS with DataSync</li><li>→ Partner file exchange: Transfer Family SFTP endpoint backed by S3</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• MGN: continuous replication, test instances, cutover window minutes</li><li>• DataSync: up to 10 Gbps transfer, automatic integrity verification</li><li>• Snow Family: Snowcone (14 TB), Snowball Edge (80 TB), Snowmobile (100 PB)</li><li>• DMS: replication instance sizing based on table count and LOB columns</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• MGN replaces Server Migration Service (SMS) - SMS is deprecated</li><li>• DataSync vs S3 sync/cp: DataSync handles scheduling, verification, bandwidth throttling</li><li>• Snow Family for offline: when network transfer would take >1 week</li><li>• Transfer Family is for EXTERNAL partners needing SFTP - not for internal migrations</li></ul></div></div>`},
    {name:"Containerization",domain:"Domain 3",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Running containerized applications on AWS using ECS (AWS-native) or EKS (Kubernetes) with Fargate (serverless) or EC2 launch types.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• ECS: AWS-native container orchestration with tight AWS integration</li><li>• EKS: managed Kubernetes for K8s-native workloads and portability</li><li>• Fargate: serverless compute for containers (no EC2 management)</li><li>• ECR: managed container registry with image scanning and replication</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Microservices deployment with ECS Fargate for zero server management</li><li>→ Kubernetes workloads requiring portability across clouds (EKS)</li><li>→ Batch processing with ECS tasks triggered by EventBridge/Step Functions</li><li>→ Blue/green deployments with CodeDeploy + ECS service</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• Fargate: pay per vCPU/memory per second (no EC2 to manage)</li><li>• ECS EC2: you manage instances, can use Spot/Reserved for savings</li><li>• EKS: \$0.10/hr per cluster + compute costs (Fargate or EC2 nodes)</li><li>• ECR: \$0.10/GB/month storage + data transfer costs</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• ECS vs EKS: ECS for AWS-native simplicity; EKS for K8s ecosystem/portability</li><li>• Fargate vs EC2 launch type: Fargate = simpler but more expensive per unit compute</li><li>• ECS Service Connect vs App Mesh: Service Connect is simpler service-to-service networking</li><li>• Fargate Spot: 70% savings but can be interrupted (use for fault-tolerant tasks only)</li></ul></div></div>`},
    {name:"Data Lake & Analytics",domain:"Domain 3",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Centralized repository on S3 storing structured and unstructured data at any scale with analytics services layered on top.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• S3 as storage layer with Glue Data Catalog for metadata management</li><li>• Lake Formation for fine-grained access control (column/row/cell level)</li><li>• Athena for serverless SQL, Redshift for complex warehouse queries</li><li>• EMR/Glue for ETL processing, QuickSight for visualization</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Raw/curated/analytics zone architecture on S3 with lifecycle policies</li><li>→ Self-service analytics with Athena + Glue Catalog for data discovery</li><li>→ Real-time ingestion via Kinesis/Firehose into S3 data lake</li><li>→ Cross-account data sharing with Lake Formation and RAM</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• S3: unlimited storage, \$0.023/GB/month (Standard)</li><li>• Athena: \$5/TB scanned (Parquet reduces 90%+)</li><li>• Glue Catalog: free first million objects, \$1 per 100K after</li><li>• Lake Formation: no additional charge (uses underlying service pricing)</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Data lake is NOT just S3 - needs catalog, governance, and access control</li><li>• Athena for ad-hoc; Redshift for repeated complex queries (cost crossover)</li><li>• Glue Crawlers can create too many tables if partition structure is inconsistent</li><li>• Lake Formation permissions layer ON TOP of IAM - both must allow access</li></ul></div></div>`},
    {name:"Performance Optimization",domain:"Domain 4",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Techniques for maximizing throughput and minimizing latency across compute, storage, database, and network layers.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• CloudFront CDN for edge caching and dynamic content acceleration</li><li>• ElastiCache/DAX for in-memory caching reducing database load</li><li>• Auto Scaling for right-sizing compute based on demand patterns</li><li>• Global Accelerator for TCP/UDP optimization via AWS backbone</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ CloudFront + S3 for static assets with cache invalidation on deploy</li><li>→ ElastiCache Redis for session store and frequently-read database results</li><li>→ Read replicas for read-heavy database workloads</li><li>→ Global Accelerator for multi-region applications with anycast IPs</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• CloudFront: 450+ edge locations, TTL 0s-365 days</li><li>• ElastiCache Redis: sub-millisecond latency, up to 500 nodes in cluster mode</li><li>• RDS Read Replicas: up to 5 (RDS) or 15 (Aurora)</li><li>• Global Accelerator: 2 static anycast IPs, routes to nearest healthy endpoint</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• CloudFront vs Global Accelerator: CloudFront for HTTP caching; GA for TCP/UDP non-HTTP</li><li>• Caching invalidation strategy is critical - stale cache = wrong data served</li><li>• Read replicas have replication lag - not suitable for read-after-write consistency</li><li>• Auto Scaling cooldown period: too short = thrashing; too long = slow response</li></ul></div></div>`},
    {name:"Operational Excellence",domain:"Domain 4",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Running and monitoring systems to deliver business value with continuous improvement through automation and observability.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• CloudFormation/CDK for Infrastructure as Code with drift detection</li><li>• Systems Manager: patch management, parameter store, run commands</li><li>• CloudWatch + X-Ray for observability (metrics, logs, traces)</li><li>• AWS Config for compliance monitoring with auto-remediation</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Automated patching with SSM Patch Manager maintenance windows</li><li>→ Centralized configuration with Parameter Store and Secrets Manager</li><li>→ Distributed tracing with X-Ray for microservices debugging</li><li>→ Automated incident response with EventBridge + SSM Automation</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• SSM Parameter Store: Standard (free, 10K params) vs Advanced (\$0.05/param/month)</li><li>• Secrets Manager: \$0.40/secret/month + \$0.05 per 10K API calls</li><li>• CloudFormation: no charge (pay for resources created)</li><li>• X-Ray: free tier 100K traces/month, then \$5 per million traces</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Parameter Store vs Secrets Manager: Secrets Manager for rotation; Parameter Store for config</li><li>• CloudFormation drift detection finds changes but does NOT auto-fix them</li><li>• SSM Run Command vs Automation: Run Command for ad-hoc; Automation for workflows</li><li>• Config rules detect non-compliance; SSM Automation documents perform remediation</li></ul></div></div>`},
    {name:"Reliability Patterns",domain:"Domain 4",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Design patterns ensuring systems recover from failures, scale to meet demand, and handle disruptions gracefully.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Circuit breaker pattern to prevent cascading failures</li><li>• Bulkhead isolation: separate resources per workload/tenant</li><li>• Exponential backoff with jitter for retry logic</li><li>• Chaos engineering with AWS Fault Injection Simulator (FIS)</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Circuit breaker in API Gateway/Lambda to protect downstream services</li><li>→ Bulkhead: separate ECS clusters per critical vs non-critical workloads</li><li>→ Retry with backoff for transient DynamoDB/S3 throttling errors</li><li>→ FIS experiments to validate multi-AZ failover behavior</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• FIS: inject faults (CPU stress, network latency, AZ outage) in controlled experiments</li><li>• SQS DLQ: max receives before moving to DLQ (1-1000, default varies)</li><li>• Health checks: ELB (HTTP/TCP), Route 53 (HTTP/HTTPS/TCP), ASG (EC2/ELB)</li><li>• RDS automated backups: 0-35 days retention, point-in-time restore</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Retry without backoff causes thundering herd - always add jitter</li><li>• DLQ messages need monitoring and reprocessing workflow (they do not auto-retry)</li><li>• Multi-AZ protects against AZ failure; multi-Region protects against regional failure</li><li>• FIS experiments should start small (single instance) before testing AZ-level failures</li></ul></div></div>`},
    {name:"Storage Solutions",domain:"Domain 4",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">AWS storage services spanning block (EBS), file (EFS/FSx), and object (S3) storage for different access patterns and performance needs.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• EBS: block storage for EC2 (gp3, io2, st1, sc1 volume types)</li><li>• EFS: managed NFS for Linux with automatic scaling</li><li>• FSx: managed file systems (Windows/Lustre/NetApp/OpenZFS)</li><li>• S3: object storage with unlimited capacity and 11 nines durability</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ EBS io2 Block Express for high-performance databases (SAP HANA, Oracle)</li><li>→ EFS for shared storage across multiple EC2 instances and containers</li><li>→ FSx for Lustre: HPC workloads with S3 data repository integration</li><li>→ FSx for Windows: Windows file shares with AD integration and DFS</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• EBS gp3: 3,000 IOPS baseline, up to 16,000 IOPS. io2: up to 256,000 IOPS</li><li>• EFS: unlimited storage, pay per GB used, throughput modes (bursting/provisioned/elastic)</li><li>• FSx Lustre: sub-millisecond latency, hundreds of GB/s throughput</li><li>• S3: 3,500 PUT/s and 5,500 GET/s per prefix</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• EBS is single-AZ (except io2 Multi-Attach) - AZ failure = volume unavailable</li><li>• EFS vs FSx Windows: EFS for Linux NFS; FSx for Windows SMB/NTFS/AD integration</li><li>• FSx Lustre is temporary/scratch by default - enable persistent for durability</li><li>• gp3 vs gp2: gp3 has independent IOPS/throughput provisioning (cheaper for most workloads)</li></ul></div></div>`},
    {name:"Networking & VPC Design",domain:"Domain 4",content:`<div class="space-y-3"><div><span class="text-blue-400 font-bold text-xs uppercase tracking-wider">Definition</span><p class="text-gray-200 mt-1">Designing VPC architectures with proper CIDR planning, subnet strategies, routing, and connectivity for multi-tier applications.</p></div><div><span class="text-green-400 font-bold text-xs uppercase tracking-wider">Key Features</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• Public/private/isolated subnet tiers with NAT Gateway for outbound</li><li>• VPC Peering for simple 1-to-1 connectivity (non-transitive)</li><li>• PrivateLink for exposing services without VPC peering</li><li>• Network Firewall for stateful inspection and IDS/IPS</li></ul></div><div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider">Use Cases</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>→ Multi-tier architecture: public ALB, private app, isolated DB subnets</li><li>→ Shared services VPC with PrivateLink endpoints for internal APIs</li><li>→ Network segmentation with NACLs (stateless) + Security Groups (stateful)</li><li>→ Centralized egress with Transit Gateway + shared NAT Gateway VPC</li></ul></div><div><span class="text-yellow-400 font-bold text-xs uppercase tracking-wider">Critical Numbers</span><ul class="text-gray-300 mt-1 space-y-1 text-sm font-mono"><li>• VPC CIDR: /16 to /28 (max 65,536 to min 16 IPs). 5 IPs reserved per subnet</li><li>• NAT Gateway: 45 Gbps bandwidth, per-AZ deployment for HA</li><li>• Security Groups: stateful, allow rules only, 60 inbound + 60 outbound rules</li><li>• NACLs: stateless, allow + deny rules, processed in order (lowest number first)</li></ul></div><div class="bg-red-900/20 border border-red-800/50 rounded-lg p-2"><span class="text-red-400 font-bold text-xs uppercase tracking-wider">⚠ Exam Traps</span><ul class="text-gray-300 mt-1 space-y-1 text-sm"><li>• VPC Peering is NOT transitive: A-B and B-C does NOT mean A-C can communicate</li><li>• NAT Gateway is per-AZ - deploy one per AZ for high availability</li><li>• Security Groups are stateful (return traffic auto-allowed); NACLs are stateless (must allow both)</li><li>• CIDR planning: cannot change VPC primary CIDR after creation (can add secondary CIDRs)</li></ul></div></div>`}
  ];

  el.innerHTML = `<div class="fade-in">
    <h1 class="text-2xl font-black text-white mb-2">📚 Knowledge Review Guide</h1>
    <p class="text-gray-400 text-sm mb-6">Tap any topic to expand. Use the Study Assistant (?) for deeper explanations.</p>
    ${topics.map(t => `
    <details data-topic="${t.name}" class="bg-surface-2 border border-gray-700 rounded-xl mb-2 overflow-hidden group">
      <summary class="flex items-center justify-between p-3 sm:p-4 cursor-pointer hover:bg-surface-3 transition-colors">
        <div class="flex items-center gap-2">
          <span class="text-xs px-2 py-0.5 rounded ${t.domain==='Domain 1'?'bg-blue-900/50 text-blue-300':t.domain==='Domain 2'?'bg-green-900/50 text-green-300':t.domain==='Domain 3'?'bg-yellow-900/50 text-yellow-300':'bg-red-900/50 text-red-300'}">${t.domain}</span>
          <span class="font-semibold text-white text-sm">${t.name}</span>
        </div>
        <span class="chevron text-gray-500 text-xs group-open:rotate-180 transition-transform">▼</span>
      </summary>
      <div class="px-4 pb-4 text-sm text-gray-300 leading-relaxed border-t border-gray-800 pt-3">${t.content}</div>
    </details>`).join('')}
  </div>`;
}
