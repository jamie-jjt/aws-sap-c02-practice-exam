{id:161,domain:"Domain 1",topic:"Kinesis Data Streams",question:"KCL (Kinesis Client Library) uses what for shard lease coordination?",options:{A:"S3 state file.",B:"DynamoDB lease table.",C:"Redis cache.",D:"In-memory state."},correctAnswer:"B",explanations:{correct:"KCL uses DynamoDB table to track shard leases, checkpoints, and worker assignments. Auto-rebalances when workers added/removed.",wrongA:"KCL doesn't use S3 for state.",wrongC:"KCL doesn't use Redis.",wrongD:"In-memory state would be lost on restart. DynamoDB provides durable coordination."}},
{id:162,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue job reads DynamoDB table. Want only records modified in last 24 hours. Correct approach?",options:{A:"Glue Job Bookmarks with DynamoDB.",B:"DynamoDB Streams as Glue source for changed records.",C:"Full table scan with filter.",D:"DMS CDC from DynamoDB."},correctAnswer:"B",explanations:{correct:"DynamoDB Streams captures item-level changes with 24hr retention. Glue can read Streams for incremental processing of only changed records.",wrongA:"Bookmarks don't natively support DynamoDB as bookmarked source.",wrongC:"Full scan is expensive and reads all items, not just changed ones.",wrongD:"DMS supports DynamoDB CDC but Streams is more direct for Glue."}},
{id:163,domain:"Domain 1",topic:"Kinesis Data Firehose",question:"Firehose converts JSON to Parquet using what for schema definition?",options:{A:"Inline schema in Firehose config.",B:"AWS Glue Data Catalog table schema.",C:"Avro schema file in S3.",D:"JSON Schema in Lambda."},correctAnswer:"B",explanations:{correct:"Firehose format conversion uses Glue Data Catalog table schema to define the Parquet/ORC output structure. Table must exist in catalog with correct column definitions.",wrongA:"Firehose doesn't support inline schema definition.",wrongC:"Avro schemas are for Glue Schema Registry (Kafka/Kinesis producers), not Firehose format conversion.",wrongD:"Lambda transforms records but doesn't define Parquet schema for format conversion."}},
{id:164,domain:"Domain 1",topic:"AWS DMS",question:"DMS supports which migration pattern for heterogeneous databases (Oracle to PostgreSQL)?",options:{A:"DMS handles schema conversion automatically.",B:"Use AWS SCT for schema conversion first, then DMS for data migration.",C:"DMS only supports homogeneous migrations.",D:"Use Glue for heterogeneous migrations."},correctAnswer:"B",explanations:{correct:"Heterogeneous: (1) AWS SCT converts DDL, stored procedures, functions. (2) DMS migrates the actual data. Two-step process for different-engine migrations.",wrongA:"DMS migrates data but doesn't convert schemas between different engines.",wrongC:"DMS supports both homogeneous and heterogeneous data migration.",wrongD:"Glue is ETL, not a database migration tool."}},
{id:165,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue job needs to read from MongoDB Atlas (outside AWS). Connection type?",options:{A:"JDBC connection.",B:"Native MongoDB connection type in Glue.",C:"Network connection.",D:"Marketplace connector."},correctAnswer:"B",explanations:{correct:"Glue has native MongoDB connection type supporting MongoDB and DocumentDB. Uses MongoDB connector with connection URL, credentials, SSL settings.",wrongA:"MongoDB doesn't use JDBC. JDBC is for relational databases.",wrongC:"Network connection provides VPC access without specific connector handling.",wrongD:"Marketplace connectors exist but native MongoDB type should be used first."}},
{id:166,domain:"Domain 2",topic:"Amazon S3",question:"S3 Multipart Upload. When required and what benefit?",options:{A:"Required for files > 100 MB. Benefit: resumable uploads, parallel parts.",B:"Required for all uploads.",C:"Only for Glacier.",D:"Only for encrypted objects."},correctAnswer:"A",explanations:{correct:"Multipart: split large objects into parts (5 MB-5 GB each). Upload parts independently/in parallel. Retry individual failed parts. AWS recommends for objects > 100 MB. Required for > 5 GB.",wrongB:"Small objects use single PutObject. Multipart recommended for > 100 MB.",wrongC:"Multipart works for all storage classes, not just Glacier.",wrongD:"Multipart is about upload reliability/performance, not encryption."}},
{id:167,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift cross-account data sharing. Company A shares 'sales' tables with Company B. How?",options:{A:"S3 cross-account bucket policies.",B:"Create datashare, add tables, grant to Company B's account. B creates inbound datashare.",C:"Glue replication.",D:"Redshift Spectrum."},correctAnswer:"B",explanations:{correct:"Data Sharing: A creates datashare object, adds tables/schemas, grants to B's account ID. B creates inbound datashare, queries live data. No copying.",wrongA:"Redshift data is proprietary format. S3 policies can't share Redshift table data.",wrongC:"Glue replication creates stale copies. Data Sharing provides live access.",wrongD:"Spectrum queries S3 data. Can't query another account's Redshift cluster."}},
{id:168,domain:"Domain 2",topic:"Amazon DynamoDB",question:"DynamoDB Streams retention period?",options:{A:"7 days.",B:"24 hours.",C:"35 days.",D:"Indefinite."},correctAnswer:"B",explanations:{correct:"DynamoDB Streams retains records for 24 hours. After that, records are permanently deleted from the stream.",wrongA:"7 days is Kinesis Data Streams default (not DynamoDB Streams).",wrongC:"35 days is PITR window, not Streams retention.",wrongD:"Streams has fixed 24hr retention, not indefinite."}},
{id:169,domain:"Domain 2",topic:"Amazon S3",question:"S3 Glacier Flexible Retrieval. Expedited retrieval time?",options:{A:"3-5 hours.",B:"1-5 minutes.",C:"5-12 hours.",D:"Milliseconds."},correctAnswer:"B",explanations:{correct:"Glacier Flexible Retrieval options: Expedited (1-5 min, highest cost), Standard (3-5 hr), Bulk (5-12 hr, lowest cost).",wrongA:"3-5 hours is Standard retrieval.",wrongC:"5-12 hours is Bulk retrieval.",wrongD:"Milliseconds is Glacier Instant Retrieval (different storage class)."}},
{id:170,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift maintenance window. Can it be customized?",options:{A:"No, AWS decides.",B:"Yes, configure preferred weekly 30-minute window.",C:"Only for Serverless.",D:"Requires support ticket."},correctAnswer:"B",explanations:{correct:"Redshift allows configuring preferred maintenance window — weekly 30-min window for minor upgrades/patches. Set via console/API.",wrongA:"Factually incorrect. Maintenance windows are fully customizable.",wrongC:"Works for both Provisioned and Serverless.",wrongD:"No support ticket needed. Self-service configuration."}},
{id:171,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue Data Catalog table versions. What happens when Crawler updates schema?",options:{A:"Old version deleted.",B:"New version created. All previous versions retained in version history.",C:"Table recreated.",D:"Schema locked."},correctAnswer:"B",explanations:{correct:"Each schema update creates new version. All previous versions retained. Use GetTableVersions API to list, UpdateTable to restore previous version.",wrongA:"Old versions are retained, not deleted.",wrongC:"Table is updated in-place with new version, not recreated.",wrongD:"Schemas are not locked. Crawlers and API calls can update them."}},
{id:172,domain:"Domain 1",topic:"AWS AppFlow",question:"AWS AppFlow supports which type of data movement?",options:{A:"Only real-time streaming.",B:"Scheduled, event-triggered, or on-demand flows between SaaS apps and AWS services.",C:"Only batch daily.",D:"Only S3 to S3."},correctAnswer:"B",explanations:{correct:"AppFlow: scheduled (hourly/daily), event-triggered (Salesforce events), or on-demand. Connects 50+ SaaS sources to S3, Redshift, etc.",wrongA:"AppFlow is batch/scheduled, not real-time streaming.",wrongC:"Supports multiple schedules and on-demand, not just daily.",wrongD:"Connects SaaS apps (Salesforce, ServiceNow, etc.) to AWS, not just S3-to-S3."}},
{id:173,domain:"Domain 2",topic:"Amazon DynamoDB",question:"DynamoDB LSI vs GSI. Key difference?",options:{A:"LSI has different partition key.",B:"LSI: same partition key, different sort key, created at table creation only. GSI: different partition key, created anytime.",C:"GSI is free.",D:"LSI supports more than 5 per table."},correctAnswer:"B",explanations:{correct:"LSI: same PK, different SK. Max 5. Created at table creation ONLY. Shares table capacity. GSI: different PK. Up to 20. Created anytime. Own provisioned capacity.",wrongA:"LSI has SAME partition key as base table. GSI has different.",wrongC:"GSI has its own capacity cost. Not free.",wrongD:"LSI max is 5 per table. GSI max is 20."}},
{id:174,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift Data Sharing. What type of access does it provide?",options:{A:"One-time data copy.",B:"Live, real-time read access to data without copying.",C:"Write access to shared data.",D:"Only metadata sharing."},correctAnswer:"B",explanations:{correct:"Data Sharing: live access between Redshift clusters without copying. Consumer queries producer's data in real-time. No data movement or duplication.",wrongA:"Not a copy. Live access to producer's data.",wrongC:"Read-only access for consumers. Can't write to shared data.",wrongD:"Shares actual data access, not just metadata."}},
{id:175,domain:"Domain 3",topic:"AWS Glue Data Quality",question:"Glue Data Quality DQDL rule 'Uniqueness email >= 0.99'. What does it check?",options:{A:"99% of emails are non-null.",B:"At least 99% of email values are unique (≤1% duplicates allowed).",C:"Email format validation.",D:"Email column exists."},correctAnswer:"B",explanations:{correct:"Uniqueness checks percentage of distinct values. >= 0.99 means at least 99% unique (allowing up to 1% duplicates).",wrongA:"Non-null checking is Completeness rule, not Uniqueness.",wrongC:"Format validation would use ColumnValues with regex pattern.",wrongD:"Column existence is schema validation, not a DQDL rule."}},
{id:176,domain:"Domain 3",topic:"Amazon Athena",question:"Athena Federated Query architecture. How does it work?",options:{A:"Direct JDBC from Athena to data sources.",B:"Lambda-based data source connectors translate Athena SQL to source-specific API calls.",C:"Glue ETL replication.",D:"VPC peering to data sources."},correctAnswer:"B",explanations:{correct:"Federated Query: Lambda connectors deployed per data source. Athena sends query fragments to Lambda, which translates to source API (DynamoDB, RDS, etc.) and returns results.",wrongA:"Athena doesn't use JDBC directly. Lambda connectors handle translation.",wrongC:"No replication needed. Queries live data sources in real-time.",wrongD:"VPC peering is network connectivity. Federated Query is a query execution mechanism."}},
{id:177,domain:"Domain 3",topic:"Amazon EventBridge",question:"EventBridge Pipes vs EventBridge Rules. Key difference?",options:{A:"Same thing, different names.",B:"Pipes: point-to-point (one source → one target) with enrichment. Rules: event bus pattern matching to multiple targets.",C:"Pipes are cheaper.",D:"Rules don't support Lambda targets."},correctAnswer:"B",explanations:{correct:"Pipes: dedicated point-to-point pipeline (source → filter → enrich → target). Rules: pattern-based matching on event bus, can have multiple targets per rule.",wrongA:"Different services with different architectures.",wrongC:"Pricing differs but that's not the key architectural difference.",wrongD:"Rules absolutely support Lambda targets."}},
{id:178,domain:"Domain 3",topic:"Amazon CloudWatch",question:"CloudWatch Logs metric filter. What does it do?",options:{A:"Filters which logs are stored.",B:"Extracts numeric values from log messages and creates CloudWatch metrics automatically.",C:"Deletes matching log entries.",D:"Routes logs to S3."},correctAnswer:"B",explanations:{correct:"Metric filters: define patterns to match in log events. Extract numeric values (e.g., 'Processed 5000 records'). Auto-creates CloudWatch metrics from log data.",wrongA:"Metric filters don't affect log storage. All logs still stored.",wrongC:"Doesn't delete logs. Creates metrics from matching patterns.",wrongD:"Log routing is subscription filters, not metric filters."}},
{id:179,domain:"Domain 4",topic:"AWS KMS",question:"Asymmetric KMS CMK. Use case?",options:{A:"Encrypting large S3 objects.",B:"Digital signatures — sign with private key, verify with public key.",C:"Envelope encryption.",D:"S3 SSE-KMS."},correctAnswer:"B",explanations:{correct:"Asymmetric CMKs (RSA/ECC): kms:Sign with private key, kms:Verify with public key. Public key can be shared for verification. Used for digital signatures.",wrongA:"Large objects use symmetric envelope encryption, not asymmetric.",wrongC:"Envelope encryption uses symmetric CMKs.",wrongD:"S3 SSE-KMS uses symmetric keys."}},
{id:180,domain:"Domain 4",topic:"AWS IAM",question:"AWS Organizations SCP. What level does it operate at?",options:{A:"Individual IAM user level.",B:"Organization/OU level — permission guardrails that can't be overridden by account IAM.",C:"Resource level.",D:"Network level."},correctAnswer:"B",explanations:{correct:"SCPs: organization-level guardrails applied to OUs/accounts. Restrict what actions can be performed. Can't be overridden by any IAM policy within member accounts.",wrongA:"SCPs apply to entire accounts/OUs, not individual users.",wrongC:"SCPs restrict actions, not specific resources (though resource conditions can be added).",wrongD:"SCPs are authorization controls, not network controls."}},
{id:181,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue Auto Scaling. When available and what it does?",options:{A:"All Glue versions.",B:"Glue 3.0+. Dynamically adjusts worker count during execution based on workload.",C:"Only for Python Shell.",D:"Scales DPU cost, not workers."},correctAnswer:"B",explanations:{correct:"Auto Scaling (Glue 3.0+): monitors Spark utilization, adds/removes workers during execution. Set max workers, Glue optimizes within limit.",wrongA:"Only available for Glue 3.0 and later versions.",wrongC:"Python Shell doesn't use Auto Scaling (single DPU). It's for Spark ETL jobs.",wrongD:"Scales actual worker count (compute resources), not just pricing."}},
{id:182,domain:"Domain 1",topic:"Kinesis Data Streams",question:"Kinesis Data Streams server-side encryption. What does it protect?",options:{A:"Data in transit only.",B:"Data at rest in stream shards.",C:"Consumer application data.",D:"Producer credentials."},correctAnswer:"B",explanations:{correct:"SSE encrypts data at rest within Kinesis shard storage using KMS. Data encrypted before written to disk, decrypted when read by consumers.",wrongA:"In-transit encryption is TLS (separate from SSE). SSE is at-rest.",wrongC:"Consumer application data is outside Kinesis scope.",wrongD:"Producer credentials are IAM/STS, not KMS encryption."}},
{id:183,domain:"Domain 2",topic:"Amazon S3",question:"S3 Object Lock Governance vs Compliance mode. Key difference?",options:{A:"Same protection level.",B:"Governance: users with special permissions can override. Compliance: NO ONE can delete until retention expires.",C:"Governance is more restrictive.",D:"Compliance allows admin override."},correctAnswer:"B",explanations:{correct:"Governance: users with s3:BypassGovernanceRetention can override protection. Compliance: absolutely no one (including root) can delete/modify until retention expires.",wrongA:"Different protection levels. Compliance is stricter.",wrongC:"Compliance is more restrictive than Governance.",wrongD:"Compliance does NOT allow any override. That's the key difference."}},
{id:184,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift COPY command best practice for large data loads?",options:{A:"Single large file.",B:"Multiple files (multiple of slice count) for parallel loading across all slices.",C:"Row-by-row INSERT.",D:"Redshift Data API."},correctAnswer:"B",explanations:{correct:"COPY parallelizes across slices. Multiple files (ideally multiple of slice count) enables all slices to load simultaneously. Single file = one slice loads serially.",wrongA:"Single file serializes loading to one slice. Slowest approach.",wrongC:"INSERT is row-by-row. Dramatically slower than COPY for bulk loading.",wrongD:"Data API executes SQL queries. Not optimized for bulk data loading."}},
{id:185,domain:"Domain 2",topic:"Amazon DynamoDB",question:"DynamoDB Transactions. Cost compared to standard operations?",options:{A:"Same cost.",B:"2x the capacity units (WCUs/RCUs) of standard operations.",C:"10x cost.",D:"Free."},correctAnswer:"B",explanations:{correct:"Transactional operations consume 2x capacity units. TransactWriteItems: 2 WCUs per 1 KB item. TransactGetItems: 2 RCUs per 4 KB item (strong consistent).",wrongA:"Transactions cost double standard operations.",wrongC:"2x, not 10x.",wrongD:"Transactions consume capacity units (cost money)."}},
{id:186,domain:"Domain 3",topic:"Amazon Athena",question:"Athena CTAS (Create Table As Select). What does it produce?",options:{A:"View definition.",B:"New table with materialized query results stored in S3 (can specify Parquet format).",C:"Temporary table in memory.",D:"External table reference."},correctAnswer:"B",explanations:{correct:"CTAS materializes query results as new table in S3. Can specify format (Parquet), compression, partitioning. Results persist as physical files.",wrongA:"Views are CREATE VIEW. CTAS creates physical table with data.",wrongC:"Not in-memory. Creates persistent S3-backed table.",wrongD:"Creates actual table with data, not just a reference."}},
{id:187,domain:"Domain 3",topic:"AWS Glue ETL",question:"Glue job publishes which metrics to CloudWatch automatically?",options:{A:"Only custom metrics via boto3.",B:"glue.ALL.jvm.heap.usage, glue.ALL.output.recordsWritten, glue.ALL.input.recordsRead, and more.",C:"No automatic metrics.",D:"Only job duration."},correctAnswer:"B",explanations:{correct:"Glue auto-publishes: JVM heap usage, records read/written, bytes read/written, elapsed time, and more. Create CloudWatch Alarms on these for monitoring.",wrongA:"Glue publishes native metrics automatically. boto3 is for additional custom metrics.",wrongC:"Glue does publish automatic metrics to CloudWatch.",wrongD:"Many metrics beyond just duration."}},
{id:188,domain:"Domain 3",topic:"Amazon EventBridge",question:"EventBridge rule cron expression: cron(0 8 ? * MON-FRI *). When does it fire?",options:{A:"Every day at 8 AM.",B:"Every weekday (Mon-Fri) at 8:00 AM UTC.",C:"Every Monday at 8 AM.",D:"Every 8 hours on weekdays."},correctAnswer:"B",explanations:{correct:"cron(minute hour day-of-month month day-of-week year). 0 8 ? * MON-FRI * = minute 0, hour 8, any day-of-month, any month, Mon-Fri, any year.",wrongA:"MON-FRI restricts to weekdays only, not every day.",wrongC:"MON-FRI is Monday through Friday, not just Monday.",wrongD:"'0 8' means at 8:00, not every 8 hours."}},
{id:189,domain:"Domain 4",topic:"AWS KMS",question:"KMS key deletion waiting period. Purpose?",options:{A:"Billing cycle alignment.",B:"Allow recovery from accidental deletion. 7-30 days configurable. Data permanently inaccessible after deletion.",C:"Key rotation period.",D:"Compliance audit window."},correctAnswer:"B",explanations:{correct:"Mandatory 7-30 day waiting period before key deletion. Allows cancellation if accidental. After deletion, all data encrypted with that key is permanently inaccessible.",wrongA:"Not related to billing.",wrongC:"Key rotation is separate (annual). Deletion waiting period is for safety.",wrongD:"Not specifically for compliance audit."}},
{id:190,domain:"Domain 4",topic:"AWS IAM",question:"S3 bucket policy with Deny for all principals. IAM role has Allow. Result?",options:{A:"Allow wins.",B:"Explicit Deny wins. Access denied.",C:"Depends on order.",D:"Service roles exempt."},correctAnswer:"B",explanations:{correct:"Fundamental IAM rule: Explicit Deny ALWAYS overrides any Allow, regardless of source. Bucket policy Deny + IAM Allow = Denied.",wrongA:"Allow never overrides explicit Deny.",wrongC:"Order doesn't matter. Deny always wins.",wrongD:"No principals are exempt from explicit Deny."}},
{id:191,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue Workflow. What does it orchestrate?",options:{A:"Only Glue jobs.",B:"Glue jobs, crawlers, and triggers in a dependency graph.",C:"Only crawlers.",D:"Lambda functions."},correctAnswer:"B",explanations:{correct:"Glue Workflows orchestrate jobs AND crawlers with triggers (scheduled, conditional, on-demand) in a dependency graph. Visual representation of ETL pipeline.",wrongA:"Workflows include crawlers and triggers, not just jobs.",wrongC:"Include jobs and triggers too.",wrongD:"Lambda orchestration is Step Functions, not Glue Workflows."}},
{id:192,domain:"Domain 2",topic:"Amazon S3",question:"S3 strong consistency model (since Dec 2020). What does it guarantee?",options:{A:"Eventual consistency for all operations.",B:"Strong read-after-write consistency for PUT and DELETE operations.",C:"Only for GET after PUT.",D:"Only in us-east-1."},correctAnswer:"B",explanations:{correct:"Since Dec 2020: strong read-after-write consistency for all S3 operations. PUT new object → immediately readable. Overwrite/DELETE → immediately reflected.",wrongA:"S3 is now strongly consistent, not eventually consistent.",wrongC:"Applies to all operations including LIST, DELETE, overwrite.",wrongD:"Applies to all regions globally."}},
{id:193,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift Serverless RPU (Redshift Processing Unit). What is it?",options:{A:"Storage unit.",B:"Compute capacity unit. More RPUs = more compute for queries.",C:"Network bandwidth unit.",D:"Connection limit."},correctAnswer:"B",explanations:{correct:"RPU: compute capacity measure for Redshift Serverless. Base capacity in RPUs determines compute available. Auto-scales within configured range.",wrongA:"Storage is separate from RPUs in Serverless.",wrongC:"Not a network metric.",wrongD:"Not related to connection limits."}},
{id:194,domain:"Domain 3",topic:"Amazon Athena",question:"Athena pricing model?",options:{A:"Per hour of compute.",B:"Per TB of data scanned by queries.",C:"Per query count.",D:"Monthly subscription."},correctAnswer:"B",explanations:{correct:"Athena charges $5 per TB of data scanned. Optimization: use Parquet (columnar), partitioning, CTAS to reduce data scanned = reduce cost.",wrongA:"No hourly compute charge. Pay per scan.",wrongC:"Not per query count. Per data volume scanned.",wrongD:"No subscription. Pay-per-query (per TB scanned)."}},
{id:195,domain:"Domain 4",topic:"AWS IAM",question:"IAM policy evaluation for same-account access. What's needed?",options:{A:"Both IAM policy AND resource policy must allow.",B:"Either IAM policy OR resource policy can allow (union).",C:"Only IAM policy matters.",D:"Only resource policy matters."},correctAnswer:"B",explanations:{correct:"Same account: access granted if EITHER identity policy (IAM) OR resource policy allows. They form a union. (Cross-account: BOTH must allow.)",wrongA:"Both required is cross-account rule. Same account uses union.",wrongC:"Resource policies can independently grant access in same account.",wrongD:"IAM policies can independently grant access in same account."}},
{id:196,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue job type for continuous processing of Kinesis/MSK streaming data?",options:{A:"Glue Spark ETL (batch).",B:"Glue Streaming ETL — uses Spark Structured Streaming for continuous processing.",C:"Glue Python Shell.",D:"Glue Ray."},correctAnswer:"B",explanations:{correct:"Glue Streaming ETL: continuous Spark Structured Streaming job. Reads from Kinesis/MSK, processes micro-batches, writes to S3/other targets. Runs continuously.",wrongA:"Batch ETL processes finite datasets. Streaming ETL processes continuous streams.",wrongC:"Python Shell is for lightweight scripts, not streaming.",wrongD:"Ray is for distributed Python ML workloads."}},
{id:197,domain:"Domain 2",topic:"Amazon DynamoDB",question:"DynamoDB DAX. What type of cache and what latency?",options:{A:"Disk-based cache, millisecond latency.",B:"In-memory cache, microsecond latency for reads.",C:"S3-backed cache.",D:"ElastiCache integration."},correctAnswer:"B",explanations:{correct:"DAX: fully managed in-memory cache for DynamoDB. Microsecond response times for cached reads. Reduces RCU consumption on base table.",wrongA:"DAX is in-memory, not disk-based. Microsecond, not millisecond.",wrongC:"DAX is in-memory, not S3-backed.",wrongD:"DAX is separate from ElastiCache. Purpose-built for DynamoDB."}},
{id:198,domain:"Domain 3",topic:"AWS Glue Data Quality",question:"Glue Data Quality vs DataBrew Rulesets. When to use which?",options:{A:"Same thing.",B:"Data Quality (DQDL): code-based rules in Glue ETL jobs. DataBrew Rulesets: visual rules in DataBrew projects.",C:"DataBrew is more powerful.",D:"Data Quality only works with Redshift."},correctAnswer:"B",explanations:{correct:"DQDL: code-based rules evaluated in Glue ETL jobs (data engineers). DataBrew Rulesets: visual quality rules in DataBrew projects (analysts). Different tools for different users.",wrongA:"Different services with different interfaces and use cases.",wrongC:"Both are powerful in their contexts. DQDL integrates with ETL pipelines.",wrongD:"Data Quality works with any Glue-supported source (S3, JDBC, etc.)."}},
{id:199,domain:"Domain 4",topic:"Amazon Macie",question:"Macie finding type 'SensitiveData:S3Object/Personal'. What does it mean?",options:{A:"Bucket is publicly accessible.",B:"Object contains PII (names, addresses, government IDs).",C:"Object is unencrypted.",D:"Unusual access pattern."},correctAnswer:"B",explanations:{correct:"SensitiveData:S3Object/Personal = Macie detected PII in object content. Includes names, addresses, DOB, government IDs, phone numbers.",wrongA:"Public access findings are Policy type, not SensitiveData type.",wrongC:"Encryption findings are Policy type.",wrongD:"Unusual access is GuardDuty, not Macie."}},
{id:200,domain:"Domain 4",topic:"AWS Lake Formation",question:"Lake Formation Governed Tables provide what?",options:{A:"Only access control.",B:"ACID transactions, automatic compaction, and time travel for S3-backed tables.",C:"Only encryption.",D:"Only row-level security."},correctAnswer:"B",explanations:{correct:"Governed Tables: ACID transaction support for S3 data lake tables. Concurrent reads/writes with isolation. Auto-compaction of small files. Time travel queries.",wrongA:"Governed Tables go beyond access control to provide transaction guarantees.",wrongC:"Encryption is separate (Security Configurations). Governed Tables are about transactions.",wrongD:"Row-level security is Data Filters. Governed Tables are about ACID transactions."}}
,
{id:201,domain:"Domain 1",topic:"Amazon Managed Service for Apache Flink",multiSelect:true,question:"A team needs to perform real-time windowed aggregations on streaming data from Kinesis Data Streams with sub-second latency. They need exactly-once processing semantics and the ability to use SQL. Which TWO services can achieve this? (Select TWO)",options:{A:"Amazon Managed Service for Apache Flink (formerly Kinesis Data Analytics) with SQL or Table API.",B:"AWS Lambda with 5-second EventBridge schedule.",C:"AWS Glue Streaming ETL with Spark Structured Streaming.",D:"Amazon Kinesis Data Firehose with Lambda transformation."},correctAnswer:["A","C"],explanations:{correct:"Both (A) Managed Flink supports SQL-based streaming analytics with sub-second latency and exactly-once semantics, and (C) Glue Streaming ETL uses Spark Structured Streaming with windowed aggregations. Both are valid for this use case.",wrongA:undefined,wrongB:"Lambda with scheduled triggers is micro-batch (not real-time streaming). No windowed aggregation support or exactly-once semantics for streams.",wrongC:undefined,wrongD:"Firehose is a delivery service. Lambda transforms are for format conversion, not windowed aggregations. No exactly-once processing."}},
{id:202,domain:"Domain 1",topic:"Amazon Managed Service for Apache Flink",question:"A data engineer needs to process Kinesis Data Streams with Apache Flink, performing tumbling window aggregations every 60 seconds. The application must handle late-arriving data with a watermark of 10 seconds. Which service and configuration is correct?",options:{A:"Kinesis Data Firehose with 60-second buffer interval.",B:"Amazon Managed Service for Apache Flink with a Flink SQL application using TUMBLE window and WATERMARK definition.",C:"AWS Glue Streaming ETL with a 60-second trigger interval.",D:"Amazon EMR with Spark Streaming and a 60-second batch interval."},correctAnswer:"B",explanations:{correct:"Managed Flink (formerly KDA) natively supports Flink SQL with TUMBLE/HOP/SESSION windows and WATERMARK definitions for late data handling. Purpose-built for this exact use case.",wrongA:"Firehose buffers and delivers. It doesn't perform windowed aggregations or handle watermarks.",wrongB:undefined,wrongC:"Glue Streaming ETL can do windowed aggregations but uses Spark (not Flink). The question specifies Flink and watermarks, which is Managed Flink's domain.",wrongD:"EMR Spark Streaming works but requires managing infrastructure. Managed Flink is serverless and purpose-built for Flink applications."}},
{id:203,domain:"Domain 1",topic:"Amazon Managed Service for Apache Flink",question:"An Apache Flink application on Managed Service for Apache Flink is experiencing checkpoint failures. What is the MOST likely cause and resolution?",options:{A:"The application has insufficient memory. Increase parallelism.",B:"The application state is too large for the configured checkpoint interval. Increase checkpoint interval or enable incremental checkpointing.",C:"The Kinesis source stream has too many shards.",D:"The IAM role lacks flink:CreateCheckpoint permission."},correctAnswer:"B",explanations:{correct:"Checkpoint failures typically occur when state is too large to serialize within the checkpoint interval. Solutions: increase interval, enable incremental checkpointing (only saves deltas), or increase parallelism to distribute state.",wrongA:"Memory issues cause OOM errors, not specifically checkpoint failures. Parallelism distributes work but doesn't directly fix checkpoint timing.",wrongB:undefined,wrongC:"More shards means more data but doesn't directly cause checkpoint failures. State size relative to checkpoint interval is the issue.",wrongD:"There is no 'flink:CreateCheckpoint' IAM permission. Checkpointing is internal to the Flink runtime."}},
{id:204,domain:"Domain 1",topic:"AWS Glue ETL",question:"A Glue ETL job has this PySpark code:\n\ndyf = glueContext.create_dynamic_frame.from_catalog(database='mydb', table_name='orders', push_down_predicate=\"year='2024' and month='01'\")\n\nWhat does the push_down_predicate parameter do?",options:{A:"Filters rows AFTER reading all data from S3 (post-read filter).",B:"Filters PARTITIONS at read time — only reads S3 prefixes matching year=2024/month=01, skipping all other partitions.",C:"Validates data quality by rejecting records not matching the predicate.",D:"Creates a new partition in the Glue Data Catalog."},correctAnswer:"B",explanations:{correct:"push_down_predicate filters partitions BEFORE reading data. Only S3 prefixes matching the predicate are loaded. Dramatically reduces I/O, time, and cost by skipping irrelevant partitions.",wrongA:"Post-read filtering would use DynamicFrame.filter() or Spark DataFrame.where(). push_down_predicate is pre-read partition pruning.",wrongB:undefined,wrongC:"push_down_predicate is not a data quality mechanism. It's partition-level filtering.",wrongD:"It doesn't create partitions. It filters which existing partitions to read."}},
{id:205,domain:"Domain 1",topic:"AWS Glue ETL",question:"A Glue PySpark job has this code:\n\nresolved = dyf.resolveChoice(specs=[('discount', 'cast:double')])\ndf = resolved.toDF()\ndf.createOrReplaceTempView('orders')\nresult = spark.sql('SELECT customer_id, SUM(amount) FROM orders GROUP BY customer_id')\n\nWhat is the purpose of resolveChoice before the SQL query?",options:{A:"Converts the DynamicFrame to a DataFrame.",B:"Resolves schema ambiguity — casts the 'discount' field (which may have mixed types) to double, ensuring consistent schema for Parquet/SQL operations.",C:"Removes null values from the discount column.",D:"Creates an index on the discount column for faster queries."},correctAnswer:"B",explanations:{correct:"resolveChoice handles DynamicFrame ChoiceType fields (where a column has mixed types across records). Casting to double ensures all values are the same type, preventing schema errors in downstream SQL/Parquet operations.",wrongA:"toDF() converts to DataFrame. resolveChoice resolves type ambiguity BEFORE conversion.",wrongB:undefined,wrongC:"resolveChoice doesn't remove nulls. It resolves type conflicts (e.g., some records have int, others have string for same field).",wrongD:"DynamicFrames/DataFrames don't have indexes. resolveChoice is about type resolution."}},
{id:206,domain:"Domain 1",topic:"AWS Glue ETL",question:"A Glue job script contains:\n\nfrom awsglue.transforms import Join\njoined = Join.apply(frame1=orders_dyf, frame2=customers_dyf, keys1=['customer_id'], keys2=['id'])\n\nThe job fails with OutOfMemoryError. The orders table has 500M rows, customers has 1000 rows. What optimization should be applied?",options:{A:"Use a broadcast join — convert the small customers DataFrame to broadcast variable.",B:"Increase the number of Glue workers.",C:"Use Glue Job Bookmarks to reduce data.",D:"Switch to a Map state in Step Functions."},correctAnswer:"A",explanations:{correct:"When joining a large table with a small table, broadcast join sends the small table to all executors (avoiding shuffle of the large table). In Spark: df_large.join(broadcast(df_small), ...). Dramatically reduces memory pressure from shuffling 500M rows.",wrongA:undefined,wrongB:"More workers helps but doesn't fix the fundamental shuffle problem. Broadcast join eliminates the expensive shuffle entirely.",wrongC:"Bookmarks reduce data across runs but don't optimize the join within a single run.",wrongD:"Step Functions orchestrates workflows. It can't optimize Spark join strategies."}},
{id:207,domain:"Domain 2",topic:"Amazon S3",question:"A data pipeline needs to read only 3 columns from a 500-column CSV file in S3. The file is 10 GB. The pipeline should minimize data transfer and cost. Which S3 feature retrieves only the needed columns without downloading the entire file?",options:{A:"S3 Object Lambda.",B:"S3 Select — use SQL expressions to filter rows and select columns directly at the storage layer.",C:"S3 Access Points with column restrictions.",D:"Amazon Athena query."},correctAnswer:"B",explanations:{correct:"S3 Select allows running SQL expressions (SELECT col1, col2, col3 FROM s3object WHERE ...) directly on S3 objects. Only matching data is returned, reducing data transfer by up to 400x for selective queries.",wrongA:"Object Lambda transforms GET responses but still downloads the full object to Lambda first. S3 Select filters at the storage layer.",wrongB:undefined,wrongC:"Access Points control access permissions, not column-level data retrieval.",wrongD:"Athena queries S3 data but is a separate service with its own pricing. S3 Select is a feature of S3 itself, integrated into the GetObject API."}},
{id:208,domain:"Domain 2",topic:"Amazon Redshift",question:"A data analyst wants to create a machine learning model directly in Amazon Redshift using SQL, without using SageMaker notebooks or Python. The model should predict customer churn from a Redshift table. Which feature enables this?",options:{A:"Redshift Spectrum with SageMaker endpoint.",B:"Redshift ML — use CREATE MODEL SQL command to train and deploy ML models directly in Redshift.",C:"Redshift Federated Query to SageMaker.",D:"Export to S3 and use SageMaker Autopilot."},correctAnswer:"B",explanations:{correct:"Redshift ML allows creating ML models using SQL: CREATE MODEL churn_model FROM (SELECT ...) TARGET is_churned FUNCTION predict_churn. Redshift handles SageMaker integration transparently. Analysts use SQL only.",wrongA:"Spectrum queries S3 data. It doesn't create ML models.",wrongB:undefined,wrongC:"Federated Query connects to RDS/Aurora, not SageMaker.",wrongD:"Exporting to S3 + SageMaker works but requires leaving Redshift. Redshift ML keeps everything in SQL."}},
{id:209,domain:"Domain 4",topic:"AWS Clean Rooms",question:"Two companies want to perform joint analytics on their combined customer data WITHOUT either company sharing raw data with the other. They need to run aggregate queries (counts, averages) on the intersection of their datasets. Which AWS service enables this?",options:{A:"Amazon Redshift Data Sharing.",B:"AWS Clean Rooms — enables collaborative analytics with cryptographic controls preventing raw data access.",C:"AWS Lake Formation cross-account sharing.",D:"S3 cross-account bucket policies."},correctAnswer:"B",explanations:{correct:"AWS Clean Rooms allows multiple parties to create a collaboration where they can run approved queries on combined data without exposing raw records. Configurable analysis rules restrict what queries are allowed (e.g., only aggregates, minimum group size).",wrongA:"Redshift Data Sharing gives full read access to shared tables. The other party CAN see raw data.",wrongB:undefined,wrongC:"Lake Formation sharing grants table/column access. The other party CAN see individual records.",wrongD:"S3 bucket policies grant object-level access. No query restriction or privacy controls."}},
{id:210,domain:"Domain 4",topic:"Amazon DataZone",question:"A large enterprise needs a centralized data governance portal where data producers can publish datasets and data consumers can discover, request access to, and subscribe to data assets across multiple AWS accounts. Which service provides this?",options:{A:"AWS Glue Data Catalog.",B:"Amazon DataZone — data governance service with business catalog, access workflows, and cross-account data sharing.",C:"AWS Lake Formation.",D:"Amazon Macie."},correctAnswer:"B",explanations:{correct:"Amazon DataZone provides a business data catalog where producers publish data assets, consumers discover and request access via self-service portal, and governance teams approve/deny access. Integrates with Glue, Redshift, Athena across accounts.",wrongA:"Glue Data Catalog stores technical metadata (schemas, partitions). It's not a business-facing governance portal with access request workflows.",wrongB:undefined,wrongC:"Lake Formation provides fine-grained access control but doesn't have the business catalog, discovery portal, or access request workflow that DataZone provides.",wrongD:"Macie discovers sensitive data. It's not a data governance or cataloging service."}},
{id:211,domain:"Domain 2",topic:"Amazon Redshift",multiSelect:true,question:"A Redshift provisioned cluster is experiencing high costs. The team wants to reduce costs while maintaining query performance. Which TWO actions are most effective? (Select TWO)",options:{A:"Enable Concurrency Scaling to add capacity only during peak periods (1 hr free/day).",B:"Use Reserved Instances for the base cluster nodes (up to 75% discount).",C:"Switch all tables to ALL distribution style.",D:"Disable automatic backups."},correctAnswer:["A","B"],explanations:{correct:"(A) Concurrency Scaling adds transient capacity only when needed, with 1 hr free/day. (B) Reserved Instances provide up to 75% discount on base node costs for 1-3 year commitments. Both reduce costs without impacting performance.",wrongA:undefined,wrongB:undefined,wrongC:"ALL distribution copies every table to every node. This wastes storage and is only appropriate for small dimension tables.",wrongD:"Disabling backups saves minimal cost but eliminates disaster recovery capability. Unacceptable trade-off."}},
{id:212,domain:"Domain 1",topic:"Amazon EMR",question:"A team runs Spark jobs and wants to share Kubernetes infrastructure with other microservices for better resource utilization. They need Spark jobs to run alongside web services on the same cluster. Which EMR deployment option enables this?",options:{A:"EMR on EC2 with managed scaling.",B:"EMR on EKS — run Spark jobs on Amazon EKS Kubernetes clusters shared with other workloads.",C:"EMR Serverless.",D:"EMR on Outposts."},correctAnswer:"B",explanations:{correct:"EMR on EKS runs Spark workloads on existing EKS Kubernetes clusters. Spark jobs share cluster resources with other containerized workloads (web services, etc.), improving utilization and reducing infrastructure costs.",wrongA:"EMR on EC2 creates dedicated EMR clusters. Resources aren't shared with other workloads.",wrongB:undefined,wrongC:"EMR Serverless is fully managed without infrastructure visibility. Can't share with other workloads.",wrongD:"EMR on Outposts runs EMR in on-premises data centers. Not about Kubernetes resource sharing."}},
{id:213,domain:"Domain 3",topic:"Amazon Athena",question:"An Athena query performs a JOIN between a 1 TB fact table and a 10 MB dimension table. The query is slow. What Athena optimization technique should be applied?",options:{A:"Use CTAS to materialize the join result.",B:"Convert the dimension table to Parquet.",C:"Use a broadcast join hint or ensure the small table is recognized for automatic broadcast by keeping it under the broadcast threshold.",D:"Increase the Athena workgroup DPU allocation."},correctAnswer:"C",explanations:{correct:"When joining a large table with a small table, the query engine can broadcast the small table to all workers (avoiding expensive shuffle of the large table). Athena/Presto automatically broadcasts tables under a size threshold. Ensuring the dimension table is small and in an efficient format enables this optimization.",wrongA:"CTAS materializes results but doesn't optimize the join execution itself. The join still runs slowly during CTAS.",wrongB:"Parquet helps with column pruning but doesn't address the join strategy (broadcast vs shuffle).",wrongC:undefined,wrongD:"Athena doesn't have configurable DPU allocation for individual queries. It auto-scales."}},
{id:214,domain:"Domain 3",topic:"AWS Glue Data Quality",multiSelect:true,question:"A data pipeline must ensure that: (1) the 'email' column has no nulls, and (2) the 'age' column values are between 0 and 150. Which TWO DQDL rules correctly implement these checks? (Select TWO)",options:{A:"IsComplete \"email\"",B:"ColumnValues \"age\" between 0 and 150",C:"Uniqueness \"email\" >= 1.0",D:"RowCount > 0"},correctAnswer:["A","B"],explanations:{correct:"(A) IsComplete checks 100% non-null for email column. (B) ColumnValues between checks that age values fall within the specified range. Both are correct DQDL syntax.",wrongA:undefined,wrongB:undefined,wrongC:"Uniqueness checks for duplicate values, not null values. IsComplete is the null check.",wrongD:"RowCount > 0 checks the table isn't empty. It doesn't validate email nulls or age ranges."}},
{id:215,domain:"Domain 4",topic:"AWS IAM",multiSelect:true,question:"A Glue ETL job in Account A needs to read data from an S3 bucket in Account B. Which TWO configurations are required? (Select TWO)",options:{A:"Account B's S3 bucket policy must grant s3:GetObject to Account A's Glue role ARN.",B:"Account A's Glue role IAM policy must include s3:GetObject on Account B's bucket ARN.",C:"VPC peering between Account A and Account B.",D:"AWS RAM sharing of the S3 bucket."},correctAnswer:["A","B"],explanations:{correct:"Cross-account S3 access requires BOTH: (A) Resource policy (bucket policy) in Account B granting access to Account A's principal, AND (B) Identity policy (IAM) in Account A allowing the action on Account B's resource.",wrongA:undefined,wrongB:undefined,wrongC:"S3 is accessed via API endpoints, not VPC network paths. VPC peering doesn't enable cross-account S3 access.",wrongD:"AWS RAM doesn't support sharing S3 buckets. Cross-account S3 uses bucket policies + IAM policies."}},
{id:216,domain:"Domain 2",topic:"Amazon Redshift",question:"A team configures Redshift Streaming Ingestion from Kinesis. They create:\n\nCREATE MATERIALIZED VIEW mv_orders AS SELECT * FROM STREAM('kinesis-stream-arn');\n\nHow do new records appear in the materialized view?",options:{A:"Automatically in real-time as records arrive.",B:"Only when REFRESH MATERIALIZED VIEW mv_orders is executed (manually or scheduled).",C:"After running VACUUM on the materialized view.",D:"After the Kinesis stream retention period expires."},correctAnswer:"B",explanations:{correct:"Redshift Streaming Ingestion materialized views must be explicitly refreshed. REFRESH MATERIALIZED VIEW pulls new records from the stream. Can be scheduled via Redshift scheduler or external trigger. Not automatic real-time.",wrongA:"Records don't appear automatically. Refresh must be triggered explicitly.",wrongB:undefined,wrongC:"VACUUM reclaims deleted rows. It doesn't ingest new streaming data.",wrongD:"Stream retention expiration deletes records. It doesn't trigger Redshift ingestion."}},
{id:217,domain:"Domain 3",topic:"Amazon EventBridge",question:"An EventBridge Pipe is configured with SQS source, Lambda enrichment, and Kinesis target. The Lambda enrichment function fails for some records. What happens to those records?",options:{A:"Records are dropped silently.",B:"The entire pipe stops processing.",C:"Failed records are sent to the pipe's configured Dead Letter Queue (DLQ). Successfully enriched records continue to the target.",D:"Records are retried indefinitely."},correctAnswer:"C",explanations:{correct:"EventBridge Pipes supports DLQ configuration. When enrichment fails for a record after retries, it's sent to the DLQ. Other records continue processing normally to the target.",wrongA:"Records aren't silently dropped if DLQ is configured. They're preserved for investigation.",wrongB:"The pipe doesn't stop for individual record failures. It continues processing other records.",wrongC:undefined,wrongD:"Pipes retry based on configured retry policy, then send to DLQ. Not indefinite."}},
{id:218,domain:"Domain 1",topic:"AWS Glue Schema Registry",question:"A Glue Schema Registry is configured with BACKWARD compatibility for a Kafka topic schema. A producer tries to register a new schema version that REMOVES a required field. What happens?",options:{A:"The new version is registered successfully.",B:"Registration is REJECTED — removing a required field breaks backward compatibility (new consumers can't read old data expecting that field).",C:"The old schema is automatically updated.",D:"A warning is logged but registration succeeds."},correctAnswer:"B",explanations:{correct:"BACKWARD compatibility means new schema must be able to READ data written with the old schema. Removing a required field means new consumers expect the field but old data has it — actually FORWARD compatibility issue. In BACKWARD mode, removing required fields is rejected because old consumers reading new data would fail.",wrongA:"Schema Registry enforces compatibility. Incompatible changes are rejected, not silently accepted.",wrongB:undefined,wrongC:"Old schema versions are never modified. New versions are added or rejected.",wrongD:"Compatibility violations are hard rejections, not warnings."}},
{id:219,domain:"Domain 4",topic:"AWS Lake Formation",question:"An Athena query returns 'Access Denied' for a table. The user's IAM role has full Glue and Athena permissions. Lake Formation is enabled. The user has NOT been granted Lake Formation permissions on the table. Why does the query fail?",options:{A:"The S3 bucket policy is blocking access.",B:"Lake Formation is an additional authorization layer. Even with full IAM permissions, Lake Formation must ALSO grant access. Without LF SELECT permission, access is denied.",C:"The Athena workgroup is misconfigured.",D:"The Glue Data Catalog table doesn't exist."},correctAnswer:"B",explanations:{correct:"When Lake Formation is enabled, it adds an authorization layer ON TOP of IAM. Both must allow access. IAM allows the API calls, but Lake Formation controls which DATA the user can access. Missing LF permission = denied.",wrongA:"S3 bucket policy issues would show a different error (S3 access denied during data read, not table access denied).",wrongB:undefined,wrongC:"Workgroup misconfiguration would prevent query execution entirely, not cause table-specific access denied.",wrongD:"Non-existent table would show 'table not found' error, not 'access denied'."}},
{id:220,domain:"Domain 1",topic:"Amazon Managed Service for Apache Flink",question:"When should you choose Amazon Managed Service for Apache Flink over AWS Glue Streaming ETL for stream processing?",options:{A:"When you need serverless execution.",B:"When you need sub-second latency, complex event processing (CEP), or session windows with event-time semantics.",C:"When you need to write output to S3 in Parquet format.",D:"When you need to read from Kinesis Data Streams."},correctAnswer:"B",explanations:{correct:"Flink excels at: sub-second latency (vs Glue's micro-batch seconds), complex event processing patterns, session windows, event-time processing with watermarks. Choose Flink for latency-sensitive or complex streaming logic.",wrongA:"Both are serverless. This isn't a differentiator.",wrongB:undefined,wrongC:"Both can write to S3 in Parquet. Not a differentiator.",wrongD:"Both can read from Kinesis. Not a differentiator."}}
]; // END QUESTION_REPOSITORY
