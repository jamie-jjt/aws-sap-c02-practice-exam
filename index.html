{id:78,domain:"Domain 2",topic:"Amazon S3",question:"S3 CRR enabled for new objects. Existing objects NOT replicated. How to replicate existing objects?",options:{A:"CRR auto-replicates all existing and new.",B:"Use S3 Batch Operations with ReplicateObject for existing, CRR for new.",C:"AWS DataSync for existing.",D:"S3 Inventory + manual copy."},correctAnswer:"B",explanations:{correct:"CRR only replicates objects written AFTER enabling. S3 Batch Operations with ReplicateObject processes existing objects through replication config. Both steps = full replication.",wrongA:"Factually incorrect. CRR does NOT auto-replicate existing objects. Common misconception.",wrongC:"DataSync works but S3 Batch Operations with ReplicateObject is the AWS-native purpose-built solution.",wrongD:"Manual copy is error-prone and doesn't leverage native replication infrastructure."}},
{id:79,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift cluster needs restoration in different region for DR testing. Correct process?",options:{A:"Cross-Region Snapshot Copy — enable copy to target region, restore from copied snapshot.",B:"AWS DMS migration.",C:"Data Sharing cross-region.",D:"UNLOAD → S3 CRR → COPY."},correctAnswer:"A",explanations:{correct:"Cross-Region Snapshot Copy auto-copies snapshots to destination region. Restore new cluster from copied snapshot. Native Redshift DR mechanism.",wrongB:"DMS is for ongoing replication between different engines. Not designed for Redshift DR.",wrongC:"Data Sharing requires both clusters running. Not a restoration mechanism.",wrongD:"UNLOAD/CRR/COPY works but is complex and slow. Snapshot Copy is native and simpler."}},
{id:80,domain:"Domain 2",topic:"Amazon DynamoDB",question:"DynamoDB table needs restoration to exact state at 2:30 PM yesterday due to data corruption. Which feature?",options:{A:"On-Demand Backup restore.",B:"Point-in-Time Recovery (PITR) — restore to any second within 35 days.",C:"DynamoDB Streams replay.",D:"AWS Backup daily restore."},correctAnswer:"B",explanations:{correct:"PITR continuously backs up table. Restore to any second within 35 days. Specify exact time (2:30 PM yesterday), get new table with that moment's data.",wrongA:"On-Demand Backups are manual snapshots. Unless taken at exactly 2:30 PM, can't restore to that moment.",wrongC:"Streams retains 24hr only. Replaying to reconstruct state is complex and unsupported.",wrongD:"AWS Backup creates periodic backups. Can't restore to arbitrary second like PITR."}},
{id:81,domain:"Domain 2",topic:"Amazon S3",question:"Financial services must retain audit files 7 years, prevent ANY deletion/modification (WORM). Which S3 feature?",options:{A:"Versioning with MFA Delete.",B:"S3 Object Lock in Compliance mode with 7-year retention.",C:"Bucket Policy Deny DeleteObject.",D:"AWS Backup vault lock."},correctAnswer:"B",explanations:{correct:"Object Lock Compliance mode: NO user (including root) can delete/overwrite until retention expires. True WORM for regulatory compliance.",wrongA:"MFA Delete can be disabled by bucket owner. Not immutable WORM protection.",wrongC:"Bucket policy Deny can be removed by admin with sufficient permissions. Not legally defensible.",wrongD:"Backup Vault Lock is for backup vaults. S3 Object Lock is the native S3 WORM solution."}},
{id:82,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift needs to join native table with live Aurora PostgreSQL data without ETL. Which feature?",options:{A:"Redshift Spectrum.",B:"Redshift Federated Query — external schema pointing to Aurora.",C:"Glue replication.",D:"Athena Federated Query."},correctAnswer:"B",explanations:{correct:"Federated Query creates external schemas pointing to RDS/Aurora. Join Redshift-native and Aurora tables in single SQL. Pushes predicates to Aurora.",wrongA:"Spectrum queries S3 data via external tables. Can't query Aurora directly.",wrongC:"Glue replication requires ETL, introduces latency, stale data.",wrongD:"Athena Federated Query can't join with Redshift-native tables in single query."}},
{id:83,domain:"Domain 2",topic:"Amazon S3",question:"Web app needs users to upload directly to S3 without exposing AWS credentials. URL expires in 15 min. Correct approach?",options:{A:"Embed IAM keys in frontend JavaScript.",B:"Generate S3 presigned URL on backend, return to frontend for direct upload.",C:"Public bucket with Transfer Acceleration.",D:"API Gateway proxy to S3."},correctAnswer:"B",explanations:{correct:"Presigned URLs: backend generates time-limited URL using IAM role (never exposed). Frontend uploads directly to S3. No credentials in browser.",wrongA:"Embedding keys in frontend is critical security vulnerability. Keys visible in page source.",wrongC:"Public bucket allows anyone to upload anything. Severe security risk.",wrongD:"API Gateway proxy works but adds latency/cost. Presigned URLs enable direct browser-to-S3."}},
{id:84,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift Serverless has namespace and workgroup. What does each store?",options:{A:"Namespace=compute, Workgroup=data.",B:"Namespace=data (databases, schemas, tables). Workgroup=compute (RPUs, VPC, security).",C:"Interchangeable terms.",D:"Workgroup=data, Namespace=IAM."},correctAnswer:"B",explanations:{correct:"Namespace: storage layer (databases, schemas, tables, users, data). Workgroup: compute layer (RPUs, VPC config, security groups). Multiple workgroups can share a namespace.",wrongA:"Opposite of correct definition.",wrongC:"Distinct resources with different purposes.",wrongD:"Incorrect assignment of responsibilities."}},
{id:85,domain:"Domain 2",topic:"Amazon DynamoDB",question:"DynamoDB Global Tables provide what capability?",options:{A:"Read replicas in other regions.",B:"Multi-region active-active replication with last-writer-wins conflict resolution.",C:"Cross-region DMS replication.",D:"Single-region multi-AZ."},correctAnswer:"B",explanations:{correct:"Global Tables: multi-region, multi-active. Writes in any region auto-replicated to all others within seconds. Last-writer-wins (timestamp) for conflicts.",wrongA:"Not just read replicas — full active-active with writes in all regions.",wrongC:"DMS is separate service. Global Tables is native DynamoDB feature.",wrongD:"DynamoDB is already multi-AZ within a region. Global Tables is cross-region."}},
{id:86,domain:"Domain 3",topic:"Amazon EventBridge",question:"EventBridge rule targets Lambda. Lambda throttled, events fail delivery. How to preserve undelivered events?",options:{A:"Enable retry policy only.",B:"Configure SQS Dead Letter Queue on the rule target.",C:"Enable EventBridge Archive.",D:"Use Pipes instead."},correctAnswer:"B",explanations:{correct:"DLQ on rule target captures events that fail delivery after all retries exhausted. Team can inspect and reprocess from DLQ.",wrongA:"Retry policy retries transient failures but events dropped after retry window without DLQ.",wrongC:"Archive stores ALL events regardless of delivery success. Not specifically for failed delivery.",wrongD:"Pipes also supports DLQ but question is about EventBridge rules."}},
{id:87,domain:"Domain 3",topic:"Amazon CloudWatch",question:"Data ops team needs single dashboard showing Glue job counts, Kinesis record rates, and Redshift query durations. Which service?",options:{A:"Systems Manager OpsCenter.",B:"CloudWatch Dashboards — custom widgets for metrics from any AWS service.",C:"Trusted Advisor.",D:"QuickSight."},correctAnswer:"B",explanations:{correct:"CloudWatch Dashboards: custom widgets (line charts, numbers, alarms) displaying metrics from any AWS service in unified view.",wrongA:"OpsCenter manages operational issues/incidents. Not a metrics dashboard.",wrongC:"Trusted Advisor provides recommendations. Not real-time metrics.",wrongD:"QuickSight is BI tool for data analytics. Not operational monitoring."}},
{id:88,domain:"Domain 3",topic:"AWS Glue Data Quality",question:"After Glue Data Quality evaluation, team wants to track quality trends and alert when scores drop below 80%. Correct approach?",options:{A:"Export to S3, query with Athena.",B:"Glue Data Quality publishes metrics to CloudWatch. Create alarm on quality metrics.",C:"DataBrew profiling.",D:"Manual DynamoDB recording."},correctAnswer:"B",explanations:{correct:"Glue Data Quality auto-publishes evaluation metrics to CloudWatch. Create alarms on rule pass/fail counts for automated threshold-based alerting.",wrongA:"S3/Athena provides historical analysis but not real-time alerting.",wrongC:"DataBrew profiling is statistical summaries, not quality rule evaluation.",wrongD:"Manual recording requires custom code. CloudWatch integration is native."}},
{id:89,domain:"Domain 3",topic:"Amazon Athena",question:"Athena query accidentally scans 100 TB ($500). How to prevent future queries exceeding 1 TB?",options:{A:"S3 bucket policy.",B:"Workgroup per-query data usage control — cancels queries exceeding 1 TB.",C:"Prepared statements.",D:"Result reuse."},correctAnswer:"B",explanations:{correct:"Workgroup per-query data usage controls set max bytes scanned. Queries exceeding limit are cancelled before/during execution. Prevents runaway costs.",wrongA:"Bucket policies restrict object access, not scan volume.",wrongC:"Prepared statements cache query plans. Don't limit scanning.",wrongD:"Result reuse serves cached results but doesn't prevent new queries from scanning large data."}},
{id:90,domain:"Domain 3",topic:"Amazon Athena",question:"Data lake team needs ACID transactions, time travel, schema evolution on S3 data queried via Athena. What table format?",options:{A:"Hive-style partitioned Parquet.",B:"Apache Iceberg — ACID, time travel, schema evolution, partition evolution.",C:"Apache Hudi.",D:"Delta Lake."},correctAnswer:"B",explanations:{correct:"Iceberg: natively supported by Athena, Glue, EMR, Redshift Spectrum. ACID (INSERT/UPDATE/DELETE/MERGE), time travel (snapshots), schema evolution, partition evolution.",wrongA:"Hive Parquet: no ACID, no time travel, no schema evolution.",wrongC:"Hudi is supported but Iceberg has broader AWS ecosystem support.",wrongD:"Delta Lake has more limited Athena support compared to Iceberg."}},
{id:91,domain:"Domain 3",topic:"Amazon CloudWatch",question:"CloudWatch Log Group retention. Default behavior and how to auto-delete logs after 90 days?",options:{A:"S3 lifecycle on export bucket.",B:"Set Log Group retention policy to 90 days.",C:"Lambda to delete old streams.",D:"Manual deletion required."},correctAnswer:"B",explanations:{correct:"Log Group retention policy: 1 day to 10 years. Set to 90 days = auto-deletes events older than 90 days. Configured on Log Group.",wrongA:"S3 lifecycle applies to S3, not CloudWatch Logs directly.",wrongC:"Lambda adds overhead. Built-in retention policy is zero-code solution.",wrongD:"Retention CAN be configured. Manual deletion not required."}},
{id:92,domain:"Domain 3",topic:"Amazon EventBridge",question:"EventBridge Scheduler needs to run Step Functions every weekday at 8 AM UTC. Correct cron?",options:{A:"EventBridge rule with cron(0 8 ? * MON-FRI *).",B:"EventBridge Scheduler with cron(0 8 ? * MON-FRI *) targeting Step Functions.",C:"CloudWatch Events rate(1 day) with weekday filter in Lambda.",D:"Step Functions built-in scheduling."},correctAnswer:"B",explanations:{correct:"EventBridge Scheduler: dedicated scheduling service. Cron expression cron(0 8 ? * MON-FRI *) = 8:00 UTC Mon-Fri. Directly targets Step Functions.",wrongA:"EventBridge Rules also work but Scheduler is the purpose-built scheduling service with time zones and flexible windows.",wrongC:"rate(1 day) runs every 24hr regardless of day. Filtering in Lambda adds complexity.",wrongD:"Step Functions has no built-in scheduling. Requires external trigger."}},
{id:93,domain:"Domain 3",topic:"Amazon Athena",question:"Athena needs to join S3 data lake with live DynamoDB table data. Which feature?",options:{A:"Can't query DynamoDB from Athena.",B:"Athena Federated Query with DynamoDB connector.",C:"DynamoDB PartiQL.",D:"Redshift Federated Query."},correctAnswer:"B",explanations:{correct:"Federated Query uses Lambda-based connectors. DynamoDB connector translates Athena SQL to DynamoDB API calls. Join S3 tables with DynamoDB in single query.",wrongA:"Athena CAN query DynamoDB via Federated Query.",wrongC:"PartiQL queries DynamoDB only. Can't join with Athena/S3 data.",wrongD:"Redshift Federated Query joins Redshift with RDS/Aurora, not S3+DynamoDB."}},
{id:94,domain:"Domain 3",topic:"AWS Glue Data Quality",question:"Glue Data Quality rule 'IsComplete order_id' fails. What does this indicate?",options:{A:"Duplicate values in order_id.",B:"One or more NULL values in order_id column.",C:"Wrong data type.",D:"Column missing from schema."},correctAnswer:"B",explanations:{correct:"IsComplete (= Completeness 1.0) checks ALL values are non-null. Failure = at least one NULL in order_id.",wrongA:"Duplicates checked by IsUnique/Uniqueness, not IsComplete.",wrongC:"Type mismatches checked by ColumnDataType rules.",wrongD:"Missing column would cause schema error, not rule failure."}},
{id:95,domain:"Domain 3",topic:"Amazon CloudWatch",question:"Lambda processes streaming data. Need to publish custom metrics (latency, error rates) with low overhead. Recommended approach?",options:{A:"Call put_metric_data() for each metric.",B:"CloudWatch Embedded Metric Format (EMF) — structured JSON logs auto-extracted as metrics.",C:"DynamoDB batch + CloudWatch publish.",D:"X-Ray traces."},correctAnswer:"B",explanations:{correct:"EMF: write structured JSON to CloudWatch Logs. CloudWatch auto-extracts metrics. No extra API calls. More efficient than put_metric_data() for high-throughput.",wrongA:"put_metric_data() adds API call overhead per invocation. Impacts performance at scale.",wrongC:"DynamoDB intermediary adds complexity, latency, cost.",wrongD:"X-Ray traces requests. Not designed for custom business metrics."}},
{id:96,domain:"Domain 3",topic:"Amazon EventBridge",question:"EventBridge Schema Registry does what?",options:{A:"Validates Kafka schemas.",B:"Auto-discovers event schemas from event bus traffic, stores for code generation.",C:"Same as Glue Schema Registry.",D:"Validates API Gateway schemas."},correctAnswer:"B",explanations:{correct:"EventBridge Schema Registry auto-discovers schemas from events flowing through bus (when discovery enabled). Stores schemas, provides code bindings (Java, Python, TypeScript).",wrongA:"Kafka schemas use Glue Schema Registry, not EventBridge Schema Registry.",wrongC:"Separate services. Glue Schema Registry = Kafka/Kinesis. EventBridge Schema Registry = EventBridge events.",wrongD:"API Gateway model schemas are separate from EventBridge Schema Registry."}},
{id:97,domain:"Domain 3",topic:"Amazon CloudWatch",question:"Security team needs to stream CloudWatch Logs from multiple accounts to central account for OpenSearch analysis. Architecture?",options:{A:"S3 export + CRR.",B:"Subscription filters streaming to Kinesis Firehose in central account.",C:"CloudTrail organization trail.",D:"EventBridge cross-account."},correctAnswer:"B",explanations:{correct:"Subscription filters: real-time streaming of log events to Kinesis/Firehose/Lambda. Cross-account: target Firehose in central account. Firehose delivers to OpenSearch.",wrongA:"S3 export is batch (not real-time). Requires additional processing for OpenSearch.",wrongC:"CloudTrail centralizes API audit logs, not application/service logs.",wrongD:"EventBridge routes events, not CloudWatch Logs content."}},
{id:98,domain:"Domain 3",topic:"AWS Glue ETL",question:"Glue ETL job fails with 'AnalysisException: Table or view not found'. Job reads from Data Catalog table. Most likely cause?",options:{A:"Glue job IAM role lacks glue:GetTable permission.",B:"Table name typo.",C:"Table has no partitions.",D:"S3 data files deleted."},correctAnswer:"A",explanations:{correct:"'Table not found' in Glue Spark typically = IAM role lacks glue:GetTable/glue:GetDatabase permission. Can't resolve table reference from catalog.",wrongB:"Name mismatch is possible but IAM permission is the most common cause in Glue context.",wrongC:"Table with no partitions still exists. Would return empty results, not 'not found'.",wrongD:"Deleted S3 files cause read failures, not table resolution errors."}},
{id:99,domain:"Domain 3",topic:"Amazon Athena",question:"Multiple users run same Athena query against static dataset daily. Reduce costs by serving from cache. Which feature?",options:{A:"Workgroup query result reuse with max age setting.",B:"S3 Intelligent-Tiering on results bucket.",C:"CloudFront caching.",D:"Prepared statements."},correctAnswer:"A",explanations:{correct:"Query Result Reuse: identical queries return cached results within max age (up to 7 days). No S3 scan = no cost for repeated queries.",wrongB:"Intelligent-Tiering optimizes storage cost, doesn't prevent re-scanning.",wrongC:"CloudFront can't cache Athena query results.",wrongD:"Prepared statements cache query plans, not results."}},
{id:100,domain:"Domain 3",topic:"AWS Glue ETL",question:"Glue job 'jvm.heap.usage' consistently at 95% in CloudWatch. What does this indicate and fix?",options:{A:"CPU-bound. Use compute-optimized workers.",B:"JVM heap nearly full (memory pressure). Upgrade to G.2X/G.4X or reduce partition size.",C:"Too many concurrent tasks. Reduce DPUs.",D:"Reading too many S3 files."},correctAnswer:"B",explanations:{correct:"95% heap = frequent GC pauses, slowing job. Fix: upgrade worker type (more memory per worker) or reduce data per task (smaller partitions).",wrongA:"Heap usage is memory metric, not CPU.",wrongC:"Reducing DPUs reduces memory, making problem worse.",wrongD:"Bookmarks reduce files but don't address per-task memory pressure."}},
{id:101,domain:"Domain 4",topic:"AWS KMS",question:"KMS automatic key rotation enabled on CMK. What happens to data encrypted with old key material?",options:{A:"Auto re-encrypted with new material.",B:"Old material retained. New data uses new material. Key ID unchanged.",C:"Old key deleted, data inaccessible.",D:"Must manually re-encrypt."},correctAnswer:"B",explanations:{correct:"Rotation: new key material generated. Old material retained for decrypting existing data. Key ID/ARN unchanged. No re-encryption needed.",wrongA:"KMS does NOT auto re-encrypt existing data.",wrongC:"Old material is retained, not deleted. Backward compatibility preserved.",wrongD:"Manual re-encryption is optional, not required for continued access."}},
{id:102,domain:"Domain 4",topic:"AWS IAM",question:"Lambda in Account A needs DynamoDB in Account B. Correct cross-account config?",options:{A:"Share IAM user access keys.",B:"Account B: create role with DynamoDB permissions + trust policy for Account A. Lambda assumes role via STS.",C:"Account A IAM policy on Account B table ARN only.",D:"VPC peering."},correctAnswer:"B",explanations:{correct:"Cross-account: (1) Account B role with permissions + trust policy allowing Account A principal. (2) Lambda calls STS AssumeRole for temporary credentials. Secure, credential-free.",wrongA:"Sharing access keys is security anti-pattern. Long-term credentials are risky.",wrongC:"Account A IAM policy alone can't grant access to Account B resources without Account B's trust.",wrongD:"DynamoDB is API-based service. VPC peering doesn't enable cross-account DynamoDB access."}},
{id:103,domain:"Domain 4",topic:"Amazon Macie",question:"Healthcare company needs Macie to detect proprietary patient ID format 'PAT-' followed by 8 digits. Which feature?",options:{A:"Modify built-in types.",B:"Custom Data Identifier with regex PAT-\\d{8}.",C:"Amazon Comprehend Medical.",D:"Lambda scanner."},correctAnswer:"B",explanations:{correct:"Custom Data Identifiers: define regex patterns for proprietary formats. PAT-\\d{8} tells Macie to detect this pattern alongside built-in types.",wrongA:"Built-in types can't be modified. Custom Data Identifiers extend detection.",wrongC:"Comprehend Medical detects medical entities. Not integrated with Macie for S3 scanning.",wrongD:"Custom Lambda adds overhead. Custom Data Identifiers are native, integrated."}},
{id:104,domain:"Domain 4",topic:"AWS IAM",question:"EMR cluster on EC2 needs S3 and DynamoDB access. Most secure credential approach?",options:{A:"Store access keys in environment variables.",B:"IAM instance profile (EC2 role) with required permissions.",C:"Access keys in S3 bucket.",D:"Secrets Manager for access keys."},correctAnswer:"B",explanations:{correct:"Instance profiles provide temporary, auto-rotated credentials via EC2 metadata service. No long-term credentials stored anywhere. AWS-recommended approach.",wrongA:"Environment variable keys can be exposed in logs/process listings. Security risk.",wrongC:"Keys in S3 accessible to anyone who can read bucket. Anti-pattern.",wrongD:"Secrets Manager is for database passwords/API keys. For AWS service access from EC2, instance profiles are correct."}},
{id:105,domain:"Domain 4",topic:"AWS KMS",question:"Company encrypts in us-east-1 with CMK. Needs to decrypt same data in eu-west-1 for DR without re-encrypting. Which feature?",options:{A:"Export KMS key.",B:"KMS Multi-Region Keys — replica in eu-west-1 shares same key material.",C:"Same key ARN works globally.",D:"Re-encrypt with new key."},correctAnswer:"B",explanations:{correct:"Multi-Region Keys: replica keys share key material. Same key ID, different ARNs. Encrypt in one region, decrypt in another without re-encryption.",wrongA:"KMS keys can't be exported. Key material never leaves KMS.",wrongC:"KMS keys are regional. ARN from us-east-1 can't be used in eu-west-1.",wrongD:"Re-encryption is expensive and time-consuming. Multi-Region Keys eliminate this."}},
{id:106,domain:"Domain 4",topic:"VPC Endpoints",question:"S3 bucket policy condition to restrict access to requests from specific VPC endpoint only. Which condition key?",options:{A:"aws:SourceIp",B:"aws:SourceVpce",C:"aws:PrincipalOrgID",D:"aws:SecureTransport"},correctAnswer:"B",explanations:{correct:"aws:SourceVpce condition restricts to requests originating from specific VPC endpoint ID. Combined with Gateway endpoint = complete data perimeter.",wrongA:"aws:SourceIp restricts by IP address. VPC endpoints use private IPs not predictable for conditions.",wrongC:"aws:PrincipalOrgID restricts to organization members. Not VPC-specific.",wrongD:"aws:SecureTransport enforces HTTPS. Not VPC endpoint restriction."}},
{id:107,domain:"Domain 4",topic:"AWS IAM",question:"Security policy: all S3 uploads must use SSE-KMS with specific key. Deny unencrypted uploads. Correct bucket policy?",options:{A:"Deny s3:PutObject where s3:x-amz-server-side-encryption != aws:kms.",B:"Enable S3 Default Encryption.",C:"Object Lock policy.",D:"KMS key policy deny."},correctAnswer:"A",explanations:{correct:"Bucket policy Deny with StringNotEquals 's3:x-amz-server-side-encryption':'aws:kms' rejects PutObject without SSE-KMS. Add condition for specific key ARN.",wrongB:"Default Encryption auto-encrypts objects arriving without headers but doesn't DENY unencrypted requests. Doesn't enforce specific key.",wrongC:"Object Lock is WORM protection. Not encryption enforcement.",wrongD:"KMS key policies control who can use key. Can't enforce that S3 PutObject uses encryption."}},
{id:108,domain:"Domain 4",topic:"AWS IAM",question:"Organization wants to prevent ANY account from disabling CloudTrail. Regardless of individual IAM policies. Mechanism?",options:{A:"IAM Deny policy in each account.",B:"AWS Organizations SCP denying cloudtrail:StopLogging.",C:"CloudTrail organization trail.",D:"AWS Config detection."},correctAnswer:"B",explanations:{correct:"SCPs are organization-level guardrails. Deny cloudtrail:StopLogging at org root = no IAM user/role in any member account can disable CloudTrail. Can't be overridden.",wrongA:"Account-level IAM policies can be modified by account admins. SCPs can't be bypassed.",wrongC:"Organization trails centralize logging but can still be disabled without SCP protection.",wrongD:"Config detects and remediates but there's a window when CloudTrail is disabled. SCPs prevent the action entirely."}},
{id:109,domain:"Domain 4",topic:"Amazon Macie",question:"Macie discovers publicly accessible S3 bucket with PII. Want auto-remediation to remove public access. Architecture?",options:{A:"Macie auto-remediates.",B:"EventBridge rule matching Macie finding → Lambda calls PutPublicAccessBlock.",C:"AWS Config s3-bucket-public-read-prohibited with auto-remediation.",D:"Both B and C are valid."},correctAnswer:"D",explanations:{correct:"Both valid: (B) Macie finding → EventBridge → Lambda remediation. (C) Config rule with SSM Automation remediation. Both achieve automated public access removal.",wrongA:"Macie doesn't have built-in auto-remediation. Generates findings for EventBridge integration.",wrongB:"Valid but not only answer.",wrongC:"Valid but not only answer."}},
{id:110,domain:"Domain 4",topic:"AWS IAM",question:"Data engineer's IAM role has full Glue permissions. Lake Formation enabled. Engineer can't query table in Athena. Cause?",options:{A:"Missing Athena permissions.",B:"Lake Formation is additional auth layer. Need LF SELECT permission on table too.",C:"KMS permissions missing.",D:"S3 bucket policy."},correctAnswer:"B",explanations:{correct:"When Lake Formation enabled, it adds authorization layer ON TOP of IAM. Both IAM AND Lake Formation must allow. Missing LF SELECT = denied even with full IAM Glue permissions.",wrongA:"Athena permissions needed for service but symptom points to data access, not service access.",wrongC:"KMS would cause decryption error, not table access denial.",wrongD:"S3 policy would cause data read error. LF authorization happens before S3 access."}},
{id:111,domain:"Domain 4",topic:"AWS KMS",question:"KMS Grants provide what capability?",options:{A:"Permanent key policy modification.",B:"Temporary, delegatable permissions. Create → use → retire.",C:"Key export for external use.",D:"Cross-region key access."},correctAnswer:"B",explanations:{correct:"Grants: temporary permissions to use KMS key. Specify grantee, allowed operations, constraints. Retire after use. Ideal for short-lived access without modifying key policy.",wrongA:"Grants are temporary. Key policy modifications are permanent.",wrongC:"KMS keys can't be exported. Grants provide temporary USE permission.",wrongD:"Cross-region access uses Multi-Region Keys, not Grants."}},
{id:112,domain:"Domain 4",topic:"AWS IAM",question:"aws:PrincipalOrgID condition in S3 bucket policy does what?",options:{A:"Restricts to specific IAM users.",B:"Restricts access to principals within the specified AWS Organization only.",C:"Restricts to specific VPC.",D:"Enforces encryption."},correctAnswer:"B",explanations:{correct:"aws:PrincipalOrgID matches the Organization ID of requesting principal. Deny where NOT equal = only org members can access. Auto-includes all current and future accounts.",wrongA:"PrincipalOrgID is organization-level, not individual user-level.",wrongC:"VPC restriction uses aws:SourceVpce.",wrongD:"Encryption enforcement uses s3:x-amz-server-side-encryption."}},
{id:113,domain:"Domain 4",topic:"AWS Lake Formation",question:"Lake Formation Hybrid Access Mode enables what?",options:{A:"Both Lake Formation and IAM/S3 policies grant access simultaneously during migration.",B:"Read-only access mode.",C:"Cross-region access.",D:"Temporary admin access."},correctAnswer:"A",explanations:{correct:"Hybrid Access Mode: tables accessible via BOTH LF permissions AND IAM/S3 policies. Enables gradual migration — some teams use LF, others still use IAM.",wrongB:"Not a read-only mode. Full read/write with dual authorization paths.",wrongC:"Not related to cross-region. It's about coexisting authorization methods.",wrongD:"Not about temporary access. It's about migration coexistence."}},
{id:114,domain:"Domain 4",topic:"AWS IAM",question:"Permission Boundaries prevent what?",options:{A:"Network access.",B:"Privilege escalation — limits max permissions of roles created by delegated users.",C:"Cross-account access.",D:"Service access."},correctAnswer:"B",explanations:{correct:"Permission Boundaries: max permissions an entity can have. When user creates role, role's effective permissions = intersection of policies AND boundary. Prevents creating over-privileged roles.",wrongA:"Permission Boundaries are authorization controls, not network controls.",wrongC:"Cross-account is managed by trust policies and resource policies.",wrongD:"Permission Boundaries limit scope of permissions, not which services can be accessed."}},
{id:115,domain:"Domain 4",topic:"AWS IAM",question:"Glue Security Configuration specifies what?",options:{A:"IAM role for Glue job.",B:"Encryption settings: SSE-KMS for S3, CloudWatch Logs encryption, Job Bookmark encryption.",C:"VPC configuration.",D:"Worker type selection."},correctAnswer:"B",explanations:{correct:"Security Configurations: reusable encryption settings attached to jobs/crawlers. Specify S3 encryption mode (SSE-KMS with CMK), CloudWatch Logs encryption, Job Bookmark encryption.",wrongA:"IAM role is configured on the job itself, not in Security Configuration.",wrongC:"VPC is configured via Glue Connections, not Security Configuration.",wrongD:"Worker type is job-level configuration."}},
{id:116,domain:"Domain 4",topic:"AWS IAM",question:"CloudTrail Data Events for S3 log what?",options:{A:"Bucket-level operations only (CreateBucket, DeleteBucket).",B:"Object-level API operations (GetObject, PutObject, DeleteObject) with requester identity.",C:"Network traffic to S3.",D:"S3 storage class changes."},correctAnswer:"B",explanations:{correct:"Data Events log object-level operations: GetObject, PutObject, DeleteObject with requester IAM identity, source IP, timestamp, object key. Complete audit trail.",wrongA:"Bucket-level operations are Management Events (logged by default). Data Events are object-level.",wrongC:"Network traffic is VPC Flow Logs, not CloudTrail.",wrongD:"Storage class changes are lifecycle actions, not directly logged as Data Events."}},
{id:117,domain:"Domain 4",topic:"AWS Lake Formation",question:"Lake Formation audit logging captures what?",options:{A:"S3 access logs.",B:"All data access events through Lake Formation (who queried which tables, when).",C:"Network traffic.",D:"KMS key usage."},correctAnswer:"B",explanations:{correct:"Lake Formation audit logging via CloudTrail records every GetDataAccess call — when query engine requests access through LF. Complete audit of who accessed which tables.",wrongA:"S3 access logs are separate (Server Access Logging or CloudTrail Data Events).",wrongC:"Network traffic is VPC Flow Logs.",wrongD:"KMS key usage is logged in CloudTrail KMS events, not Lake Formation audit."}},
{id:118,domain:"Domain 4",topic:"AWS IAM",question:"Enforce HTTPS-only access to S3 bucket. Correct bucket policy condition?",options:{A:"Deny where aws:SecureTransport = false.",B:"Allow where aws:SecureTransport = true.",C:"Enable S3 Default Encryption.",D:"Configure bucket HTTPS redirect."},correctAnswer:"A",explanations:{correct:"Deny + Condition Bool aws:SecureTransport:false = deny all HTTP requests. Any non-HTTPS request rejected. More robust than Allow-only approach.",wrongB:"Allow with SecureTransport:true doesn't explicitly deny HTTP. Other statements might still allow HTTP.",wrongC:"Default Encryption is at-rest. Doesn't enforce in-transit HTTPS.",wrongD:"S3 doesn't support HTTP-to-HTTPS redirects. Bucket policy Deny is the mechanism."}},
{id:119,domain:"Domain 4",topic:"VPC Endpoints",question:"Interface endpoint for Kinesis in VPC. How to restrict which network sources can use it?",options:{A:"Endpoint policy.",B:"Security group on the endpoint ENI — allow inbound only from VPC CIDR.",C:"Endpoint policy restricting S3 buckets.",D:"Private DNS."},correctAnswer:"B",explanations:{correct:"Interface endpoints have security groups controlling which traffic reaches ENIs. Allow inbound HTTPS only from VPC CIDR = restrict to local VPC resources.",wrongA:"Endpoint policies control which AWS resources/actions can be accessed THROUGH endpoint. Not which sources can USE it.",wrongC:"S3 bucket restrictions in endpoint policy don't control network source access.",wrongD:"Private DNS resolves service name to private IP. Doesn't restrict access sources."}},
{id:120,domain:"Domain 4",topic:"Amazon Macie",question:"Company with 50 accounts wants Macie across all with centralized findings. Setup?",options:{A:"Enable individually in each account.",B:"Organizations integration — delegated admin, auto-enable in all member accounts.",C:"Security Hub aggregation only.",D:"Lambda forwarding from each account."},correctAnswer:"B",explanations:{correct:"Macie integrates with Organizations. Designate delegated admin. Auto-enable in all current/future member accounts. Centralized findings in admin account.",wrongA:"Individual enablement is operationally burdensome. No auto-enrollment for new accounts.",wrongC:"Security Hub aggregates findings but doesn't enable Macie across accounts.",wrongD:"Custom Lambda adds operational overhead. Native Organizations integration is managed."}},
{id:121,domain:"Domain 1",topic:"Kinesis Data Firehose",question:"Firehose delivery to Redshift fails. Where are failed records sent?",options:{A:"Dropped permanently.",B:"S3 error prefix bucket/path.",C:"Retried indefinitely.",D:"CloudWatch alarm only."},correctAnswer:"B",explanations:{correct:"Failed Redshift COPY records go to configured S3 error prefix. Team can inspect, fix, reprocess.",wrongA:"Firehose preserves failed records in S3 error bucket.",wrongC:"Retries for configurable duration (0-7200s). After exhaustion → S3 error prefix.",wrongD:"Alarms can be configured but records are stored in S3 error prefix."}},
{id:122,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue Python Shell job with 1 DPU. Best use case?",options:{A:"10 TB Spark processing.",B:"Lightweight Python script: API call, small JSON processing, DynamoDB write.",C:"Streaming ETL.",D:"Distributed Ray processing."},correctAnswer:"B",explanations:{correct:"Python Shell: standard Python (not Spark). 1 DPU or 0.0625 DPU. Ideal for lightweight tasks: API calls, small data, orchestration scripts. Much cheaper than Spark.",wrongA:"10 TB requires Spark ETL with multiple workers, not Python Shell.",wrongC:"Streaming ETL is a separate Glue job type using Spark Structured Streaming.",wrongD:"Ray is for distributed Python ML workloads. Overkill for simple scripts."}},
{id:123,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue Streaming ETL vs Amazon Managed Service for Apache Flink for windowed aggregations on Kinesis data?",options:{A:"Only Glue Streaming works.",B:"Only Flink works.",C:"Both valid. Choose based on team expertise (Spark vs Flink/SQL).",D:"Neither supports windowed aggregations."},correctAnswer:"C",explanations:{correct:"Both support windowed aggregations on streaming data. Glue = Spark Structured Streaming (Python/Scala). Flink = SQL-based streaming with lower latency. DEA exam recognizes both.",wrongA:"Flink also supports this use case.",wrongB:"Glue Streaming also supports this use case.",wrongD:"Both support windowed aggregations."}},
{id:124,domain:"Domain 1",topic:"AWS DMS",question:"DMS CDC task to S3 produces many small files. How to consolidate into fewer, larger files?",options:{A:"Enable batch apply mode.",B:"Configure S3 target with larger cdcMaxBatchInterval and cdcMinFileSize.",C:"Use Schema Conversion Tool.",D:"Enable Multi-AZ."},correctAnswer:"B",explanations:{correct:"S3 target endpoint: cdcMaxBatchInterval (max seconds between writes) + cdcMinFileSize (min KB before writing). Larger values = fewer, bigger files.",wrongA:"Batch apply is for database targets (row batching), not S3 file size control.",wrongC:"SCT converts schemas. No effect on CDC file output.",wrongD:"Multi-AZ is HA. No effect on file characteristics."}},
{id:125,domain:"Domain 1",topic:"AWS Lambda",question:"Lambda consuming SQS invoked too frequently with tiny batches (1-2 records). Can tolerate 30s delay. How to reduce invocations?",options:{A:"Increase visibility timeout.",B:"Set MaximumBatchingWindowInSeconds=30 on event source mapping.",C:"Increase batch size to 10000.",D:"Enable SQS long polling."},correctAnswer:"B",explanations:{correct:"MaximumBatchingWindowInSeconds (0-300s): Lambda waits up to 30s to accumulate records before invoking. More records per batch = fewer invocations.",wrongA:"Visibility timeout controls how long message hidden after receive. Doesn't affect Lambda batching.",wrongC:"Larger batch size sets max but doesn't prevent small batches when few messages available. Need batching window.",wrongD:"Long polling is queue-level setting for empty receives. Not Lambda event source mapping control."}},
{id:126,domain:"Domain 1",topic:"Kinesis Data Firehose",question:"Firehose receives JSON with 'region' field. Want S3 objects organized by region (s3://bucket/region=us-east-1/...) without post-processing. Feature?",options:{A:"Static S3 prefix.",B:"Dynamic Partitioning with JQ expression extracting 'region' field.",C:"Lambda transform adding partition header.",D:"Parquet format conversion auto-partitions."},correctAnswer:"B",explanations:{correct:"Dynamic Partitioning: JQ expression extracts values from record content. Reference in S3 prefix pattern: region=!{partitionKeyFromQuery:region}/. Routes records by content.",wrongA:"Static prefix can't reference dynamic values from record content.",wrongC:"Lambda can add metadata but Firehose doesn't use Lambda headers for S3 partitioning. Dynamic Partitioning with JQ is native.",wrongD:"Parquet conversion changes format. Doesn't perform content-based S3 partitioning."}},
{id:127,domain:"Domain 2",topic:"Amazon S3",question:"50 teams share one S3 bucket. Single bucket policy with 50 access patterns is unmanageable. Solution?",options:{A:"Create 50 separate buckets.",B:"S3 Access Points — named endpoint per team with own access policy.",C:"IAM inline policies per team.",D:"S3 ACLs per team."},correctAnswer:"B",explanations:{correct:"Access Points: named endpoints with own policies. One per team with focused policy. Teams use their access point ARN. Bucket policy delegates to access points.",wrongA:"50 buckets fragments data lake, complicates sharing, increases ops overhead.",wrongC:"IAM policies still require bucket policy to allow. Access Points provide cleaner separation.",wrongD:"ACLs are legacy. AWS recommends disabling. Less flexible than Access Points."}},
{id:128,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift column 'status' has only 5 distinct values. Best encoding for minimum storage?",options:{A:"RAW (no compression).",B:"BYTEDICT — dictionary encoding, 1-byte references for low cardinality.",C:"RUNLENGTH.",D:"ZSTD."},correctAnswer:"B",explanations:{correct:"BYTEDICT: stores unique values once in dictionary, replaces with 1-byte references. With 5 values, achieves very high compression (8:1+).",wrongA:"RAW = no compression. Wastes storage for low-cardinality column.",wrongC:"RUNLENGTH compresses consecutive repeated values. Effective for sorted data. BYTEDICT better for unsorted low-cardinality.",wrongD:"ZSTD is general-purpose. BYTEDICT specifically optimized for low cardinality."}},
{id:129,domain:"Domain 2",topic:"Amazon S3",question:"S3 Inventory generates what?",options:{A:"Real-time event notifications.",B:"Daily/weekly reports of all objects with metadata (storage class, encryption, replication status).",C:"PII scan results.",D:"Cost reports."},correctAnswer:"B",explanations:{correct:"S3 Inventory: automated daily/weekly reports of all objects. Includes storage class, encryption status, replication status, ETag, size, last modified. CSV/ORC/Parquet format.",wrongA:"Real-time events are S3 Event Notifications, not Inventory.",wrongC:"PII scanning is Amazon Macie.",wrongD:"Cost reports are AWS Cost Explorer/Cost and Usage Reports."}},
{id:130,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift UNLOAD command does what?",options:{A:"Loads data INTO Redshift.",B:"Exports query results TO S3 in specified format (Parquet, CSV) with parallel output.",C:"Deletes data from Redshift.",D:"Creates external tables."},correctAnswer:"B",explanations:{correct:"UNLOAD: exports query results to S3. FORMAT AS PARQUET for columnar. PARALLEL ON for parallel export across slices. IAM_ROLE for S3 write permissions.",wrongA:"Loading INTO Redshift is COPY command.",wrongC:"Deleting data is DELETE/TRUNCATE.",wrongD:"External tables created with CREATE EXTERNAL TABLE/SCHEMA."}},
{id:131,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift Automatic Table Optimization (ATO) does what?",options:{A:"Requires manual sort/distribution key specification.",B:"Analyzes query patterns and auto-applies optimal sort keys and distribution styles.",C:"Only works with Serverless.",D:"Uses ALL distribution by default."},correctAnswer:"B",explanations:{correct:"ATO monitors query patterns and auto-applies sort keys and distribution styles. Default for new tables (AUTO distribution, AUTO sort key). Recommended approach.",wrongA:"Explicit keys optional. ATO handles optimization automatically.",wrongC:"ATO works with both Provisioned and Serverless.",wrongD:"Default is AUTO (which ATO manages), not ALL."}},
{id:132,domain:"Domain 2",topic:"Amazon S3",question:"S3 event notification when new Parquet uploaded → auto-start Glue job. Correct event-driven architecture?",options:{A:"S3 → SQS → EventBridge Pipes → Glue.",B:"S3 → EventBridge → rule triggers Glue StartJobRun.",C:"S3 Inventory daily detection.",D:"Glue scheduled trigger every 5 min."},correctAnswer:"B",explanations:{correct:"S3 sends events to EventBridge. Rule matches PutObject events, triggers Glue StartJobRun. Modern, event-driven, serverless.",wrongA:"More complex path. S3 → EventBridge → Glue is more direct.",wrongC:"Inventory is daily/weekly batch. Not event-driven.",wrongD:"Polling wastes resources and introduces latency. Event-driven preferred."}},
{id:133,domain:"Domain 2",topic:"Amazon DynamoDB",question:"DynamoDB On-Demand vs Provisioned. When is On-Demand better?",options:{A:"Steady, predictable traffic.",B:"Unpredictable spikes where average is much lower than peak.",C:"Always cheaper than Provisioned.",D:"Only for development environments."},correctAnswer:"B",explanations:{correct:"On-Demand: handles any traffic without pre-provisioning. No throttling on spikes. Pay per request. Best for unpredictable workloads with large variance between average and peak.",wrongA:"Steady traffic = Provisioned is more cost-effective (lower per-request cost).",wrongC:"On-Demand is more expensive per request than Provisioned. Better for unpredictable, not always cheaper.",wrongD:"Valid for production with unpredictable patterns, not just dev."}},
{id:134,domain:"Domain 2",topic:"Amazon S3",question:"Parquet files with schema v1 (10 cols) and v2 (12 cols) in same table. Athena fails reading both. Solution?",options:{A:"Rewrite all old files with new columns.",B:"Enable schema merging: parquet.mr.schema.merge.enable=true in table properties.",C:"Separate tables with UNION ALL.",D:"Convert to CSV."},correctAnswer:"B",explanations:{correct:"Parquet supports additive schema evolution. Enable schema merging in Glue Data Catalog table properties. Returns NULL for missing columns in older files.",wrongA:"Rewriting historical files is expensive. Schema merging handles without rewriting.",wrongC:"Separate tables require query changes. Schema merging is cleaner.",wrongD:"CSV is worse for schema evolution (different column counts cause parsing errors)."}},
{id:135,domain:"Domain 2",topic:"Amazon Redshift",question:"Two Redshift user groups: 'analysts' (long reports) and 'dashboards' (short, latency-sensitive). Dashboard queries queued behind analysts. Fix?",options:{A:"Increase total WLM slots.",B:"Separate WLM queues with different priority/concurrency for each group.",C:"Concurrency Scaling for analysts.",D:"Serverless for dashboards."},correctAnswer:"B",explanations:{correct:"WLM: separate queues per group. Dashboard queue: higher priority, more concurrency, less memory. Analyst queue: more memory per query. Dashboards not blocked by analysts.",wrongA:"More total slots doesn't prioritize dashboards over analysts.",wrongC:"Concurrency Scaling adds capacity for analysts but doesn't prevent dashboard queuing.",wrongD:"Major architectural change. WLM separation is in-place solution."}},
{id:136,domain:"Domain 3",topic:"Amazon Athena",question:"Athena Named Queries provide what?",options:{A:"Parameterized queries.",B:"Save and share SQL queries in Athena console for easy team access.",C:"Query plan caching.",D:"S3 .sql file storage."},correctAnswer:"B",explanations:{correct:"Named Queries: save SQL with name/description in Athena console. Share within workgroup. Easy access for team members. Create via console, CLI, CloudFormation.",wrongA:"Parameterized queries are Prepared Statements, not Named Queries.",wrongC:"Query plan caching is internal optimization, not Named Queries.",wrongD:"S3 .sql files require manual download/paste. Named Queries are native integrated experience."}},
{id:137,domain:"Domain 3",topic:"AWS Glue ETL",question:"Glue Data Quality evaluation configured to FAIL JOB when score below 90%. How?",options:{A:"Custom script check + raise exception.",B:"Configure evaluation action to 'FAIL JOB' when quality below threshold.",C:"CloudWatch Alarm stops job.",D:"Step Functions quality check."},correctAnswer:"B",explanations:{correct:"Glue Data Quality evaluations support 'FAIL JOB' action when rules don't meet threshold. Native integration between quality checks and job execution control.",wrongA:"Custom code works but native FAIL JOB action is purpose-built, no-code solution.",wrongC:"CloudWatch can't directly stop running Glue job. Native action is correct.",wrongD:"Step Functions adds external orchestrator. Native Glue action is simpler."}},
{id:138,domain:"Domain 3",topic:"Amazon CloudWatch",question:"CloudWatch Synthetics canaries do what?",options:{A:"Monitor real user traffic.",B:"Simulate API calls/user interactions on schedule. Report availability and latency even with no real traffic.",C:"Analyze log patterns.",D:"Detect cost anomalies."},correctAnswer:"B",explanations:{correct:"Synthetics: canary scripts (Node.js/Python) simulate interactions on configurable schedule. Report availability/latency metrics. Proactive monitoring independent of real traffic.",wrongA:"Real user monitoring is different (RUM). Synthetics generates synthetic traffic.",wrongC:"Log analysis is Logs Insights/Contributor Insights.",wrongD:"Cost anomalies are AWS Cost Anomaly Detection."}},
{id:139,domain:"Domain 3",topic:"AWS Glue ETL",question:"Glue Crawler exclusion patterns do what?",options:{A:"Exclude IAM roles from crawling.",B:"Prevent crawler from processing files matching specified glob patterns.",C:"Exclude specific databases.",D:"Filter by file format."},correctAnswer:"B",explanations:{correct:"Exclusion patterns: glob patterns (e.g., '*_metadata.json') that tell crawler to skip matching files. Prevents unwanted table creation from non-data files.",wrongA:"Exclusion patterns are for file paths, not IAM roles.",wrongC:"Database exclusion is configured differently (crawler targets).",wrongD:"Crawlers don't have format filters. Exclusion patterns are the mechanism."}},
{id:140,domain:"Domain 3",topic:"Amazon EventBridge",question:"Cross-account EventBridge: Account A events need to reach Account B. Configuration?",options:{A:"AWS RAM sharing.",B:"Account A: resource policy on bus granting Account B + rule targeting Account B's bus.",C:"Account B subscribes to Account A's bus.",D:"Kinesis intermediary."},correctAnswer:"B",explanations:{correct:"Cross-account: (1) Account A resource policy grants Account B PutEvents. (2) Account A rule targets Account B's event bus. Events forwarded to Account B for processing.",wrongA:"RAM doesn't support EventBridge bus sharing.",wrongC:"Account B can't subscribe to Account A's bus. Events must be forwarded FROM Account A.",wrongD:"Kinesis intermediary adds complexity. EventBridge native cross-account is direct."}},
{id:141,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue job needs to read from RDS MySQL in VPC. Connection timeout. What must be configured?",options:{A:"Glue Connection with JDBC URL, credentials, VPC/subnet/security group. SG allows traffic from Glue ENI.",B:"VPC peering between Glue and RDS.",C:"AWS PrivateLink for RDS.",D:"Public RDS endpoint."},correctAnswer:"A",explanations:{correct:"Glue Connections: store JDBC details + VPC config. Glue creates ENI in specified subnet. RDS security group must allow inbound from Glue ENI's security group on DB port.",wrongB:"Glue uses ENI injection via Connections, not VPC peering.",wrongC:"RDS accessed via JDBC through VPC network, not PrivateLink.",wrongD:"Public RDS is security anti-pattern. Use Glue Connection with proper VPC/SG config."}},
{id:142,domain:"Domain 1",topic:"Amazon MSK",question:"MSK cluster high consumer lag during peak. 6 partitions, 6 consumers. First optimization?",options:{A:"Larger broker instance type.",B:"Increase partitions to 12, scale consumer group to 12.",C:"MSK Connect offload.",D:"MSK Serverless."},correctAnswer:"B",explanations:{correct:"Kafka: max consumer parallelism = number of partitions. 6 partitions + 6 consumers = each handles 1 partition. Increase to 12 partitions = 12 consumers = doubled throughput.",wrongA:"Larger brokers increase broker capacity but consumer parallelism still bounded by partition count.",wrongC:"MSK Connect runs connectors, not consumer application scaling.",wrongD:"MSK Serverless scales brokers but doesn't increase partition count. Must explicitly increase partitions."}},
{id:143,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue job writes CSV to S3. Need Snappy-compressed Parquet output. Correct API?",options:{A:"write_dynamic_frame with format='parquet', format_options={'compression':'snappy'}.",B:"format='csv' with compression='snappy'.",C:"toDF().write.parquet() with compression='snappy'.",D:"Both A and C are valid."},correctAnswer:"D",explanations:{correct:"Both valid: (A) Glue DynamicFrame API with format='parquet' + format_options. (C) Convert to Spark DataFrame, use native Spark write API. Both produce identical Parquet output.",wrongA:"Valid but not only answer.",wrongB:"format='csv' with snappy = compressed CSV, not Parquet. Different formats.",wrongC:"Valid but not only answer."}},
{id:144,domain:"Domain 1",topic:"AWS Step Functions",question:"Step Functions Map state with MaxConcurrency. What does it do?",options:{A:"Defines static parallel branches.",B:"Dynamically iterates over input array, applies iterator to each item. MaxConcurrency controls parallel executions.",C:"Routes based on conditions.",D:"Loops until condition met."},correctAnswer:"B",explanations:{correct:"Map state: iterates over array from input. Applies sub-state-machine to each item. MaxConcurrency (0=unlimited) controls how many run in parallel.",wrongA:"Static branches = Parallel state. Map is for dynamic arrays.",wrongC:"Condition routing = Choice state.",wrongD:"Loop until condition = not a native state type (use Choice + loop pattern)."}},
{id:145,domain:"Domain 1",topic:"Kinesis Data Streams",question:"Trading app requires all orders for same stock symbol processed in strict sequence. 20 shards. How to assign partition keys?",options:{A:"Random UUID for even distribution.",B:"Stock symbol as partition key — same symbol always same shard, ordered.",C:"Timestamp for chronological ordering.",D:"Enable EFO for ordering."},correctAnswer:"B",explanations:{correct:"Kinesis guarantees ordering WITHIN a shard. Stock symbol as partition key = all 'AAPL' records hash to same shard = delivered in write order. Standard per-entity ordering pattern.",wrongA:"Random UUIDs distribute evenly but destroy per-symbol ordering.",wrongC:"Timestamps distribute by time, not by symbol. Same symbol on different shards.",wrongD:"EFO provides dedicated read throughput. Doesn't provide cross-shard ordering."}},
{id:146,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift sort key on (order_date, customer_id). Most common query filters by order_date range. Is this optimal?",options:{A:"No, customer_id should be first.",B:"Yes, compound sort key with most-filtered column (order_date) as leading column is optimal.",C:"Should use interleaved.",D:"No sort key needed."},correctAnswer:"B",explanations:{correct:"Compound sort key: leading column should be most frequently filtered. order_date range queries benefit from zone map pruning on the leading column.",wrongA:"customer_id first is optimal only if customer_id is the primary filter.",wrongC:"Interleaved gives equal weight. For clear primary filter (order_date), compound outperforms.",wrongD:"Without sort key, full table scans for every query. Sort keys provide significant improvement."}},
{id:147,domain:"Domain 2",topic:"Amazon Aurora",question:"OLTP Aurora MySQL. Analytics queries slowing primary. Offload read-heavy analytics without affecting OLTP?",options:{A:"Aurora Read Replica — direct analytics to reader endpoint.",B:"Multi-AZ standby for reads.",C:"Redshift Federated Query.",D:"DynamoDB read cache."},correctAnswer:"A",explanations:{correct:"Aurora Read Replicas share storage with primary. Minimal replication lag (<100ms). Reader endpoint load-balances across replicas. OLTP writes unaffected.",wrongB:"Aurora Multi-AZ standby is for failover HA. Doesn't serve read traffic in standard config.",wrongC:"Federated Query is for occasional cross-database queries, not regular analytics offloading.",wrongD:"DynamoDB is NoSQL. Can't serve as relational Aurora read cache without major changes."}},
{id:148,domain:"Domain 2",topic:"Amazon OpenSearch",question:"OpenSearch cluster JVM heap >85%, slow queries. 3 nodes, 32 GB RAM each. Remediation?",options:{A:"Increase JVM heap to 32 GB.",B:"Add more data nodes to distribute shards and reduce per-node heap pressure.",C:"Enable UltraWarm.",D:"Reduce primary shards."},correctAnswer:"B",explanations:{correct:"High heap pressure = nodes under memory stress. Adding nodes distributes shards across more nodes, reducing per-node data/query load. Primary scaling mechanism.",wrongA:"JVM heap recommended at 50% of RAM, max 32 GB (compressed OOPs). Already at recommended max.",wrongC:"UltraWarm offloads cold indices. If all data actively queried, doesn't help.",wrongD:"Fewer shards can increase per-shard size, potentially worsening pressure."}},
{id:149,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift external schema referencing Glue Data Catalog. What does this enable?",options:{A:"Loading data into Redshift.",B:"Redshift Spectrum — query S3 data via external tables without loading.",C:"Materialized views on S3.",D:"Data Sharing."},correctAnswer:"B",explanations:{correct:"External schema → Glue Data Catalog → external tables. Redshift Spectrum queries S3 data in-place with standard SQL. Pushes predicates to S3 layer.",wrongA:"Loading is COPY command. External schema enables querying without loading.",wrongC:"Materialized views store pre-computed results in Redshift, not on S3.",wrongD:"Data Sharing is Redshift-to-Redshift. Spectrum is Redshift-to-S3."}},
{id:150,domain:"Domain 2",topic:"Amazon S3",question:"S3 Requester Pays bucket. What does it do?",options:{A:"Speeds up transfers.",B:"Requester (downloader) pays for data transfer and request costs instead of bucket owner.",C:"Reduces storage costs.",D:"Distributes via CDN."},correctAnswer:"B",explanations:{correct:"Requester Pays: downloading AWS account pays transfer + request costs. Bucket owner pays only storage. Standard for public datasets (AWS Open Data). Requires authenticated requests.",wrongA:"Transfer Acceleration speeds uploads. Requester Pays shifts costs.",wrongC:"Storage costs still paid by bucket owner.",wrongD:"CDN distribution is CloudFront. Requester Pays is a billing model."}},
{id:151,domain:"Domain 3",topic:"AWS Glue ETL",question:"Team wants notification when Glue Crawler adds new tables or updates schemas. Approach?",options:{A:"CloudWatch Alarms on Crawler metrics.",B:"EventBridge rule matching Glue Data Catalog events (CreateTable, UpdateTable) → SNS.",C:"KMS rotation notifications.",D:"AWS Config."},correctAnswer:"B",explanations:{correct:"Glue publishes Data Catalog events to EventBridge: CreateTable, UpdateTable, DeleteTable, etc. Rule matching these events → SNS for real-time notifications.",wrongA:"Crawler completion is an event, not a metric. EventBridge is correct mechanism.",wrongC:"KMS rotation is unrelated to catalog changes.",wrongD:"Config tracks resource configuration changes but EventBridge is more direct for catalog events."}},
{id:152,domain:"Domain 3",topic:"Amazon CloudWatch",question:"CloudWatch Contributor Insights for Kinesis. What does it identify?",options:{A:"Anomalies in aggregate metrics.",B:"Top partition keys by record count — detects hot partition keys.",C:"Log error patterns.",D:"Cost contributors."},correctAnswer:"B",explanations:{correct:"Contributor Insights analyzes log data to identify top contributors. For Kinesis: identifies top partition keys by record count, helping detect hot partitions.",wrongA:"Anomaly Detection handles aggregate metric anomalies.",wrongC:"Log error patterns are Logs Insights queries.",wrongD:"Cost contributors are Cost Explorer."}},
{id:153,domain:"Domain 3",topic:"AWS Glue ETL",question:"Glue Crawler needs to run 30 min after ETL job completes (not fixed schedule). Trigger mechanism?",options:{A:"Schedule every hour.",B:"Glue Workflow Conditional Trigger on job SUCCEEDED, or EventBridge rule on job completion.",C:"Both B options are valid.",D:"Manual only."},correctAnswer:"C",explanations:{correct:"Both valid: Glue Workflow Conditional Trigger (native Glue) or EventBridge rule matching Glue Job State Change SUCCEEDED → StartCrawler API.",wrongA:"Hourly schedule is time-based, not event-driven. Job may not be done.",wrongB:"Both approaches within B are valid, making C the complete answer.",wrongD:"Both automated approaches exist."}},
{id:154,domain:"Domain 3",topic:"Amazon Athena",question:"ANALYZE TABLE in Athena does what?",options:{A:"Deletes table.",B:"Computes column-level statistics (cardinality, min/max, null counts) stored in Glue Data Catalog.",C:"Repairs partitions.",D:"Converts format."},correctAnswer:"B",explanations:{correct:"ANALYZE TABLE computes statistics stored in Glue Data Catalog. Improves Athena query planner decisions (better join strategies, filter estimates).",wrongA:"DROP TABLE deletes. ANALYZE updates statistics.",wrongC:"MSCK REPAIR TABLE repairs partitions.",wrongD:"CTAS converts format. ANALYZE only computes statistics."}},
{id:155,domain:"Domain 4",topic:"AWS KMS",question:"KMS key policy grants root account full access. Engineer's IAM role has kms:Decrypt. Can engineer decrypt?",options:{A:"No — need explicit key policy entry.",B:"Yes — root account statement delegates KMS authorization to IAM policies.",C:"No — must be key user in console.",D:"Yes — IAM always overrides key policy."},correctAnswer:"B",explanations:{correct:"When key policy grants root full access (default), IAM policies CAN grant KMS permissions. Root statement delegates authorization to IAM. Engineer's kms:Decrypt works.",wrongA:"With root delegation, explicit key policy entry not needed. IAM policy sufficient.",wrongC:"Key user list modifies key policy. With root delegation, IAM policy alone works.",wrongD:"IAM doesn't override key policy. They work together. Root delegation enables IAM to grant."}},
{id:156,domain:"Domain 4",topic:"AWS Lake Formation",question:"Lake Formation administrator wants to prevent specific role from accessing 'finance' database even with broad IAM permissions. Config?",options:{A:"S3 bucket policy deny.",B:"Revoke all Lake Formation permissions on 'finance' database from the role.",C:"Remove IAM Glue permissions.",D:"Data filters to hide database."},correctAnswer:"B",explanations:{correct:"Lake Formation can explicitly revoke/deny permissions. Even with broad IAM Glue permissions, LF denial prevents access. LF authorization layer sits on top of IAM.",wrongA:"S3 policy doesn't prevent seeing table metadata or running queries (which fail at S3 level).",wrongC:"Removing all Glue IAM permissions prevents ALL Glue access, not just finance database.",wrongD:"Data filters are row/column level. Revoking permissions is database-level access control."}},
{id:157,domain:"Domain 4",topic:"AWS IAM",question:"Confused deputy prevention for Glue service role. What condition in trust policy?",options:{A:"aws:SourceAccount condition.",B:"aws:SourceArn condition specifying Glue job/account ARN.",C:"MFA requirement.",D:"Permission boundary."},correctAnswer:"B",explanations:{correct:"aws:SourceArn/aws:SourceAccount in trust policy ensures role only assumed by Glue jobs in specified account/with specified ARN. Prevents cross-account confused deputy.",wrongA:"aws:SourceAccount is valid but less specific than SourceArn.",wrongC:"MFA can't be required for service roles (Glue is a service, not human).",wrongD:"Permission boundaries limit role permissions, not who can assume it."}},
{id:158,domain:"Domain 4",topic:"VPC Endpoints",question:"Lambda in private VPC subnet needs to write to Kinesis without internet. What to configure?",options:{A:"NAT Gateway.",B:"VPC Interface Endpoint for Kinesis (kinesis-streams).",C:"VPC Gateway Endpoint for Kinesis.",D:"Public subnet with IGW."},correctAnswer:"B",explanations:{correct:"Kinesis requires Interface Endpoint (PrivateLink). Creates ENIs in subnet. Lambda writes to Kinesis via private network.",wrongA:"NAT Gateway routes to internet. Requirement is to avoid internet.",wrongC:"Kinesis does NOT support Gateway endpoints. Only S3 and DynamoDB do.",wrongD:"Public subnet routes to internet. Requirement is no internet access."}},
{id:159,domain:"Domain 4",topic:"AWS IAM",question:"Glue job cross-account: Account A job reads Account B's Glue Data Catalog table shared via RAM. What permissions needed in Account A?",options:{A:"glue:GetTable on Account B table ARN only.",B:"s3:GetObject on Account B's S3 bucket only.",C:"Both glue:GetTable on shared table AND s3:GetObject on Account B's data bucket.",D:"ram:AcceptResourceShareInvitation."},correctAnswer:"C",explanations:{correct:"Need BOTH: (A) glue:GetTable for catalog metadata access. (C) s3:GetObject for actual data file access. Metadata alone insufficient without data access.",wrongA:"Metadata access alone can't read actual data files.",wrongB:"S3 access alone can't resolve table schema/partition locations from catalog.",wrongD:"RAM acceptance is one-time admin action, not runtime job permission."}},
{id:160,domain:"Domain 4",topic:"AWS IAM",question:"Glue job needs in-transit encryption to RDS MySQL. Configuration?",options:{A:"Enable SSL/TLS on RDS + JDBC URL with useSSL=true&requireSSL=true.",B:"KMS encryption on Glue Connection.",C:"VPN between Glue and RDS.",D:"S3 SSE-KMS on temp storage."},correctAnswer:"A",explanations:{correct:"In-transit encryption: (1) Enable SSL on RDS (parameter group). (2) JDBC URL: useSSL=true, requireSSL=true. Optionally specify RDS CA certificate.",wrongB:"KMS on Connection encrypts stored credentials (password), not data in transit over JDBC.",wrongC:"VPN provides network encryption but JDBC connection may still be unencrypted within tunnel. SSL/TLS is application-level.",wrongD:"S3 SSE-KMS encrypts Glue temp storage. Doesn't encrypt JDBC connection."}},
