<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AWS SAP-C02 — Solutions Architect Professional Practice Exam</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
// @ts-nocheck
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        aws: { orange: '#FF9900', dark: '#232F3E', navy: '#1B2838' },
        surface: { 1: '#0f172a', 2: '#1e293b', 3: '#334155' }
      }
    }
  }
}
</script>
<style>
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
.fade-in { animation: fadeIn .25s ease-out; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
.animate-pulse-slow { animation: pulse 2s infinite; }
.progress-fill { transition: width .4s cubic-bezier(.4,0,.2,1); }
.option-btn { transition: all .15s ease; }
.option-btn:active { transform: scale(.98); }
.option-correct { background: #065f46 !important; border-color: #10b981 !important; color: #d1fae5 !important; }
.option-wrong { background: #7f1d1d !important; border-color: #ef4444 !important; color: #fecaca !important; }
.option-missed { background: #064e3b !important; border-color: #34d399 !important; }
</style>
</head>
<body class="bg-surface-1 text-gray-100 min-h-screen flex flex-col">

<!-- STICKY NAV -->
<nav class="bg-surface-2 border-b border-gray-800 sticky top-0 z-50 backdrop-blur-md bg-opacity-90">
  <div class="max-w-7xl mx-auto px-3 sm:px-6 flex items-center justify-between h-12 sm:h-14">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 bg-aws-orange rounded-md flex items-center justify-center font-black text-white text-xs">S</div>
      <span class="font-bold text-white text-xs sm:text-sm hidden sm:block">SAP-C02 Mastery</span>
    </div>
    <div class="flex items-center gap-0.5 sm:gap-1">
      <button onclick="showPage('exam')" id="tab-exam" class="tab-btn px-2.5 sm:px-4 py-3 text-xs sm:text-sm font-semibold text-gray-400 hover:text-white transition-colors border-b-2 border-transparent">
        Exam
      </button>
      <button onclick="showPage('review')" id="tab-review" class="tab-btn px-2.5 sm:px-4 py-3 text-xs sm:text-sm font-semibold text-gray-400 hover:text-white transition-colors border-b-2 border-transparent">
        Review
      </button>
      <button onclick="showPage('stats')" id="tab-stats" class="tab-btn px-2.5 sm:px-4 py-3 text-xs sm:text-sm font-semibold text-gray-400 hover:text-white transition-colors border-b-2 border-transparent">
        Stats
      </button>
      <button onclick="showPage('docs')" id="tab-docs" class="tab-btn px-2.5 sm:px-4 py-3 text-xs sm:text-sm font-semibold text-gray-400 hover:text-white transition-colors border-b-2 border-transparent">
        Docs
      </button>
      <button onclick="toggleAssistant()" id="btn-assistant" class="ml-2 sm:ml-4 w-8 h-8 bg-aws-orange rounded-full flex items-center justify-center text-white text-sm font-bold hover:scale-110 transition-transform" title="Study Assistant">
        ?
      </button>
    </div>
  </div>
</nav>

<!-- MAIN LAYOUT: Content + Assistant Panel -->
<div class="flex flex-1 overflow-hidden relative">
  <!-- MAIN CONTENT -->
  <main class="flex-1 overflow-y-auto" id="main-content">
    <div id="page-exam" class="page max-w-3xl mx-auto px-3 sm:px-6 py-4 sm:py-8"></div>
    <div id="page-review" class="page hidden max-w-5xl mx-auto px-3 sm:px-6 py-4 sm:py-8"></div>
    <div id="page-stats" class="page hidden max-w-3xl mx-auto px-3 sm:px-6 py-4 sm:py-8"></div>
    <div id="page-docs" class="page hidden max-w-5xl mx-auto px-3 sm:px-6 py-4 sm:py-8"></div>
  </main>

  <!-- STUDY ASSISTANT PANEL -->
  <aside id="assistant-panel" class="hidden w-full sm:w-96 h-full max-h-screen bg-surface-2 border-l border-gray-800 flex flex-col fixed sm:relative inset-0 sm:inset-auto z-40 overflow-hidden">
    <div class="flex items-center justify-between p-3 border-b border-gray-700">
      <div class="flex items-center gap-2">
        <div class="w-6 h-6 bg-aws-orange rounded-full flex items-center justify-center text-xs font-bold text-white">K</div>
        <span class="font-bold text-sm text-white">Study Assistant</span>
      </div>
      <button onclick="toggleAssistant()" class="text-gray-400 hover:text-white text-lg">&times;</button>
    </div>
    <div id="assistant-messages" class="flex-1 overflow-y-auto p-3 space-y-3 text-sm"></div>
    <div class="p-3 border-t border-gray-700">
      <div class="flex gap-2">
        <input id="assistant-input" type="text" placeholder="Ask about any AWS architecture topic..."
          class="flex-1 bg-surface-1 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-aws-orange"
          onkeydown="if(event.key==='Enter')sendAssistantMsg()"/>
        <button onclick="sendAssistantMsg()" class="bg-aws-orange hover:bg-orange-600 text-white px-3 py-2 rounded-lg text-sm font-bold transition-colors">Send</button>
      </div>
      <div id="quick-actions" class="mt-2 flex flex-wrap gap-1"></div>
    </div>
  </aside>
</div>

<script>
// @ts-nocheck

// ============================================================
// NAVIGATION & ASSISTANT
// ============================================================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('border-aws-orange','text-white'); b.classList.add('border-transparent','text-gray-400'); });
  document.getElementById('page-' + name).classList.remove('hidden');
  const tab = document.getElementById('tab-' + name);
  tab.classList.add('border-aws-orange','text-white');
  tab.classList.remove('border-transparent','text-gray-400');
}

let assistantOpen = false;
function toggleAssistant() {
  assistantOpen = !assistantOpen;
  const panel = document.getElementById('assistant-panel');
  panel.classList.toggle('hidden', !assistantOpen);
  updateQuickActions();
  if (assistantOpen && document.getElementById('assistant-messages').children.length === 0) {
    addAssistantMsg('assistant', "Hi! I'm your SAP-C02 Study Assistant. Ask me anything about AWS architecture — services, architectures, exam strategies, or explanations for any question you're reviewing.");
  }
}

function addAssistantMsg(role, text) {
  const container = document.getElementById('assistant-messages');
  const div = document.createElement('div');
  div.className = role === 'user'
    ? 'ml-8 bg-aws-orange bg-opacity-20 border border-orange-800 rounded-xl p-3 text-gray-200'
    : 'mr-4 bg-surface-3 rounded-xl p-3 text-gray-200';
  div.innerHTML = `<div class="text-xs font-bold mb-1 ${role==='user'?'text-orange-300':'text-blue-300'}">${role==='user'?'You':'Assistant'}</div><div class="text-sm leading-relaxed">${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendAssistantMsg() {
  const input = document.getElementById('assistant-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addAssistantMsg('user', msg);
  // Generate contextual response
  setTimeout(() => {
    const response = generateAssistantResponse(msg);
    addAssistantMsg('assistant', response);
  }, 400);
}

function quickAsk(key) {
  const q = examState.questions && examState.questions[examState.current];
  let response = '';
  const label = {explain:'Explain this question',traps:'Exam traps for this topic',memory:'Memory trick',compare:'Compare with alternatives',numbers:'Key numbers & limits',whyA:'Why A?',whyB:'Why B?',whyC:'Why C?',whyD:'Why D?'};
  addAssistantMsg('user', label[key] || key);
  switch(key) {
    case 'explain':
      if(q){const ca=q.multiSelect?q.correctAnswer:[q.correctAnswer];const wr=['A','B','C','D'].filter(o=>!ca.includes(o)).map(o=>'<br>\u274C <b>'+o+':</b> '+(q.explanations['wrong'+o]||'')).join('');response='\uD83D\uDCD6 <b>'+q.topic+'</b><br><br>\u2705 <b>Correct ('+ca.join(', ')+'):</b> '+q.explanations.correct+wr;}
      else response='Start a quiz first to get question explanations.'; break;
    case 'whyA': case 'whyB': case 'whyC': case 'whyD':
      if(q){const opt=key.slice(3);const ca=q.multiSelect?q.correctAnswer:[q.correctAnswer];if(ca.includes(opt))response='\u2705 <b>Option '+opt+' is CORRECT:</b><br>'+q.explanations.correct;else response='\u274C <b>Option '+opt+' is WRONG:</b><br>'+(q.explanations['wrong'+opt]||'')+'<br><br>\u2705 <b>Correct ('+ca.join(',')+'):</b> '+q.explanations.correct;}
      else response='Start a quiz first.'; break;
    case 'traps': response=generateAssistantResponse((q?q.topic+' ':'')+'exam traps strategy'); break;
    case 'memory': response=generateAssistantResponse('memory mnemonic remember'); break;
    case 'compare': response=generateAssistantResponse((q?q.topic+' ':'')+'vs compare difference'); break;
    case 'numbers': response=generateAssistantResponse((q?q.topic+' ':'')+'capacity limit throughput'); break;
    default: response=generateAssistantResponse(key);
  }
  addAssistantMsg('assistant', response);
}

function updateQuickActions() {
  const c = document.getElementById('quick-actions');
  if (!c) return;
  const q = examState.questions && examState.questions[examState.current];
  const btn = (key, text, cls) => '<button onclick="quickAsk(\''+key+'\')" class="text-xs '+cls+' px-2 py-1 rounded hover:opacity-80 border transition-colors">'+text+'</button>';
  let h = '';
  if (q && examState.submitted) {
    h += btn('explain','\uD83D\uDCD6 Full explanation','bg-blue-900/40 text-blue-300 border-blue-700/50');
    const ca = q.multiSelect ? q.correctAnswer : [q.correctAnswer];
    ['A','B','C','D'].forEach(o => {
      const ok = ca.includes(o);
      h += btn('why'+o, (ok?'\u2705':'\u274C')+' Why '+o+'?', ok?'bg-green-900/40 text-green-300 border-green-700/50':'bg-red-900/40 text-red-300 border-red-700/50');
    });
    h += btn('traps','\u26A0 Traps','bg-surface-3 text-gray-300 border-gray-700');
  } else if (q) {
    h += btn('explain','\uD83D\uDCD6 Explain','bg-surface-3 text-gray-300 border-gray-700');
    h += btn('traps','\u26A0 Traps','bg-surface-3 text-gray-300 border-gray-700');
    h += btn('memory','\uD83E\uDDE0 Memory','bg-surface-3 text-gray-300 border-gray-700');
    h += btn('compare','\u2696 Compare','bg-surface-3 text-gray-300 border-gray-700');
    h += btn('numbers','# Numbers','bg-surface-3 text-gray-300 border-gray-700');
  } else {
    h += btn('traps','\u26A0 Exam tips','bg-surface-3 text-gray-300 border-gray-700');
    h += btn('memory','\uD83E\uDDE0 Memory tricks','bg-surface-3 text-gray-300 border-gray-700');
  }
  c.innerHTML = h;
}

function generateAssistantResponse(msg) {
  const lower = msg.toLowerCase();
  // Topic-specific knowledge base responses
  if (lower.includes('kinesis') && lower.includes('shard')) return "📌 <b>Kinesis Shards Key Facts:</b><br>• Write: 1 MB/s OR 1,000 records/s per shard<br>• Read (standard): 2 MB/s shared across all consumers<br>• Read (EFO): 2 MB/s dedicated per consumer<br>• Use UpdateShardCount API to resize<br>• Partition key determines shard routing (MD5 hash)<br><br><b>Exam Trap:</b> ProvisionedThroughputExceededException on WRITE = need more shards. On READ = need Enhanced Fan-Out or fewer consumers.";
  if (lower.includes('glue') && lower.includes('bookmark')) return "📌 <b>Glue Job Bookmarks:</b><br>• Track processed S3 files by path + ETag + last-modified<br>• States: enabled, disabled, paused<br>• Reset via ResetJobBookmark API (reprocesses from specific run)<br>• Only work with S3 and JDBC sources<br>• Common issue: deployment resets bookmark state → full reprocessing<br><br><b>Exam Trap:</b> Bookmarks don't work with DynamoDB sources. Use DynamoDB Streams for incremental DynamoDB processing.";
  if (lower.includes('firehose') && lower.includes('buffer')) return "📌 <b>Firehose Buffering:</b><br>• Size: 1–128 MB<br>• Interval: 60–900 seconds<br>• Delivery triggers on WHICHEVER comes first<br>• Dynamic Partitioning: route to S3 prefixes by record content (JQ)<br>• Redshift delivery ALWAYS stages in S3 first (COPY command)<br><br><b>Exam Trap:</b> Firehose to Redshift is NOT direct streaming — it's S3 → COPY. For true sub-second Redshift ingestion, use Redshift Streaming Ingestion with materialized views.";
  if (lower.includes('lake formation') || lower.includes('lf-tag')) return "📌 <b>Lake Formation Access Control:</b><br>• Sits ON TOP of IAM (both must allow)<br>• Column-level: SELECT on specific columns<br>• Row-level: Data filters with expressions<br>• LF-Tags: Attribute-based access at scale<br>• Hybrid Access Mode: coexist with IAM during migration<br><br><b>Exam Trap:</b> Even with full IAM Glue permissions, Lake Formation can still DENY access. Always check both layers.";
  if (lower.includes('kms') || lower.includes('encrypt')) return "📌 <b>KMS Encryption Essentials:</b><br>• Envelope encryption: CMK encrypts DEK, DEK encrypts data<br>• CMK never leaves KMS boundary<br>• Key rotation: new material generated, old retained for decryption<br>• Multi-Region Keys: same key material in multiple regions<br>• Key deletion: 7-30 day waiting period, data becomes PERMANENTLY inaccessible<br><br><b>Exam Trap:</b> AWS Managed Keys (aws/s3) rotate every 3 years automatically. CMKs rotate annually when enabled. You CANNOT export CMK material.";
  if (lower.includes('redshift') && (lower.includes('spectrum') || lower.includes('external'))) return "📌 <b>Redshift Spectrum:</b><br>• Query S3 data without loading into Redshift<br>• Requires: External schema → Glue Data Catalog → External table<br>• Pushes predicate filtering to S3 layer<br>• Supports Parquet, ORC, JSON, CSV<br>• Billed per TB scanned (like Athena)<br><br><b>Exam Trap:</b> Spectrum is for querying S3 data IN PLACE. If you need to JOIN S3 data with Redshift tables, Spectrum is the answer. If you need to query another Redshift cluster's data, use Data Sharing.";
  if (lower.includes('dynamodb') && (lower.includes('capacity') || lower.includes('wcu') || lower.includes('rcu'))) return "📌 <b>DynamoDB Capacity:</b><br>• 1 WCU = 1 write/sec for items ≤1 KB (round UP to nearest 1 KB)<br>• 1 RCU = 1 strongly consistent read/sec for items ≤4 KB<br>• 0.5 RCU = 1 eventually consistent read/sec for items ≤4 KB<br>• Transactional: 2x the capacity units<br><br><b>Exam Trap:</b> A 3 KB item write = 3 WCUs. A 5 KB item strong read = 2 RCUs (round up 5/4 = 1.25 → 2). Always round UP.";
  if (lower.includes('vpc endpoint') || lower.includes('privatelink')) return "📌 <b>VPC Endpoints:</b><br>• Gateway: S3 + DynamoDB ONLY. Free. Route table entry.<br>• Interface (PrivateLink): All other services. Hourly + per-GB cost. Creates ENI.<br>• Endpoint Policy: restricts which resources can be accessed through the endpoint<br>• Security Group (Interface only): controls network access to the ENI<br><br><b>Exam Trap:</b> Kinesis, Glue, KMS all need Interface endpoints. Only S3 and DynamoDB get free Gateway endpoints.";
  if (lower.includes('step function') || lower.includes('state machine')) return "📌 <b>Step Functions:</b><br>• Standard: durable, exactly-once, up to 1 year, priced per transition<br>• Express: high-volume, at-least-once, max 5 min, priced per execution+duration<br>• Retry: ErrorEquals + MaxAttempts + BackoffRate (built-in)<br>• Catch: route errors to different states<br>• Parallel: concurrent branches, wait for all<br>• Map: iterate over dynamic arrays<br><br><b>Exam Trap:</b> Retry is for transient errors (retry same state). Catch is for routing to error handling states. They serve different purposes.";
  if (lower.includes('exam') && (lower.includes('trap') || lower.includes('trick') || lower.includes('strategy'))) return "📌 <b>DEA-C01 Exam Strategies:</b><br>1. <b>Eliminate 2 options first</b> — usually 2 are clearly wrong<br>2. <b>'Most operationally efficient'</b> = managed service > custom code<br>3. <b>'Least privilege'</b> = specific resource ARNs, not wildcards<br>4. <b>'Cost-effective'</b> = right-size first, then pricing tiers<br>5. <b>Watch for service boundaries:</b> Lambda 15min limit, Firehose always stages to S3 for Redshift<br>6. <b>Cross-account</b> = both sides must allow (IAM + resource policy)<br>7. <b>When in doubt between Glue and EMR:</b> Glue for serverless ETL, EMR for full Hadoop ecosystem control";
  if (lower.includes('memory') || lower.includes('mnemonic') || lower.includes('trick')) {
    const q = examState.questions && examState.questions[examState.current];
    if (q && q.topic.includes('Kinesis')) return "🧠 <b>Memory Trick — Kinesis:</b><br>\"<b>K</b>inesis = <b>K</b>eep <b>S</b>treaming\"<br>• Streams = YOU manage consumers (like a river you fish from)<br>• Firehose = AUTO-delivers to destination (like a fire hose pointed at a target)<br>• 1 shard = 1 MB/s write, 2 MB/s read (think: 1-in, 2-out)";
    return "🧠 <b>Memory Tricks for DEA-C01:</b><br>• <b>GLUE</b> = Glue Lets U ETL (serverless Spark)<br>• <b>Firehose</b> = Fire-and-forget delivery (no consumers)<br>• <b>DMS</b> = Database Migration/Mirroring Service<br>• <b>Lake Formation</b> = Lake + Formation (forms the lake's security perimeter)<br>• <b>KMS envelope</b> = Key wraps key wraps data (like Russian dolls)<br>• <b>VPC Gateway</b> = only S3 + DynamoDB (the 'G' services that are free)";
  }
  // Default contextual response
  const q = examState.questions && examState.questions[examState.current];
  if (q) return `I can help with <b>${q.topic}</b>. Here are some things I can explain:<br>• Why option ${q.correctAnswer} is correct<br>• Common exam traps for this topic<br>• How this service compares to alternatives<br>• Real-world architecture patterns<br><br>Try asking something specific like "Why is option A wrong?" or "When would I use this service vs [alternative]?"`;
  return "I can help you with any AWS DEA-C01 topic. Try asking about:<br>• Specific services (Kinesis, Glue, Redshift, DynamoDB)<br>• Architecture patterns (streaming, batch, CDC)<br>• Security concepts (KMS, IAM, VPC endpoints)<br>• Exam strategies and common traps<br>• Memory tricks for key numbers";
}

// ============================================================
// STATS & PERSISTENCE
// ============================================================
let userStats = JSON.parse(localStorage.getItem('sap_stats') || '{"totalAnswered":0,"totalCorrect":0,"domainScores":{"Domain 1":[0,0],"Domain 2":[0,0],"Domain 3":[0,0],"Domain 4":[0,0]},"weakTopics":{},"examHistory":[]}');

function saveStats() { localStorage.setItem('sap_stats', JSON.stringify(userStats)); }

function recordAnswer(question, isCorrect) {
  userStats.totalAnswered++;
  if (isCorrect) userStats.totalCorrect++;
  const d = question.domain;
  userStats.domainScores[d][1]++;
  if (isCorrect) userStats.domainScores[d][0]++;
  if (!isCorrect) {
    userStats.weakTopics[question.topic] = (userStats.weakTopics[question.topic] || 0) + 1;
  }
  saveStats();
}

function renderStats() {
  const el = document.getElementById('page-stats');
  const pct = userStats.totalAnswered > 0 ? Math.round((userStats.totalCorrect / userStats.totalAnswered) * 100) : 0;
  const domains = Object.entries(userStats.domainScores).map(([name, [c, t]]) => {
    const p = t > 0 ? Math.round((c/t)*100) : 0;
    const color = p >= 72 ? 'bg-green-500' : p >= 50 ? 'bg-yellow-500' : 'bg-red-500';
    return `<div class="flex items-center gap-3 mb-3">
      <div class="w-24 text-xs text-gray-400">${name}</div>
      <div class="flex-1 bg-surface-3 rounded-full h-3"><div class="${color} h-3 rounded-full" style="width:${p}%"></div></div>
      <div class="w-16 text-right text-xs font-mono text-white">${c}/${t} (${p}%)</div>
    </div>`;
  }).join('');
  const weakTopics = Object.entries(userStats.weakTopics).sort((a,b) => b[1]-a[1]).slice(0,8).map(([topic, count]) =>
    `<div class="flex justify-between items-center py-2 border-b border-gray-800">
      <span class="text-sm text-gray-300">${topic}</span>
      <span class="text-xs bg-red-900 text-red-300 px-2 py-0.5 rounded-full">${count} wrong</span>
    </div>`
  ).join('') || '<div class="text-gray-500 text-sm">No weak topics yet. Start practicing!</div>';

  el.innerHTML = `<div class="fade-in">
    <h1 class="text-2xl font-black text-white mb-6">📊 Your Progress</h1>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
      <div class="bg-surface-2 rounded-xl p-4 text-center"><div class="text-2xl font-black text-white">${userStats.totalAnswered}</div><div class="text-xs text-gray-400">Answered</div></div>
      <div class="bg-surface-2 rounded-xl p-4 text-center"><div class="text-2xl font-black text-green-400">${userStats.totalCorrect}</div><div class="text-xs text-gray-400">Correct</div></div>
      <div class="bg-surface-2 rounded-xl p-4 text-center"><div class="text-2xl font-black ${pct>=72?'text-green-400':'text-orange-400'}">${pct}%</div><div class="text-xs text-gray-400">Accuracy</div></div>
      <div class="bg-surface-2 rounded-xl p-4 text-center"><div class="text-2xl font-black text-blue-400">${pct>=72?'PASS':'STUDY'}</div><div class="text-xs text-gray-400">Prediction</div></div>
    </div>
    <div class="bg-surface-2 rounded-xl p-4 mb-6">
      <h2 class="font-bold text-white mb-4">Domain Breakdown</h2>
      ${domains}
    </div>
    <div class="bg-surface-2 rounded-xl p-4 mb-6">
      <h2 class="font-bold text-white mb-3">🎯 Weak Topics (Focus Here)</h2>
      ${weakTopics}
    </div>
    <button onclick="if(confirm('Reset all progress?')){userStats={totalAnswered:0,totalCorrect:0,domainScores:{'Domain 1':[0,0],'Domain 2':[0,0],'Domain 3':[0,0],'Domain 4':[0,0]},weakTopics:{},examHistory:[]};saveStats();renderStats();}" class="text-xs text-gray-500 hover:text-red-400 transition-colors">Reset Progress</button>
  </div>`;
}

// ============================================================
// DOCS PAGE — Free SAP-C02 Resources
// ============================================================
function buildDocs() {
  const el = document.getElementById('page-docs');
  if (!el) return;

  const link = (url, title, note, badge) =>
    `<a href="${url}" target="_blank" rel="noopener noreferrer"
      class="flex items-start gap-3 bg-surface-2 border border-gray-700/60 rounded-xl p-3 hover:border-aws-orange/60 hover:bg-surface-3 transition-all group cursor-pointer">
      <span class="flex-shrink-0 mt-0.5 text-xs font-bold px-1.5 py-0.5 rounded ${badge}">${badge.includes('orange') ? 'FREE' : 'FREE'}</span>
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <span class="text-white text-sm font-medium group-hover:text-aws-orange transition-colors leading-snug">${title}</span>
          <svg class="flex-shrink-0 w-3.5 h-3.5 text-gray-600 group-hover:text-aws-orange mt-0.5 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        </div>
        <p class="text-gray-400 text-xs mt-0.5 leading-relaxed">${note}</p>
      </div>
    </a>`;

  const section = (title, icon, color, border, items) =>
    `<div class="mb-8">
      <div class="flex items-center gap-3 mb-4">

let examState = { questions:[], current:0, score:0, selected:null, submitted:false, mode:null, bookmarked:new Set() };

function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function startExam(mode, domain) {
  let pool = [...QUESTION_REPOSITORY];
  if (domain) pool = pool.filter(q => q.domain === domain);
  if (mode === 'weak') {
    const weakTopicNames = Object.keys(userStats.weakTopics);
    pool = pool.filter(q => weakTopicNames.includes(q.topic));
    if (pool.length < 10) pool = [...QUESTION_REPOSITORY];
  }
  const count = mode === 'short' ? 20 : mode === 'full' ? 50 : mode === 'weak' ? Math.min(30, pool.length) : 20;
  examState = { questions: shuffle(pool).slice(0, count), current:0, score:0, selected:null, submitted:false, mode, bookmarked:new Set() };
  renderQuestion();
}

    <!-- Question -->
    <div class="bg-surface-2 border border-gray-700 rounded-xl p-4 sm:p-5 mb-3">
      ${q.multiSelect ? '<div class="text-xs text-aws-orange font-bold mb-2">⚠ Select TWO answers</div>' : ''}
      <p class="text-white text-sm sm:text-base leading-relaxed">${q.question}</p>
    </div>
    <!-- Options -->
    <div class="space-y-2 mb-3" id="opts">
      ${['A','B','C','D'].map(o => `
      <button id="opt-${o}" onclick="selectOpt('${o}')"
        class="option-btn w-full text-left bg-surface-2 border border-gray-700 rounded-xl p-3 sm:p-4 hover:border-gray-500 active:scale-[.99]">
        <div class="flex items-start gap-3">
          <span class="flex-shrink-0 w-6 h-6 rounded-md bg-surface-3 flex items-center justify-center text-xs font-bold text-gray-300">${o}</span>
          <span class="text-gray-200 text-sm leading-relaxed">${q.options[o]}</span>
        </div>
      </button>`).join('')}
    </div>
    <!-- Actions -->
    <div class="flex gap-2">
      <button id="submit-btn" onclick="submitAns()" disabled
        class="flex-1 bg-aws-orange hover:bg-orange-600 disabled:bg-surface-3 disabled:text-gray-600 text-white font-bold py-3 rounded-xl transition-all text-sm">
        Submit
      </button>
      <button onclick="openTopicInReview('${q.topic.replace(/'/g,"\\'")}')" class="bg-surface-2 border border-gray-700 hover:border-gray-500 text-gray-300 px-4 py-3 rounded-xl text-sm transition-colors" title="Review this topic">📖</button>
    </div>
    <!-- Explanation -->
    <div id="expl-panel" class="hidden mt-3"></div>
    <div id="next-box" class="hidden mt-2"></div>
  </div>`;
}

function selectOpt(o) {
  if (examState.submitted) return;
  const q = examState.questions[examState.current];
  const isMulti = q.multiSelect;
  if (isMulti) {
    if (!examState.selected) examState.selected = [];
    const idx = examState.selected.indexOf(o);
    if (idx > -1) examState.selected.splice(idx, 1);
    else examState.selected.push(o);
    ['A','B','C','D'].forEach(x => {
      const btn = document.getElementById('opt-'+x);
      if (examState.selected.includes(x)) { btn.classList.add('border-aws-orange','bg-orange-900/20'); btn.classList.remove('border-gray-700'); }
      else { btn.classList.remove('border-aws-orange','bg-orange-900/20'); btn.classList.add('border-gray-700'); }
    });
    document.getElementById('submit-btn').disabled = examState.selected.length < 2;
  } else {
    examState.selected = o;
    ['A','B','C','D'].forEach(x => {
      const btn = document.getElementById('opt-'+x);
      if (x===o) { btn.classList.add('border-aws-orange','bg-orange-900/20'); btn.classList.remove('border-gray-700'); }
      else { btn.classList.remove('border-aws-orange','bg-orange-900/20'); btn.classList.add('border-gray-700'); }
    });
    document.getElementById('submit-btn').disabled = false;
  }
}

function submitAns() {
  if (!examState.selected || examState.submitted) return;
  examState.submitted = true;
  const q = examState.questions[examState.current];
  const isMulti = q.multiSelect;
  let isCorrect;
  let correct;
  if (isMulti) {
    correct = q.correctAnswer; // array like ["A","C"]
    const chosen = examState.selected.sort();
    isCorrect = JSON.stringify(chosen) === JSON.stringify([...correct].sort());
  } else {
    correct = q.correctAnswer;
    isCorrect = examState.selected === correct;
  }
  if (isCorrect) examState.score++;
  recordAnswer(q, isCorrect);

  ['A','B','C','D'].forEach(o => {
    const btn = document.getElementById('opt-'+o);
    btn.disabled = true;
    btn.classList.remove('border-aws-orange','bg-orange-900/20','border-gray-700','hover:border-gray-500');
    const isCorrectOpt = isMulti ? correct.includes(o) : o === correct;
    const isChosenOpt = isMulti ? examState.selected.includes(o) : o === examState.selected;
    if (isCorrectOpt) btn.classList.add('option-correct');
    else if (isChosenOpt && !isCorrectOpt) btn.classList.add('option-wrong');
    else btn.classList.add('border-gray-800','opacity-50');
  });
  document.getElementById('submit-btn').disabled = true;

  const correctLabel = isMulti ? correct.join(', ') : correct;
  const wrongExpl = ['A','B','C','D'].filter(o => isMulti ? !correct.includes(o) : o!==correct).map(o =>
    `<div class="mb-2"><span class="font-semibold text-red-400 text-xs">✗ ${o}:</span> <span class="text-gray-300 text-xs">${q.explanations['wrong'+o]}</span></div>`
  ).join('');

  document.getElementById('expl-panel').innerHTML = `
  <div class="bg-surface-2 border ${isCorrect?'border-green-800':'border-red-800'} rounded-xl p-4">
    <div class="flex items-center gap-2 mb-3">
      <span class="text-xs px-2 py-0.5 rounded ${isCorrect?'bg-green-900 text-green-300':'bg-red-900 text-red-300'}">${isCorrect?'✓ Correct':'✗ Wrong — Answer: '+correctLabel}</span>
      <button onclick="toggleAssistant();quickAsk('Explain why ${correct} is correct for this question')" class="text-xs text-aws-orange hover:underline ml-auto">Ask Assistant →</button>
    </div>
    <div class="mb-3"><span class="font-semibold text-green-400 text-xs">✓ ${correct}:</span> <span class="text-gray-200 text-xs">${q.explanations.correct}</span></div>
    <details class="group"><summary class="text-xs text-gray-500 cursor-pointer hover:text-gray-300 mb-2">Show why other options are wrong ▾</summary>
      <div class="mt-2 pl-2 border-l-2 border-gray-700">${wrongExpl}</div>
    </details>
  </div>`;
  document.getElementById('expl-panel').classList.remove('hidden');

  const isLast = examState.current + 1 >= examState.questions.length;
  document.getElementById('next-box').innerHTML = `
    <button onclick="nextQ()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-sm transition-colors">
      ${isLast ? '📊 View Results' : 'Next Question →'}
    </button>`;
  document.getElementById('next-box').classList.remove('hidden');
  updateQuickActions();
}

function nextQ() {
  examState.current++;
  if (examState.current >= examState.questions.length) renderResults();
  else { examState.selected=null; examState.submitted=false; renderQuestion(); }
}

function toggleBookmark(id) { examState.bookmarked.has(id)?examState.bookmarked.delete(id):examState.bookmarked.add(id); renderQuestion(); }

function openTopicInReview(topic) { showPage('review'); setTimeout(()=>{ const el=document.querySelector(`[data-topic="${topic}"]`); if(el){el.open=true;el.scrollIntoView({behavior:'smooth',block:'start'});} },100); }

function renderResults() {
  const total = examState.questions.length;
  const score = examState.score;
  const pct = Math.round((score/total)*100);
  const passed = pct >= 72;
  // Domain breakdown
  const domainBreakdown = {};
  examState.questions.forEach((q,i) => {
    if (!domainBreakdown[q.domain]) domainBreakdown[q.domain] = [0,0];
    domainBreakdown[q.domain][1]++;
  });
  // We need to track per-question correctness — approximate from score
  const el = document.getElementById('page-exam');
  el.innerHTML = `
  <div class="fade-in text-center">
    <div class="text-5xl mb-3">${passed?'🎉':'📚'}</div>
    <h1 class="text-2xl font-black text-white mb-1">${passed?'You Passed!':'Keep Going!'}</h1>
    <p class="text-gray-400 text-sm mb-6">${score}/${total} correct · ${pct}% (need 72%)</p>
    <div class="bg-surface-2 rounded-xl p-6 mb-4">
      <div class="text-6xl font-black ${passed?'text-green-400':'text-orange-400'} mb-2">${pct}%</div>
      <div class="w-full bg-surface-3 rounded-full h-3 mb-4">
        <div class="h-3 rounded-full ${passed?'bg-green-500':'bg-orange-500'}" style="width:${pct}%"></div>
      </div>
      <div class="grid grid-cols-3 gap-4">
        <div><div class="text-xl font-bold text-green-400">${score}</div><div class="text-xs text-gray-500">Correct</div></div>
        <div><div class="text-xl font-bold text-red-400">${total-score}</div><div class="text-xs text-gray-500">Wrong</div></div>
        <div><div class="text-xl font-bold text-blue-400">${total}</div><div class="text-xs text-gray-500">Total</div></div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-2">
      <button onclick="startExam('${examState.mode}')" class="bg-aws-orange hover:bg-orange-600 text-white font-bold py-3 rounded-xl text-sm">Retake</button>
      <button onclick="startExam('weak')" class="bg-red-700 hover:bg-red-600 text-white font-bold py-3 rounded-xl text-sm">Practice Weak Areas</button>
      <button onclick="renderLanding()" class="bg-surface-2 border border-gray-700 text-gray-300 font-bold py-3 rounded-xl text-sm col-span-2">Back to Menu</button>
    </div>
  </div>`;
}

{id:1,domain:"Domain 1",topic:"Kinesis Data Streams",question:"A data engineering team ingests 8,000 records/sec into Kinesis Data Streams. Each record is 2 KB. The stream has 4 shards. Producers get ProvisionedThroughputExceededException. What is the MOST operationally efficient fix?",options:{A:"Enable Enhanced Fan-Out to increase read throughput.",B:"Increase shards to at least 16 to handle 16 MB/s write throughput.",C:"Enable server-side encryption to reduce payload size.",D:"Switch to Kinesis Data Firehose which has no shard limits."},correctAnswer:"B",explanations:{correct:"Each shard supports 1 MB/s writes. 8,000 records × 2 KB = 16 MB/s requires 16 shards minimum. Increasing shards is the correct write-side fix.",wrongA:"Enhanced Fan-Out increases READ throughput (2 MB/s per consumer per shard). The error is on the WRITE side — EFO doesn't help.",wrongC:"Encryption has zero effect on throughput limits. Throttling is based on bytes/records vs shard capacity.",wrongD:"Firehose is a delivery service, not a KDS replacement. It has its own limits and different API. Migration isn't 'operationally efficient'."}},

{id:22,domain:"Domain 1",topic:"Kinesis Data Streams",question:"All records use partition key 'sensor-001' on an 8-shard stream. What problem occurs?",options:{A:"Records distribute evenly. No problem.",B:"All records route to one shard (hot shard), exhausting 1 MB/s limit. Use high-cardinality keys.",C:"Stream auto-rebalances after 5 minutes.",D:"Enable encryption to distribute records."},correctAnswer:"B",explanations:{correct:"Same partition key = same MD5 hash = same shard. Creates hot shard while others sit idle. Fix: use high-cardinality keys (entity ID + timestamp, UUID).",wrongA:"Kinesis does NOT distribute evenly. Distribution is deterministic based on partition key hash.",wrongC:"Kinesis never auto-rebalances. Shard assignment is fixed per hash range.",wrongD:"Encryption is a security feature with zero effect on record distribution."}},
{id:23,domain:"Domain 1",topic:"AWS Glue DataBrew",question:"In DataBrew, what's the difference between Recipes and Rulesets?",options:{A:"Both are recipe steps.",B:"Recipes = transformation steps. Rulesets = data quality validation rules.",C:"Recipes = transforms; validations use Glue Data Quality DQDL separately.",D:"DataBrew only supports transforms, not validation."},correctAnswer:"B",explanations:{correct:"DataBrew has two constructs: Recipes (ordered transformation steps) and Rulesets (quality rules evaluated against data for pass/fail results).",wrongA:"Recipes only contain transforms. Quality rules are separate Rulesets.",wrongC:"Within DataBrew, Rulesets are the native validation mechanism. DQDL is a separate Glue service.",wrongD:"DataBrew absolutely supports validation through Rulesets."}},
{id:24,domain:"Domain 1",topic:"AWS Step Functions",question:"Step Functions needs to run three independent Lambda functions simultaneously and wait for ALL to complete. Which state type?",options:{A:"Map state.",B:"Parallel state — concurrent branches, waits for all.",C:"Three consecutive Task states.",D:"Choice state."},correctAnswer:"B",explanations:{correct:"Parallel state executes multiple branches concurrently and waits for ALL to complete (or any to fail) before transitioning.",wrongA:"Map iterates over an array applying same processing to each item. Not for fixed set of different functions.",wrongC:"Consecutive Task states run sequentially, not in parallel.",wrongD:"Choice evaluates conditions and routes to ONE branch. Doesn't execute multiple simultaneously."}},
{id:25,domain:"Domain 1",topic:"AWS Data Exchange",question:"A company wants to subscribe to a third-party dataset updated daily, auto-delivered to their S3. Which service?",options:{A:"AppFlow with custom connector.",B:"AWS Data Exchange — subscribe and auto-export to S3.",C:"AWS Marketplace AMI delivery.",D:"S3 Transfer Acceleration with cross-account replication."},correctAnswer:"B",explanations:{correct:"Data Exchange is a marketplace for third-party data products. Subscribers auto-receive new data revisions directly to S3.",wrongA:"AppFlow requires the provider to have a supported connector. Data Exchange is the marketplace solution.",wrongC:"Marketplace AMIs are for software, not data subscriptions.",wrongD:"Transfer Acceleration speeds uploads. Cross-account replication requires custom provider arrangement."}},
{id:26,domain:"Domain 2",topic:"Amazon S3",question:"Objects have varying access patterns — frequent first month, then rarely. Minimize cost without manual lifecycle rules?",options:{A:"Standard-IA with 30-day lifecycle to Glacier.",B:"S3 Intelligent-Tiering — auto-moves between tiers based on access patterns.",C:"One Zone-IA for all objects.",D:"Glacier Instant Retrieval for all."},correctAnswer:"B",explanations:{correct:"Intelligent-Tiering monitors access and auto-moves objects between Frequent, Infrequent, Archive Instant, and Archive tiers. No retrieval fees for tier moves.",wrongA:"Standard-IA with lifecycle requires predicting patterns upfront. Intelligent-Tiering adapts automatically.",wrongC:"One Zone-IA reduces durability (single AZ). Unacceptable for important data lake data.",wrongD:"Glacier Instant Retrieval is for archive data accessed quarterly. High retrieval costs for frequent access."}},
{id:27,domain:"Domain 2",topic:"AWS Lake Formation",question:"Analysts should see all columns EXCEPT 'ssn' and 'credit_card'. Data scientists see all. How to implement in Lake Formation?",options:{A:"Create two S3 buckets with different columns.",B:"Use Lake Formation column-level security — grant SELECT on specific columns excluding sensitive ones.",C:"Use S3 bucket policies to restrict Parquet column files.",D:"Use Macie to auto-redact for analysts."},correctAnswer:"B",explanations:{correct:"Lake Formation column-level security grants SELECT on specific columns per IAM principal. Analysts get all columns except sensitive ones. Enforced at query engine level.",wrongA:"Two buckets creates duplication and sync challenges. Column-level security is purpose-built.",wrongC:"S3 policies operate at object level, not column level. Parquet stores all columns together.",wrongD:"Macie discovers PII but doesn't enforce column-level access control at query time."}},
{id:28,domain:"Domain 2",topic:"Amazon Redshift",question:"Startup has unpredictable analytics — some days zero queries, others hundreds of users. Minimize cost and ops overhead?",options:{A:"Redshift Provisioned with smallest node.",B:"Redshift Serverless — auto-scales, charges only for usage.",C:"Provisioned with Concurrency Scaling.",D:"Amazon Athena instead."},correctAnswer:"B",explanations:{correct:"Redshift Serverless auto-provisions compute based on workload. Scales to zero when idle = no compute charges. Perfect for unpredictable workloads.",wrongA:"Provisioned charges 24/7 even when idle. Wastes money on zero-query days.",wrongC:"Concurrency Scaling adds peak capacity but base cluster still runs 24/7.",wrongD:"Athena is valid for ad-hoc S3 queries but Redshift Serverless provides full warehouse experience."}},
{id:29,domain:"Domain 2",topic:"Amazon DynamoDB",question:"DynamoDB table with 'user_id' partition key. Celebrity users generate 80% of reads, causing hot partitions. Best solution?",options:{A:"Composite key (user_id + timestamp).",B:"Write sharding with random suffix.",C:"DynamoDB Auto Scaling.",D:"DynamoDB DAX to cache hot items and reduce read pressure."},correctAnswer:"D",explanations:{correct:"DAX is in-memory cache for DynamoDB. For read-heavy hot partitions (celebrity reads), DAX caches hot items at microsecond latency, reducing partition read load.",wrongA:"Adding timestamp breaks ability to look up current session by user_id alone.",wrongB:"Write sharding requires scatter-gather reads. Better for write-heavy, not read-heavy hot partitions.",wrongC:"Auto Scaling adjusts total capacity but can't fix per-partition throughput limits. Hot partitions are a distribution problem."}},
{id:30,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift table 'orders' (10B rows) frequently joins with 'customers' (1M rows) on customer_id. Optimal distribution?",options:{A:"Both DISTKEY(customer_id).",B:"orders: EVEN, customers: ALL.",C:"orders: DISTKEY(customer_id), customers: ALL distribution.",D:"Both: AUTO."},correctAnswer:"C",explanations:{correct:"Large fact table: DISTKEY(customer_id) co-locates matching rows. Small dimension: ALL (full copy on every slice). Eliminates data movement during join.",wrongA:"Both DISTKEY works but ALL for small table is simpler and more efficient.",wrongB:"EVEN distributes randomly. Requires redistribution during join (network I/O).",wrongD:"AUTO lets Redshift choose. Explicit DISTKEY + ALL is the optimal deterministic choice."}},

{id:31,domain:"Domain 2",topic:"Amazon S3",question:"S3 Object Lambda Access Points intercept GetObject requests to transform responses. A use case: PII redaction based on requester role without modifying underlying data. Which feature?",options:{A:"S3 Bucket Policy conditions.",B:"S3 Object Lambda Access Points.",C:"Amazon Macie auto-redaction.",D:"S3 Select."},correctAnswer:"B",explanations:{correct:"S3 Object Lambda Access Points invoke Lambda on GET requests to transform response before returning to requester. Underlying object unchanged.",wrongA:"Bucket policies restrict access at object level, can't selectively redact fields within objects.",wrongC:"Macie discovers PII but doesn't perform real-time redaction during reads.",wrongD:"S3 Select filters with SQL but can't do identity-based redaction."}},
{id:32,domain:"Domain 2",topic:"Amazon Redshift",question:"Team wants sub-second ingestion from Kinesis into Redshift without S3 staging. Which feature?",options:{A:"Firehose to Redshift.",B:"Redshift Streaming Ingestion with materialized view using STREAM keyword.",C:"Glue Streaming ETL to Redshift via JDBC.",D:"MSK Connect Redshift Sink."},correctAnswer:"B",explanations:{correct:"Redshift Streaming Ingestion creates materialized views pointing to Kinesis/MSK streams. Refreshing ingests records directly with very low latency. No S3 staging.",wrongA:"Firehose always stages in S3 first (COPY command). Minutes of latency, not sub-second.",wrongC:"Glue Streaming ETL adds job overhead and latency. Not the native Redshift feature.",wrongD:"MSK Connect is for MSK-to-Redshift. For Kinesis, Streaming Ingestion is native."}},
{id:33,domain:"Domain 2",topic:"Amazon DynamoDB",question:"DynamoDB table needs 5,000 writes/sec, each item 3 KB. How many WCUs required?",options:{A:"5,000 WCUs.",B:"15,000 WCUs (3 WCUs per 3 KB item × 5,000 writes/sec).",C:"10,000 WCUs.",D:"5,000 WCUs regardless of size."},correctAnswer:"B",explanations:{correct:"1 WCU = 1 write/sec for items ≤1 KB. 3 KB item rounds up to 3 WCUs per write. 5,000 × 3 = 15,000 WCUs.",wrongA:"1 WCU per write only for items ≤1 KB. 3 KB items need 3 WCUs each.",wrongC:"DynamoDB rounds to nearest 1 KB (not 2 KB). 3 KB = 3 WCUs.",wrongD:"WCUs absolutely depend on item size. Fundamental DynamoDB concept."}},
{id:34,domain:"Domain 2",topic:"Amazon Redshift",question:"After many DELETEs/UPDATEs, Redshift query performance degrades. High percentage of deleted rows. What maintenance to run?",options:{A:"ANALYZE.",B:"VACUUM — reclaims deleted row storage and re-sorts.",C:"COPY reload.",D:"ALTER TABLE rebuild."},correctAnswer:"B",explanations:{correct:"Redshift is append-only. DELETE/UPDATE marks rows deleted but doesn't reclaim space. VACUUM reclaims storage and re-sorts, restoring zone map effectiveness.",wrongA:"ANALYZE updates statistics for query planner. Doesn't reclaim storage.",wrongC:"COPY reloads from S3. Requires truncating first — destructive.",wrongD:"ALTER TABLE modifies structure. Doesn't reclaim deleted row space."}},
{id:35,domain:"Domain 2",topic:"Amazon S3",multiSelect:true,question:"Athena queries on CSV data lake are slow and expensive. Data is unpartitioned, single prefix. TWO best optimizations?",options:{A:"Convert to Parquet (columnar, compressed).",B:"Enable S3 Transfer Acceleration.",C:"Partition by frequently filtered columns.",D:"Use CTAS to create JSON table."},correctAnswer:["A","C"],explanations:{correct:"(A) Parquet: columnar = read only needed columns. 70-90% cost reduction vs CSV. (C) Partitioning: Athena prunes partitions matching WHERE clause, skipping irrelevant data.",wrongB:"Transfer Acceleration speeds uploads from distant clients. Doesn't affect Athena query performance.",wrongD:"JSON is row-based like CSV. No columnar or compression benefits. Parquet/ORC are correct formats."}},
{id:36,domain:"Domain 3",topic:"Amazon EventBridge",question:"Team needs SQS → Lambda enrichment → Kinesis pipeline. Point-to-point with enrichment. Which service?",options:{A:"Step Functions.",B:"EventBridge Pipes — source → filter → enrichment → target.",C:"Glue Streaming ETL.",D:"Firehose with Lambda transform."},correctAnswer:"B",explanations:{correct:"EventBridge Pipes connects source (SQS) to target (Kinesis) with optional filtering and Lambda enrichment. Purpose-built for point-to-point streaming pipelines.",wrongA:"Step Functions works but requires state machine definition. Pipes is simpler for this pattern.",wrongC:"Glue Streaming ETL is for complex transforms. Overkill for simple enrichment routing.",wrongD:"Firehose can't deliver to Kinesis Data Streams as target."}},
{id:37,domain:"Domain 3",topic:"Amazon CloudWatch",question:"Team wants notification when Glue job fails. Simplest configuration?",options:{A:"CloudWatch Alarm on Glue numFailedTasks metric.",B:"EventBridge rule matching Glue Job State Change FAILED → SNS topic.",C:"CloudWatch Log metric filter for ERROR messages.",D:"AWS Health notifications."},correctAnswer:"B",explanations:{correct:"Glue publishes job state change events to EventBridge. Rule matching state='FAILED' targeting SNS is the most direct, event-driven approach.",wrongA:"numFailedTasks counts Spark task failures within a job, not job-level failure. Job can succeed despite failed tasks (retries).",wrongC:"Log filters work but depend on specific log message format. EventBridge events are more reliable.",wrongD:"AWS Health reports service-level issues, not individual job failures."}},
{id:38,domain:"Domain 3",topic:"AWS Glue Data Quality",question:"DQDL rule to check 'email' column has ≥95% non-null values. Correct syntax?",options:{A:"CHECK Completeness('email') >= 0.95",B:"Completeness 'email' >= 0.95",C:"RULE Completeness('email') >= 0.95",D:"ASSERT Completeness('email') >= 0.95"},correctAnswer:"B",explanations:{correct:"DQDL syntax: RuleType 'column' operator threshold. Completeness 'email' >= 0.95 checks ≥95% non-null.",wrongA:"'CHECK' is not a valid DQDL keyword.",wrongC:"'RULE' is not a valid DQDL prefix. Rule type name is used directly.",wrongD:"'ASSERT' is not valid DQDL syntax."}},
{id:39,domain:"Domain 3",topic:"Amazon Athena",question:"Athena query scans all partitions despite WHERE clause on date. Table partitioned by year/month/day. Query uses WHERE date_column='2024-01-15'. Issue?",options:{A:"Athena doesn't support partition pruning.",B:"WHERE filters on 'date_column' (non-partition column) instead of partition columns year/month/day.",C:"Table needs re-crawling.",D:"Need MSCK REPAIR TABLE first."},correctAnswer:"B",explanations:{correct:"Partition pruning only works on actual partition columns. Must filter: WHERE year='2024' AND month='01' AND day='15'. Filtering on a data column causes full scan.",wrongA:"Athena absolutely supports partition pruning on partition columns.",wrongC:"Re-crawling updates metadata but doesn't fix the wrong WHERE clause.",wrongD:"MSCK REPAIR adds missing partitions. Unrelated to pruning behavior."}},
{id:40,domain:"Domain 3",topic:"Amazon Athena",question:"Complex Athena query takes 10 min, scans 1 TB. 50 analysts run it daily. How to reduce cost?",options:{A:"Enable query result caching.",B:"Use CTAS to materialize results as Parquet table. Analysts query the smaller table.",C:"Increase workgroup scan limit.",D:"Use Redshift instead."},correctAnswer:"B",explanations:{correct:"CTAS materializes once (1 TB scan). 50 analysts query the small result table. Total: 1 TB/day instead of 50 TB/day.",wrongA:"Result caching works for identical queries but cache misses on different filters still scan 1 TB.",wrongC:"Increasing scan limit allows MORE scanning. Opposite of optimization.",wrongD:"Migrating to Redshift is a major architectural change. CTAS is in-place optimization."}},

{id:41,domain:"Domain 3",topic:"Amazon CloudWatch",question:"Kinesis stream normally gets 10K records/min. Team wants auto-detection of unusual drops/spikes without static thresholds. Which feature?",options:{A:"CloudWatch Alarms with static thresholds.",B:"CloudWatch Anomaly Detection — ML models normal behavior, alerts on deviations.",C:"Contributor Insights.",D:"AWS DevOps Guru."},correctAnswer:"B",explanations:{correct:"Anomaly Detection uses ML to model expected behavior (including time-of-day patterns). Creates expected band. Alarms trigger when metric falls outside band.",wrongA:"Static thresholds require manual tuning and don't adapt to changing patterns.",wrongC:"Contributor Insights identifies top contributors, not anomalies on aggregate metrics.",wrongD:"DevOps Guru detects operational anomalies but Anomaly Detection is more targeted for specific metrics."}},
{id:42,domain:"Domain 3",topic:"AWS Step Functions",question:"Step Functions execution failed. Where to find which state failed and error details?",options:{A:"CloudTrail API logs.",B:"Execution history — shows each state's input, output, error details.",C:"CloudWatch Logs.",D:"Lambda function logs."},correctAnswer:"B",explanations:{correct:"Step Functions maintains detailed execution history: every state transition, I/O data, timestamps, errors. Console shows visual graph with color-coded states.",wrongA:"CloudTrail logs API calls (StartExecution) but not state-level execution details.",wrongC:"CloudWatch Logs can receive execution logs but execution history is the primary debugging tool.",wrongD:"Lambda logs show what happened inside Lambda, not the state machine context."}},
{id:43,domain:"Domain 3",topic:"Amazon EventBridge",question:"EventBridge events were processed incorrectly due to consumer bug. After fix, need to reprocess last 3 days of events. Which feature?",options:{A:"EventBridge DLQ replay.",B:"EventBridge Archive and Replay.",C:"CloudTrail replay.",D:"Kinesis stream replay."},correctAnswer:"B",explanations:{correct:"EventBridge Archive captures events from event bus. Replay sends archived events back to the bus for reprocessing. Purpose-built for this scenario.",wrongA:"DLQ only has events that FAILED delivery. Successfully delivered (but incorrectly processed) events aren't in DLQ.",wrongC:"CloudTrail logs API calls but can't replay them.",wrongD:"Question specifies EventBridge events, not Kinesis records."}},
{id:44,domain:"Domain 3",topic:"Amazon Athena",question:"Finance team queries must not exceed $50/month scan costs. How to enforce?",options:{A:"IAM policies limiting Athena usage.",B:"Athena workgroup data usage control with monthly aggregate limit.",C:"AWS Budgets alert.",D:"S3 bucket policies limiting scan data."},correctAnswer:"B",explanations:{correct:"Athena Workgroup data usage controls set per-query and aggregate scan limits. Monthly limit cancels queries that would exceed threshold.",wrongA:"IAM can't enforce data scan cost limits. No mechanism to track cumulative bytes.",wrongC:"Budgets alerts but doesn't prevent queries from running. Reactive, not proactive.",wrongD:"S3 policies restrict object access, not scan volume."}},
{id:45,domain:"Domain 4",topic:"AWS IAM",question:"Glue job needs to read from one S3 bucket and write to another. Most secure IAM policy?",options:{A:"AmazonS3FullAccess managed policy.",B:"Custom policy: s3:GetObject on source ARN, s3:PutObject on destination ARN only.",C:"s3:* on both bucket ARNs.",D:"AWSGlueServiceRole managed policy."},correctAnswer:"B",explanations:{correct:"Least privilege: only s3:GetObject on source, s3:PutObject on destination. Specific bucket ARNs prevent access to other resources.",wrongA:"S3FullAccess grants read/write to ALL buckets. Violates least privilege.",wrongC:"s3:* includes DeleteObject, DeleteBucket, etc. More permissive than needed.",wrongD:"AWSGlueServiceRole includes broad S3 permissions on all buckets. Not production-ready."}},
{id:46,domain:"Domain 4",topic:"AWS KMS",question:"CMK scheduled for deletion in 7 days. What happens to encrypted data after deletion?",options:{A:"Data auto-decrypted to plaintext.",B:"Data becomes PERMANENTLY inaccessible — can't decrypt without key.",C:"AWS creates new key and re-encrypts.",D:"Data moves to Glacier."},correctAnswer:"B",explanations:{correct:"KMS keys encrypt DEKs via envelope encryption. Deleted CMK = can't decrypt DEKs = data permanently inaccessible. 7-30 day wait period exists for recovery.",wrongA:"KMS never auto-decrypts on key deletion. Data remains encrypted and inaccessible.",wrongC:"AWS doesn't auto-create replacement keys. Key management is customer responsibility.",wrongD:"Key deletion doesn't trigger storage class changes."}},
{id:47,domain:"Domain 4",topic:"AWS KMS",question:"How does KMS envelope encryption work for a large S3 object?",options:{A:"KMS directly encrypts the entire object.",B:"S3 generates DEK, encrypts object with DEK, encrypts DEK with CMK. Stores encrypted object + encrypted DEK.",C:"KMS generates DEK and stores it.",D:"CMK downloaded to S3 for local encryption."},correctAnswer:"B",explanations:{correct:"Envelope: (1) Generate plaintext DEK + encrypted DEK (wrapped with CMK). (2) Encrypt object with plaintext DEK. (3) Store encrypted object + encrypted DEK. (4) Discard plaintext DEK.",wrongA:"KMS only encrypts up to 4 KB directly. Large objects use envelope encryption.",wrongC:"KMS does NOT store DEKs. Encrypted DEK stored alongside encrypted data.",wrongD:"CMKs NEVER leave KMS boundary. All crypto operations happen within KMS."}},
{id:48,domain:"Domain 4",topic:"Amazon Macie",question:"Need to auto-identify which S3 buckets contain PII across hundreds of buckets. Which service?",options:{A:"Glue Data Quality.",B:"Amazon Macie — auto-discovers and classifies sensitive data in S3 using ML.",C:"AWS Config.",D:"Amazon GuardDuty."},correctAnswer:"B",explanations:{correct:"Macie uses ML and pattern matching to discover, classify PII (SSN, credit cards, names, etc.) in S3. Generates findings with severity levels.",wrongA:"Glue Data Quality checks quality rules in ETL jobs. Not for account-wide PII discovery.",wrongC:"Config monitors bucket configuration (public access, encryption). Doesn't analyze object content.",wrongD:"GuardDuty detects threats/malicious activity. Doesn't classify content for PII."}},
{id:49,domain:"Domain 4",topic:"VPC Endpoints",question:"Glue job in VPC needs S3 and Glue API access without public internet. What endpoint types?",options:{A:"Interface for S3, Interface for Glue.",B:"Gateway for S3 (free), Interface for Glue (PrivateLink, hourly cost).",C:"Gateway for both.",D:"NAT Gateway for both."},correctAnswer:"B",explanations:{correct:"Gateway endpoints: S3 + DynamoDB only, free, route table entry. Interface endpoints (PrivateLink): all other services including Glue, hourly + per-GB cost, creates ENIs.",wrongA:"S3 Gateway endpoint is free. Using Interface for S3 incurs unnecessary cost.",wrongC:"Glue doesn't support Gateway endpoints. Only S3 and DynamoDB do.",wrongD:"NAT Gateway routes to internet. VPC endpoints keep traffic on AWS private network."}},
{id:50,domain:"Domain 4",topic:"AWS IAM",question:"Bucket policy explicitly denies s3:GetObject for all principals. Glue role has s3:GetObject in IAM policy. Can Glue read?",options:{A:"Yes — IAM overrides bucket policy.",B:"No — explicit Deny ALWAYS overrides any Allow.",C:"Yes — service roles are exempt.",D:"Depends on same/cross account."},correctAnswer:"B",explanations:{correct:"IAM evaluation: explicit Deny ALWAYS wins over any Allow, regardless of source. Bucket policy Deny overrides IAM Allow. Request denied.",wrongA:"IAM does NOT override explicit Denies in resource policies.",wrongC:"Service roles are NOT exempt from explicit Denies. All principals subject to Deny.",wrongD:"Explicit Denies take effect regardless of account context."}},


{id:51,domain:"Domain 1",topic:"Kinesis Data Streams",question:"A new Kinesis consumer needs to process only records arriving AFTER it starts, ignoring historical data. Which shard iterator type?",options:{A:"TRIM_HORIZON",B:"LATEST",C:"AT_SEQUENCE_NUMBER",D:"AT_TIMESTAMP"},correctAnswer:"B",explanations:{correct:"LATEST positions consumer at the tip of the stream — only receives records written AFTER the iterator is obtained.",wrongA:"TRIM_HORIZON starts from the oldest available record, processing all historical data.",wrongC:"AT_SEQUENCE_NUMBER requires knowing a specific sequence number. Used for resuming from checkpoint.",wrongD:"AT_TIMESTAMP starts from a specific past time, including historical records from that point."}},
{id:52,domain:"Domain 1",topic:"Kinesis Data Streams",question:"Producer uses PutRecords API. Some records in batch fail while others succeed. How does PutRecords report this?",options:{A:"Throws exception if any record fails.",B:"Returns 200 OK with FailedRecordCount and per-record ErrorCode for failed records.",C:"Automatically retries failed records internally.",D:"Failed records sent to DLQ."},correctAnswer:"B",explanations:{correct:"PutRecords supports partial success. Returns HTTP 200 with FailedRecordCount and per-record ErrorCode/ErrorMessage. Producer must check and retry failed records.",wrongA:"PutRecords does NOT throw exceptions for partial failures. Returns 200 with failure details in response body.",wrongC:"PutRecords does not internally retry. Retry responsibility is on the producer.",wrongD:"KDS has no DLQ concept. Failed PutRecords must be retried by producer."}},
{id:53,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue job reads partitioned Hive table from S3. Only needs last 7 days. Without optimization, scans all partitions. Which feature reduces data scanned?",options:{A:"Job Bookmarks.",B:"Pushdown predicates in create_dynamic_frame.from_catalog().",C:"Spark DataFrame filter() after reading.",D:"Crawler reconfiguration."},correctAnswer:"B",explanations:{correct:"push_down_predicate parameter filters partitions BEFORE data is read from S3. Only matching partitions loaded. Dramatically reduces I/O and cost.",wrongA:"Bookmarks track processed files across runs. Don't filter partitions within a single run.",wrongC:"Spark filter() after reading still reads ALL partitions first, then filters in memory. Wastes I/O.",wrongD:"Crawler catalogs all data. Job-level filtering is the correct optimization."}},
{id:54,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue job fails with 'java.lang.OutOfMemoryError: Java heap space' using G.1X workers on 500 GB dataset. First remediation?",options:{A:"Enable Job Bookmarks.",B:"Upgrade to G.2X workers (32 GB) or increase number of workers.",C:"Convert source to Parquet.",D:"Enable Auto Scaling."},correctAnswer:"B",explanations:{correct:"G.1X = 16 GB memory. OOM means executors lack heap space. G.2X doubles to 32 GB, directly addressing the error. More workers increases total cluster memory.",wrongA:"Bookmarks reduce data volume across runs but don't fix memory for current batch.",wrongC:"Parquet reduces storage/read size but in-memory processing still needs sufficient heap.",wrongD:"Auto Scaling adds workers (total memory) but if single partition is too large for one executor, per-worker memory (G.2X) must increase."}},
{id:55,domain:"Domain 1",topic:"AWS Glue ETL",question:"Data engineer wants to run SQL against a DynamicFrame in Glue. Correct approach?",options:{A:"glueContext.sql() directly on DynamicFrame.",B:"Convert to DataFrame with toDF(), register as temp view, use spark.sql().",C:"Use Glue Data Catalog as Hive metastore with HiveQL.",D:"DynamicFrames don't support SQL."},correctAnswer:"B",explanations:{correct:"DynamicFrames don't directly support SQL. Pattern: dyf.toDF() → df.createOrReplaceTempView('table') → spark.sql('SELECT...'). Leverages full Spark SQL.",wrongA:"glueContext.sql() doesn't exist. SQL uses SparkSession's spark.sql() after registering temp views.",wrongC:"While Glue can use Data Catalog as Hive metastore, for in-job SQL on DynamicFrames, temp view approach is standard.",wrongD:"SQL IS supported via the DataFrame/temp view conversion approach."}},
{id:56,domain:"Domain 1",topic:"Amazon EMR",question:"EMR cluster uses Spot for task nodes. During Spark job, task nodes are interrupted. What happens?",options:{A:"Entire Spark job fails.",B:"Spark reschedules interrupted tasks on remaining nodes. Job continues.",C:"EMR auto-replaces with On-Demand.",D:"Tasks checkpointed to S3 and resumed later."},correctAnswer:"B",explanations:{correct:"Spark has built-in fault tolerance. When executor is lost (Spot interruption), driver detects failure and reschedules affected tasks on remaining executors. Job continues, possibly slower.",wrongA:"Spark doesn't fail entire job when individual executors are lost. Only affected tasks are rescheduled.",wrongC:"EMR doesn't auto-replace Spot with On-Demand by default. Managed Scaling can add instances but not automatic replacement.",wrongD:"Batch Spark tasks aren't checkpointed to S3. They're simply rescheduled on available executors."}},
{id:57,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue Crawler runs against S3 Parquet files partitioned by year/month/day. Catalog shows one table with NO partitions. Most likely cause?",options:{A:"Crawlers don't support Parquet.",B:"S3 paths don't follow Hive-style key=value convention.",C:"IAM role lacks s3:GetObject.",D:"Parquet must be converted to CSV first."},correctAnswer:"B",explanations:{correct:"Crawlers auto-detect Hive-style partitions (year=2024/month=01/day=15/). Positional paths (2024/01/15/) without key=value format prevent partition inference.",wrongA:"Crawlers fully support Parquet. One of the most common formats.",wrongC:"Missing s3:GetObject would cause crawler FAILURE, not a table without partitions.",wrongD:"Parquet is natively supported. No conversion needed."}},
{id:58,domain:"Domain 1",topic:"Kinesis Data Streams",question:"KDS consumer app on EC2 needs to scale instances based on shard count. Recommended approach for shard assignment across instances?",options:{A:"Manually assign shards to each instance.",B:"Use Kinesis Client Library (KCL) — auto-distributes shard leases via DynamoDB.",C:"Use Firehose as intermediary.",D:"Each instance subscribes to all shards independently."},correctAnswer:"B",explanations:{correct:"KCL uses DynamoDB lease table to coordinate shard assignment. Auto-rebalances when instances added/removed. Each shard processed by exactly one instance.",wrongA:"Manual assignment is error-prone and requires custom code for failures/scaling.",wrongC:"Firehose is a delivery service, not a consumer coordination mechanism.",wrongD:"All instances on all shards = duplicate processing. Every record processed by every instance."}},
{id:59,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue job adds new partitions to S3 table daily. Athena queries on new partitions return no results. What must be done?",options:{A:"Run MSCK REPAIR TABLE or use Glue API BatchCreatePartition.",B:"Re-run Glue Crawler.",C:"Enable S3 Event Notifications.",D:"Both A and B are valid."},correctAnswer:"D",explanations:{correct:"Both work: (A) MSCK REPAIR TABLE scans S3 for new Hive partitions. Glue API adds partitions programmatically. (B) Crawler discovers new partitions and updates catalog.",wrongA:"Valid but not the only approach.",wrongB:"Valid but not the only approach.",wrongC:"S3 events don't directly update Glue Data Catalog. Would need Lambda intermediary."}},
{id:60,domain:"Domain 1",topic:"Kinesis Data Streams",question:"Compliance requires all KDS data encrypted at rest with customer-managed KMS key. How to configure?",options:{A:"Enable server-side encryption on stream, specify CMK ARN.",B:"Encrypt in producer before sending.",C:"Use Firehose with S3 SSE-KMS instead.",D:"KDS only supports AWS-managed keys."},correctAnswer:"A",explanations:{correct:"KDS supports SSE with AWS KMS. Specify CMK ARN for customer-managed key. Encrypts all data at rest in shards transparently.",wrongB:"Client-side encryption doesn't satisfy the requirement of KMS-based at-rest encryption in the service itself.",wrongC:"Switching to Firehose changes architecture. Requirement is for KDS encryption.",wrongD:"Factually incorrect. KDS supports both AWS-managed AND customer-managed KMS keys."}},
{id:61,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue Crawler updates table schema (new column). Downstream ETL job fails on old schema. First step to restore?",options:{A:"Delete table and recreate.",B:"Use Data Catalog version history to revert to previous schema.",C:"Disable crawler.",D:"Modify ETL script for new schema."},correctAnswer:"B",explanations:{correct:"Glue Data Catalog maintains version history. Revert via GetTableVersions/UpdateTable APIs. Immediate fix while script is updated.",wrongA:"Deleting loses version history and partition metadata. Destructive.",wrongC:"Disabling prevents future updates but doesn't fix current schema.",wrongD:"Long-term fix but reverting schema (B) is the immediate restoration."}},
{id:62,domain:"Domain 1",topic:"Amazon MSK",question:"Company needs to replicate Kafka topics from MSK in us-east-1 to MSK in eu-west-1 for DR. Recommended managed solution?",options:{A:"Kafka MirrorMaker 2 on EC2.",B:"Amazon MSK Replicator — fully managed cross-region topic replication.",C:"Kinesis as intermediary.",D:"MSK Connect with custom replication connector."},correctAnswer:"B",explanations:{correct:"MSK Replicator is fully managed. Replicates topics, consumer group offsets, and configs between MSK clusters cross-region. No infrastructure to manage.",wrongA:"MirrorMaker 2 works but requires managing EC2 instances, scaling, monitoring.",wrongC:"Kinesis intermediary between Kafka clusters is an anti-pattern. Adds latency and complexity.",wrongD:"MSK Connect runs connectors but MSK Replicator is the purpose-built managed solution."}},
{id:63,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue job has variable data volumes (10 GB some days, 500 GB others). Currently provisioned for max. What feature optimizes cost?",options:{A:"Flex execution class.",B:"Glue Auto Scaling — dynamically adjusts workers during execution.",C:"Job Bookmarks.",D:"Reduce DPUs and accept slower processing."},correctAnswer:"B",explanations:{correct:"Auto Scaling (Glue 3.0+) monitors utilization and dynamically adds/removes workers. Uses fewer on low-volume days, scales up on high-volume days.",wrongA:"Flex reduces per-DPU cost but doesn't dynamically adjust worker count based on workload.",wrongC:"Bookmarks skip processed files but don't adjust resources based on current volume.",wrongD:"Reducing DPUs is manual trade-off, not automated optimization."}},
{id:64,domain:"Domain 1",topic:"Kinesis Data Firehose",question:"Firehose delivers to VPC-based OpenSearch domain. What must be configured?",options:{A:"Firehose VPC access — specify VPC, subnets, security groups for ENI creation.",B:"NAT Gateway in VPC.",C:"VPC Endpoint for Firehose.",D:"Firehose can't deliver to VPC-based OpenSearch."},correctAnswer:"A",explanations:{correct:"Firehose supports VPC delivery. Configure VPC, subnets, security groups. Firehose creates ENIs in specified subnets. OpenSearch SG must allow inbound from Firehose ENI SG.",wrongB:"NAT Gateway routes to internet. Firehose accesses VPC via ENI injection, not NAT.",wrongC:"VPC Endpoints for Firehose allow VPC resources to send TO Firehose. Opposite direction.",wrongD:"Factually incorrect. Firehose supports VPC-based OpenSearch with VPC configuration."}},
{id:65,domain:"Domain 1",topic:"AWS Step Functions",question:"High-volume pipeline needs millions of executions/day, each <5 min. Cost is primary concern. Which workflow type?",options:{A:"Standard Workflows.",B:"Express Workflows (Asynchronous) — high-volume, lower cost.",C:"Express Workflows (Synchronous).",D:"Standard with nested Express."},correctAnswer:"B",explanations:{correct:"Express Workflows: up to 100K executions/sec, max 5 min duration, priced per execution+duration (much cheaper than Standard for high volumes).",wrongA:"Standard: priced per state transition. Expensive for millions of daily executions.",wrongC:"Synchronous Express waits for completion (request-response). Not for fire-and-forget pipelines.",wrongD:"Nesting adds complexity. Pure Express is correct for uniformly high-volume short workloads."}},
{id:66,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue Interactive Sessions provide what capability?",options:{A:"Visual drag-and-drop ETL editor.",B:"Jupyter-compatible notebook connected to live Glue Spark session for interactive development.",C:"SageMaker integration.",D:"Cloud9 IDE with Glue SDK."},correctAnswer:"B",explanations:{correct:"Interactive Sessions provide Jupyter-compatible notebook interface with real Glue Spark session. Test DynamicFrame operations, transforms, quality checks interactively before production deployment.",wrongA:"That's Glue Studio, not Interactive Sessions.",wrongC:"SageMaker can connect to Glue kernel but Interactive Sessions is the native Glue feature.",wrongD:"Cloud9 is general IDE without interactive Spark session."}},
{id:67,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue job processes customer records. Need to auto-detect and redact PII (SSN, credit cards) before writing to data lake. Which Glue feature?",options:{A:"DataBrew recipe.",B:"Glue Sensitive Data Detection transform — ML-based PII detection and redaction.",C:"Amazon Macie integration.",D:"Custom Lambda scanner."},correctAnswer:"B",explanations:{correct:"Glue has native 'Detect PII' transform. ML-based entity detection identifies PII types and can redact, hash, or replace values inline during ETL.",wrongA:"DataBrew has some PII profiling but Glue ETL Sensitive Data Detection is purpose-built for inline redaction.",wrongC:"Macie discovers PII in S3 but doesn't perform inline ETL redaction.",wrongD:"Custom Lambda adds complexity. Native Glue transform is the managed solution."}},
{id:68,domain:"Domain 1",topic:"AWS Glue ETL",question:"Glue Data Catalog encryption at rest with customer-managed KMS key. How to configure?",options:{A:"Enable S3 SSE-KMS on crawled buckets.",B:"Configure Data Catalog encryption settings with CMK in Glue console.",C:"Use Secrets Manager.",D:"Catalog always uses AWS-managed keys only."},correctAnswer:"B",explanations:{correct:"Glue Data Catalog settings allow enabling encryption with CMK. Encrypts all metadata (databases, tables, partitions) with specified key.",wrongA:"S3 SSE-KMS encrypts data files, not catalog metadata. Separate configurations.",wrongC:"Secrets Manager stores secrets, not catalog encryption configuration.",wrongD:"Incorrect. Customer-managed KMS keys ARE supported for catalog encryption."}},
{id:69,domain:"Domain 2",topic:"Amazon S3",question:"Company stores audit logs. Frequent access 30 days, occasional 31-90 days, retained 7 years never accessed after 90 days. Optimal lifecycle?",options:{A:"Standard-IA after 30 days, Glacier Flexible after 90 days, expire at 7 years.",B:"Glacier after 30 days, expire at 7 years.",C:"Keep Standard 90 days then delete. Glacier copy from day 1.",D:"Intelligent-Tiering for all 7 years."},correctAnswer:"A",explanations:{correct:"Matches access pattern: Standard (0-30, frequent), Standard-IA (31-90, occasional), Glacier Flexible (91 days-7yr, compliance retention). Expire at 2555 days.",wrongB:"Glacier after 30 days skips IA tier for 31-90 day occasional access. Glacier retrieval takes hours.",wrongC:"Deleting at 90 days violates 7-year retention. Dual storage from day 1 doubles cost.",wrongD:"Intelligent-Tiering has per-object monitoring fee. For known patterns, explicit lifecycle is more cost-effective."}},
{id:70,domain:"Domain 2",topic:"AWS Lake Formation",question:"Lake Formation LF-Tags enable what type of access control?",options:{A:"Network-level access control.",B:"Attribute-based access control at scale — tag resources, grant by tag values.",C:"Encryption-based access control.",D:"Time-based access control."},correctAnswer:"B",explanations:{correct:"LF-Tags: assign key-value tags to databases/tables/columns. Grant permissions based on tag values. New tables auto-inherit policies when tagged. Scales to thousands of tables.",wrongA:"LF-Tags are authorization tags, not network controls.",wrongC:"LF-Tags control access permissions, not encryption.",wrongD:"LF-Tags are attribute-based, not time-based."}},
{id:71,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift provisioned cluster experiences query queuing during peak. Want to eliminate queuing without permanent nodes. Which feature?",options:{A:"Migrate to Serverless.",B:"Concurrency Scaling — auto-adds transient clusters during peak.",C:"Data Sharing across clusters.",D:"Increase WLM slots."},correctAnswer:"B",explanations:{correct:"Concurrency Scaling adds transient read clusters when queue exceeds threshold. Transparent routing. 1 hr free/day/cluster. Eliminates queuing without permanent nodes.",wrongA:"Serverless is major architectural change. Concurrency Scaling is incremental feature on existing cluster.",wrongC:"Data Sharing shares data but doesn't auto-route queries to additional clusters.",wrongD:"More WLM slots = less resources per query. All queries slower. Concurrency Scaling adds actual compute."}},
{id:72,domain:"Domain 2",topic:"Amazon DynamoDB",question:"DynamoDB table stores session tokens that should auto-expire after 24 hours. No application code for deletion. Which feature?",options:{A:"Lambda + EventBridge hourly scan.",B:"DynamoDB TTL on attribute storing expiration Unix epoch timestamp.",C:"DynamoDB Streams to detect old items.",D:"Table-level expiration policy."},correctAnswer:"B",explanations:{correct:"TTL: define attribute with Unix epoch expiration timestamp. DynamoDB auto-deletes expired items (within ~48hr). No cost. Application sets TTL on write.",wrongA:"Lambda scan adds cost, complexity, and isn't guaranteed at exact expiration.",wrongC:"Streams captures changes but doesn't trigger deletions.",wrongD:"DynamoDB has no table-level expiration. TTL is per-item via attribute."}},
{id:73,domain:"Domain 2",topic:"Amazon OpenSearch",question:"OpenSearch indices grow indefinitely. Want to auto-delete indices older than 30 days. Correct approach?",options:{A:"Lambda daily to call Delete Index API.",B:"OpenSearch Index State Management (ISM) policies — lifecycle actions based on age.",C:"S3 lifecycle rules on OpenSearch data.",D:"CloudWatch alarm triggering deletion."},correctAnswer:"B",explanations:{correct:"ISM is built-in OpenSearch feature. Define policies with states/transitions (if age > 30 days, delete). Runs within OpenSearch automatically.",wrongA:"Lambda works but adds operational overhead. ISM is native, purpose-built solution.",wrongC:"OpenSearch manages own storage. S3 lifecycle doesn't apply to OpenSearch indices.",wrongD:"CloudWatch can't directly delete OpenSearch indices. Requires Lambda intermediary."}},
{id:74,domain:"Domain 2",topic:"Amazon Redshift",question:"Redshift query joins 3 large tables, run by 100 analysts hourly. Takes 5 min. Data changes once daily. Best optimization?",options:{A:"Materialized View — pre-computes join, refresh daily.",B:"Concurrency Scaling.",C:"Regular view.",D:"Redshift Data API async."},correctAnswer:"A",explanations:{correct:"Materialized View pre-computes and stores result. Analysts read pre-computed data (seconds vs 5 min). Refresh once daily after data update.",wrongB:"Concurrency Scaling runs more queries simultaneously but each still takes 5 min.",wrongC:"Regular view re-executes underlying join every time. No performance benefit.",wrongD:"Data API allows async execution but query still takes 5 min."}},
{id:75,domain:"Domain 2",topic:"Amazon S3",question:"Athena query scans 500 GB but needs only 3 of 50 columns. Data is CSV. Single change for most impact?",options:{A:"Add LIMIT clause.",B:"Convert to Parquet — Athena reads only requested columns.",C:"Workgroup scan limit.",D:"CTAS to new table with 3 columns."},correctAnswer:"B",explanations:{correct:"CSV is row-based — must read entire rows. Parquet is columnar — reads only 3 columns' bytes, skipping 47 others. ~94% reduction in data scanned.",wrongA:"LIMIT reduces rows returned but NOT data scanned. Athena still scans all matching data.",wrongC:"Scan limit stops query at threshold but doesn't reduce how much is scanned.",wrongD:"CTAS requires one-time full scan to create. Parquet conversion is more broadly beneficial."}},
{id:76,domain:"Domain 2",topic:"Amazon Redshift",question:"Team loads 1 TB CSV to Redshift via COPY. Taking 2 hours. Most effective optimization?",options:{A:"Use INSERT INTO SELECT.",B:"Split CSV into multiple files (one per slice) and use manifest.",C:"Gzip compress files.",D:"Use Spectrum instead."},correctAnswer:"B",explanations:{correct:"COPY parallelizes across slices. Multiple files (multiple of slice count) enables full parallel loading. Single large file = one slice loads serially.",wrongA:"INSERT INTO SELECT is row-by-row. Dramatically slower than COPY for bulk loading.",wrongC:"Gzip helps with transfer but primary bottleneck is single-file serialization. Splitting has larger impact.",wrongD:"Spectrum queries S3 in-place. For repeated analytics, loaded data performs much better."}},
{id:77,domain:"Domain 2",topic:"Amazon DynamoDB",question:"E-commerce app needs to atomically deduct inventory AND create order record across two tables. Both succeed or both fail. Which feature?",options:{A:"Conditional Writes on both tables.",B:"DynamoDB Transactions (TransactWriteItems) — atomic multi-table operations.",C:"DynamoDB Streams coordination.",D:"Step Functions saga pattern."},correctAnswer:"B",explanations:{correct:"TransactWriteItems: up to 100 operations across multiple tables in single atomic transaction. All succeed or all fail (ACID).",wrongA:"Conditional Writes aren't atomic across tables. If one succeeds and other fails = inconsistent state.",wrongC:"Streams captures changes after they occur. Can't coordinate atomic writes.",wrongD:"Step Functions saga is complex. DynamoDB Transactions provide native ACID without custom logic."}},
